<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Tactical Map Pro v21.0</title>
    <style>
        :root { 
            --bg: #0f172a; --panel-bg: rgba(30, 41, 59, 0.95); --accent: #3b82f6; 
            --success: #10b981; --danger: #ef4444; --text: #f8fafc;
            --glass: rgba(15, 23, 42, 0.6); --glass-border: rgba(255, 255, 255, 0.2);
            --btn-bg: rgba(255, 255, 255, 0.1);
        }
        body { margin: 0; background: #000; color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100dvh; width: 100%; position: fixed; }
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; }
        
        /* --- 縦画面パネル (現状維持) --- */
        #panel { 
            position: fixed; bottom: 20px; left: 15px; right: 15px; 
            padding: 15px; background: var(--panel-bg); backdrop-filter: blur(15px); 
            border-radius: 20px; z-index: 2000; border: 1px solid rgba(255,255,255,0.1); 
        }

        .step { display: none; } .active { display: block; }
        button { width: 100%; padding: 14px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; transition: transform 0.1s; }
        .blue { background: var(--accent); color: white; } 
        .outline { background: var(--btn-bg); border: 1px solid rgba(255,255,255,0.4); color: white; }
        
        /* 座標入力の列（縦画面用） */
        .coord-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .coord-row input { flex: 1; padding: 12px; border-radius: 8px; background: #111; color: #fff; border: 1px solid #444; font-size: 18px; text-align: center; }

        /* --- 【最重要】横画面（ランドスケープ）最適化 --- */
        /* !important を多用して確実に上書きします */
        @media (orientation: landscape) {
            #panel {
                top: 10px !important; 
                bottom: 10px !important; 
                left: 10px !important; 
                right: auto !important; 
                width: 260px !important; /* 左側にパネルを固定 */
                height: auto !important;
                max-height: calc(100vh - 20px) !important;
                border-radius: 15px !important;
                overflow-y: auto !important;
                padding: 12px !important;
            }

            /* ボタンを2列に並べる */
            .menu-grid {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 8px !important;
            }
            .menu-grid button {
                margin: 0 !important;
                padding: 10px 2px !important;
                font-size: 12px !important;
                border-radius: 8px !important;
            }

            /* 座標入力：度と分を引用元スタイルで1行に */
            .coord-row {
                gap: 4px !important;
                margin-bottom: 6px !important;
            }
            .coord-row input {
                padding: 8px 4px !important;
                font-size: 15px !important;
            }
            .coord-row input:first-child { flex: 0.35 !important; } /* 整数部 */
            .coord-row input:last-child { flex: 0.65 !important; }  /* 小数部 */

            h3 { font-size: 14px !important; margin-bottom: 8px !important; }
            p { font-size: 11px !important; margin-bottom: 5px !important; }
        }
    </style>
</head>
<body>

<div id="viewport">
    <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#333;">
        [地図表示エリア]
    </div>
</div>

<div id="panel">
    <!-- ステップ0: メニュー -->
    <div id="s0" class="step active">
        <h3 style="margin:0 0 12px 0; color:var(--accent);">Tactical Map Pro</h3>
        <div class="menu-grid">
            <button class="blue" onclick="alert('新規')">新規</button>
            <button class="outline" onclick="alert('保存')">保存済</button>
            <button class="outline" onclick="alert('入出力')" style="border-color:var(--success)">入出力</button>
            <button class="outline" onclick="alert('設定')">設定</button>
        </div>
    </div>

    <hr style="border:0; border-top:1px solid #444; margin:10px 0;">

    <!-- ステップ2: 座標入力シミュレート -->
    <div id="s2" class="step active" style="display:block;"> <!-- 確認のため常時表示 -->
        <p style="font-weight:bold;">引用元書式 (LAT / LON)</p>
        <div class="coord-row">
            <input type="number" placeholder="35">
            <span style="font-weight:bold; color:var(--accent);">.</span>
            <input type="number" placeholder="12.3456">
        </div>
        <div class="coord-row">
            <input type="number" placeholder="135">
            <span style="font-weight:bold; color:var(--accent);">.</span>
            <input type="number" placeholder="54.7890">
        </div>
        <button class="blue" style="padding:10px; font-size:14px;">座標を登録</button>
    </div>
</div>

</body>
</html>
