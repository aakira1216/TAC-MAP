<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Map PWA</title>
    <style>
        /* --- 基本レイアウト（縦画面ベース） --- */
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            overflow: hidden;
            background: #1a1a1a;
            color: white;
        }

        #map-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #333;
        }

        /* 左側コントロールバー（共通） */
        #left-bar {
            position: absolute;
            left: 10px;
            top: 10px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 140px; /* 縦画面での基本幅 */
        }

        /* ボタンの共通スタイル */
        .btn {
            background: rgba(40, 40, 40, 0.9);
            color: white;
            border: 1px solid #555;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }

        /* GPS精度表示BOX（修正なし・維持） */
        #gps-status {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff00;
            padding: 5px;
            font-size: 12px;
            border-radius: 4px;
        }

        /* 座標入力エリア（縦画面） */
        .coord-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px;
            border-radius: 4px;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 2px;
            overflow: hidden;
        }

        .input-group input {
            border: none;
            padding: 8px 4px;
            font-size: 16px; /* iOSズーム防止 */
            outline: none;
            text-align: center;
        }

        /* 度（整数） */
        .input-deg { width: 35%; border-right: 1px solid #ccc; }
        /* 分（小数） */
        .input-min { width: 65%; }

        .label-text {
            font-size: 11px;
            margin-bottom: 2px;
            color: #aaa;
        }

        /* --- 横画面（ランドスケープ）専用の上書き設定 --- */
        @media (orientation: landscape) {
            #left-bar {
                width: 180px; /* 横画面時は少し幅を広げて安定させる */
                top: 5px;
                left: 5px;
                gap: 4px; /* 隙間を詰める */
            }

            /* マップ読み込み・選択モードのボタンを2列にする */
            .menu-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 4px;
            }

            .btn-small {
                padding: 6px 2px;
                font-size: 11px;
                min-height: 32px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            /* 座標入力エリアの最適化 */
            .coord-container {
                padding: 4px;
            }

            .input-group input {
                padding: 4px 2px;
                font-size: 14px; /* 横画面では少し抑える */
            }

            /* 地図表示を最大化するため、不要な余白をカット */
            #gps-status {
                font-size: 11px;
                padding: 2px 5px;
            }
        }
    </style>
</head>
<body>

<div id="map-container">
    <!-- 左側バー -->
    <div id="left-bar">
        <!-- GPS精度表示（現状維持） -->
        <div id="gps-status">
            GPS: ±3m<br>
            Alt: 150m
        </div>

        <!-- マップ読み込みモード（横画面時はグリッド） -->
        <div class="menu-grid">
            <div class="btn btn-small">新規マップ</div>
            <div class="btn btn-small">保存した地図</div>
            <div class="btn btn-small">インポート</div>
        </div>

        <!-- 座標入力：引用元の書式をフォロー -->
        <div class="coord-container">
            <div class="label-text">LAT (度 . 分)</div>
            <div class="input-group">
                <input type="number" class="input-deg" placeholder="35">
                <span style="color:#000; background:#fff;">.</span>
                <input type="number" class="input-min" placeholder="12.3456">
            </div>
            
            <div class="label-text">LON (度 . 分)</div>
            <div class="input-group">
                <input type="number" class="input-deg" placeholder="139">
                <span style="color:#000; background:#fff;">.</span>
                <input type="number" class="input-min" placeholder="54.7890">
            </div>
        </div>

        <!-- マップ選択モード（横画面時はグリッド） -->
        <div class="menu-grid">
            <div class="btn btn-small" style="background: #2c3e50;">開く</div>
            <div class="btn btn-small" style="background: #27ae60;">共有</div>
            <div class="btn btn-small" style="background: #c0392b;">削除</div>
        </div>
    </div>
</div>

<script>
    // iOSでの「度・分」分割入力のフォーカス移動などをここに記述可能
    // 今回はレイアウト確認のため骨組みのみ
</script>

</body>
</html>
