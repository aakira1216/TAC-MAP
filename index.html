<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>オフラインマップ v11.7</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #333; }
        
        /* UIコンテナ：全体を一段構成にして高さを抑えたデザイン */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 0; border-bottom: 1px solid #ccc;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }

        /* 座標入力：ピリオド分割セル */
        .coord-container { display: flex; align-items: center; gap: 2px; }
        .coord-input {
            width: 55px; height: 35px; font-size: 18px; text-align: center;
            border: 1px solid #999; border-radius: 4px;
        }
        .coord-input.dec { width: 85px; }
        .dot { font-size: 24px; font-weight: bold; }

        /* ボタン類：押しやすいサイズ */
        .btn-row { display: flex; gap: 10px; align-items: center; }
        .btn {
            padding: 8px 15px; font-size: 14px; font-weight: bold;
            background: #007AFF; color: white; border: none; border-radius: 6px;
        }
        .btn:active { background: #0051a8; }
        .btn-red { background: #FF3B30; }

        canvas { display: block; touch-action: none; }

        /* ステータス情報 */
        #info-window {
            position: absolute; bottom: 5px; left: 5px; right: 5px;
            background: rgba(0,0,0,0.6); color: white; padding: 5px 10px;
            border-radius: 5px; font-size: 11px; pointer-events: none;
            display: flex; justify-content: space-between;
        }

        /* 地図リスト表示 */
        #map-list {
            position: fixed; top: 10%; left: 5%; width: 90%; max-height: 80%;
            background: white; z-index: 1000; display: none;
            border-radius: 10px; padding: 15px; overflow-y: auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .map-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="init-ui">
        <input type="file" id="file-input" style="display:none" accept="image/*">
        <button class="btn" onclick="document.getElementById('file-input').click()">画像を選択</button>
    </div>

    <div id="setup-ui" style="display:none;">
        <div class="btn-row">
            <div class="coord-container">
                <input type="number" id="lat-deg" class="coord-input" placeholder="35">
                <span class="dot">.</span>
                <input type="number" id="lat-dec" class="coord-input dec" placeholder="00000">
            </div>
            <div class="coord-container">
                <input type="number" id="lng-deg" class="coord-input" placeholder="139">
                <span class="dot">.</span>
                <input type="number" id="lng-dec" class="coord-input dec" placeholder="00000">
            </div>
            <button class="btn" id="reg-btn" onclick="registerPoint()">地点1登録</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <div class="btn-row">
            <button class="btn" onclick="toggleGPS()" id="gps-btn">GPS: OFF</button>
            <button class="btn" onclick="showMapList()">地図を開く</button>
            <button class="btn" onclick="saveMap()">保存</button>
        </div>
    </div>
</div>

<div id="info-window">
    <div id="gps-status">GPS信号なし</div>
    <div id="scale-status">Scale: --</div>
    <div>v11.7</div>
</div>

<canvas id="map-canvas"></canvas>

<div id="map-list">
    <h3>保存した地図</h3>
    <div id="list-container"></div>
    <button class="btn" style="width:100%; margin-top:10px; background:#666;" onclick="closeMapList()">閉じる</button>
</div>

<script>
    let db;
    const canvas = document.getElementById('map-canvas');
    const ctx = canvas.getContext('2d');
    let mapImg = null;
    let points = [];
    let scale = 1, offsetX = 0, offsetY = 0;
    let isGPSTracking = false;
    let lastLat, lastLng;

    // IndexedDB
    const req = indexedDB.open("OfflineMapDB", 3);
    req.onsuccess = e => db = e.target.result;

    // 画像読み込み
    document.getElementById('file-input').onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            mapImg = new Image();
            mapImg.onload = () => {
                scale = Math.min(window.innerWidth / mapImg.width, window.innerHeight / mapImg.height);
                offsetX = (window.innerWidth - mapImg.width * scale) / 2;
                offsetY = (window.innerHeight - mapImg.height * scale) / 2;
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                document.getElementById('init-ui').style.display = 'none';
                document.getElementById('setup-ui').style.display = 'block';
                draw();
            };
            mapImg.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    // --- タップ・操作系修正 (v11.7) ---
    let touchStartX, touchStartY, startX, startY;
    let isDragging = false;
    let lastDist = 0;
    const moveThreshold = 6; 

    canvas.addEventListener('touchstart', e => {
        if(e.touches.length === 1) {
            isDragging = true;
            touchStartX = e.touches[0].clientX - offsetX;
            touchStartY = e.touches[0].clientY - offsetY;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        } else if(e.touches.length === 2) {
            lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
    }, {passive:false});

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if(e.touches.length === 1 && isDragging) {
            offsetX = e.touches[0].clientX - touchStartX;
            offsetY = e.touches[0].clientY - touchStartY;
        } else if(e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            const zoom = dist / lastDist;
            const newScale = scale * zoom;
            offsetX = midX - (midX - offsetX) * (newScale / scale);
            offsetY = midY - (midY - offsetY) * (newScale / scale);
            scale = newScale;
            lastDist = dist;
        }
        draw();
    }, {passive:false});

    canvas.addEventListener('touchend', e => {
        if(isDragging && e.changedTouches.length === 1) {
            const dist = Math.hypot(e.changedTouches[0].clientX - startX, e.changedTouches[0].clientY - startY);
            if(dist < moveThreshold) {
                const imgX = (e.changedTouches[0].clientX - offsetX) / scale;
                const imgY = (e.changedTouches[0].clientY - offsetY) / scale;
                if(points.length < 2) {
                    points.push({x: imgX, y: imgY});
                    document.getElementById('reg-btn').innerText = `地点${points.length}登録`;
                    draw();
                }
            }
        }
        isDragging = false;
    });

    function registerPoint() {
        const lat = parseFloat(document.getElementById('lat-deg').value) + parseFloat("0." + document.getElementById('lat-dec').value);
        const lng = parseFloat(document.getElementById('lng-deg').value) + parseFloat("0." + document.getElementById('lng-dec').value);
        if(isNaN(lat) || isNaN(lng)) return alert("数値を入力してください");

        points[points.length-1].lat = lat;
        points[points.length-1].lng = lng;

        if(points.length === 2) {
            document.getElementById('setup-ui').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        } else {
            document.querySelectorAll('.coord-input').forEach(i => i.value = "");
            alert("1点目登録完了。2点目をタップしてください。");
        }
        draw();
    }

    function draw() {
        if(!mapImg) return;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.drawImage(mapImg, offsetX, offsetY, mapImg.width*scale, mapImg.height*scale);

        points.forEach((p, i) => {
            ctx.fillStyle = p.lat ? "#007AFF" : "#FF3B30";
            ctx.beginPath();
            ctx.arc(p.x * scale + offsetX, p.y * scale + offsetY, 10, 0, Math.PI*2);
            ctx.fill();
        });

        if(isGPSTracking && lastLat && points.length === 2) {
            const p1 = points[0], p2 = points[1];
            const px = p1.x + (lastLng - p1.lng) * (p2.x - p1.x) / (p2.lng - p1.lng);
            const py = p1.y + (lastLat - p1.lat) * (p2.y - p1.y) / (p2.lat - p1.lat);
            ctx.fillStyle = "#007AFF";
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(px * scale + offsetX, py * scale + offsetY, 12, 0, Math.PI*2);
            ctx.fill(); ctx.stroke();
        }
        document.getElementById('scale-status').innerText = `Scale: ${scale.toFixed(2)}`;
    }

    function toggleGPS() {
        isGPSTracking = !isGPSTracking;
        document.getElementById('gps-btn').innerText = isGPSTracking ? "GPS: ON" : "GPS: OFF";
        if(isGPSTracking) {
            navigator.geolocation.watchPosition(pos => {
                lastLat = pos.coords.latitude; lastLng = pos.coords.longitude;
                document.getElementById('gps-status').innerText = `±${pos.coords.accuracy.toFixed(0)}m`;
                draw();
            }, null, {enableHighAccuracy:true});
        }
    }

    function saveMap() {
        const name = prompt("地図の名前");
        if(!name) return;
        const tx = db.transaction("maps", "readwrite");
        tx.objectStore("maps").put({name, img: mapImg.src, points, scale, offsetX, offsetY});
        alert("保存完了");
    }

    function showMapList() {
        const container = document.getElementById('list-container');
        container.innerHTML = "";
        db.transaction("maps").objectStore("maps").openCursor().onsuccess = e => {
            const cursor = e.target.result;
            if(cursor) {
                const div = document.createElement('div');
                div.className = 'map-item';
                div.innerHTML = `<span>${cursor.value.name}</span>
                    <div>
                        <button class="btn" onclick="loadMap('${cursor.value.name}')">開く</button>
                        <button class="btn btn-red" onclick="deleteMap('${cursor.value.name}')">削除</button>
                    </div>`;
                container.appendChild(div);
                cursor.continue();
            }
        };
        document.getElementById('map-list').style.display = 'block';
    }

    window.loadMap = name => {
        db.transaction("maps").objectStore("maps").get(name).onsuccess = e => {
            const d = e.target.result;
            mapImg = new Image();
            mapImg.onload = () => {
                points = d.points; scale = d.scale; offsetX = d.offsetX; offsetY = d.offsetY;
                document.getElementById('init-ui').style.display = 'none';
                document.getElementById('setup-ui').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                closeMapList(); draw();
            };
            mapImg.src = d.img;
        };
    };

    window.deleteMap = name => {
        if(confirm("削除しますか？")) {
            db.transaction("maps", "readwrite").objectStore("maps").delete(name).onsuccess = () => showMapList();
        }
    };

    function closeMapList() { document.getElementById('map-list').style.display = 'none'; }
    window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw(); };
</script>
</body>
</html>
