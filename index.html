<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Advanced Map Tracker v6</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --panel-bg: rgba(30, 41, 59, 0.95);
            --accent: #3b82f6; 
            --text: #f8fafc;
        }
        
        body { 
            margin: 0; background: #000; color: var(--text); 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; height: 100dvh; width: 100%; position: fixed;
        }
        
        #viewport { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; touch-action: none; -webkit-user-select: none;
        }
        
        /* 地図コンテナ：常に画面中央を基準にする */
        #map-container { 
            position: absolute; 
            top: 50%; left: 50%;
            transform-origin: center center;
            will-change: transform;
            display: flex; align-items: center; justify-content: center;
        }
        
        #map-img { display: none; pointer-events: none; }
        
        .dot { 
            position: absolute; width: 20px; height: 20px; border-radius: 50%; 
            border: 2px solid #fff; transform: translate(-50%, -50%); 
            display: none; z-index: 100; pointer-events: none;
        }
        #p1-dot { background: #ef4444; }
        #p2-dot { background: #22c55e; }
        
        #user-dot { 
            width: 0; height: 0; 
            border-left: 10px solid transparent; border-right: 10px solid transparent; 
            border-bottom: 24px solid var(--accent); 
            z-index: 110; position: absolute; 
            transform: translate(-50%, -70%); display: none; pointer-events: none;
        }
        
        #scale-container {
            position: fixed; bottom: 100px; right: 20px; z-index: 1005;
            text-align: center; pointer-events: none;
        }
        #scale-bar { height: 4px; border: 2px solid white; border-top: none; width: 0px; background: rgba(0,0,0,0.3); }

        #ui-overlay {
            position: fixed; top: 40px; right: 15px; display: none; flex-direction: column; gap: 10px; z-index: 1002;
        }
        .ui-btn {
            width: 44px; height: 44px; background: var(--panel-bg); color: white;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .active-mode { border-color: var(--accent); color: var(--accent); }

        #panel { 
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            max-height: 40vh; padding: 15px; background: var(--panel-bg); 
            backdrop-filter: blur(10px); border-radius: 15px;
            overflow-y: auto; z-index: 1000;
        }
        
        .step { display: none; }
        .active { display: block; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; }
        .blue { background: var(--accent); color: white; }
        input { width: 100%; padding: 10px; margin: 4px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn active-mode" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="scale-container">
    <div id="scale-label">50m</div>
    <div id="scale-bar"></div>
</div>

<div id="viewport">
    <div id="map-container">
        <img id="map-img">
    </div>
    <div id="p1-dot" class="dot"></div>
    <div id="p2-dot" class="dot"></div>
    <div id="user-dot"></div>
</div>

<div id="panel">
    <div id="s1" class="step active">
        <p>STEP 1: 地図画像を選択</p>
        <input type="file" id="file-input" accept="image/*">
    </div>
    <div id="s2" class="step">
        <p id="guide">P1(赤)をタップして座標入力</p>
        <div id="p1-inputs">
            <input type="number" id="lat1" placeholder="P1 緯度" step="any">
            <input type="number" id="lng1" placeholder="P1 経度" step="any">
            <button onclick="confirmP1()" class="blue">P1登録</button>
        </div>
        <div id="p2-inputs" style="display:none">
            <input type="number" id="lat2" placeholder="P2 緯度" step="any">
            <input type="number" id="lng2" placeholder="P2 経度" step="any">
            <button onclick="confirmP2()" class="blue" style="background:#10b981">P2登録</button>
        </div>
    </div>
    <div id="s3" class="step">
        <button onclick="saveAndStart()" class="blue">追跡開始</button>
    </div>
    <div id="s4" class="step">
        <div id="status">GPS待機中...</div>
        <button id="gyro-btn" onclick="askGyro()" class="blue">方位計を許可</button>
        <button onclick="location.reload()" style="background:#555; color:white;">リセット</button>
    </div>
</div>

<script>
    const state = { 
        step: 1, p1: null, p2: null, 
        scale: 1, offsetX: 0, offsetY: 0, 
        isTracking: true, rotateMode: 0, 
        mapNorth: 0, metersPerPixel: 0,
        userPos: {x:0, y:0}, userHeading: 0,
        tempPoint: null
    };
    
    const el = id => document.getElementById(id);
    const vNode = el('viewport');

    el('file-input').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            el('map-img').src = ev.target.result;
            el('map-img').onload = () => {
                el('map-img').style.display = 'block';
                fitImage();
                showStep(2);
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function fitImage() {
        const img = el('map-img');
        const vw = vNode.clientWidth, vh = vNode.clientHeight;
        state.scale = Math.min(vw / img.naturalWidth, vh / img.naturalHeight);
        state.offsetX = 0; // 中心からの相対
        state.offsetY = 0;
        updateTransform();
    }

    let evCache = [];
    let initialDist = 0;
    let initialScale = 1;
    let dragStartX = 0, dragStartY = 0;

    vNode.onpointerdown = e => {
        evCache.push(e);
        vNode.setPointerCapture(e.pointerId);
        if (evCache.length === 1) {
            dragStartX = e.clientX - state.offsetX;
            dragStartY = e.clientY - state.offsetY;
        } else if (evCache.length === 2) {
            initialDist = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
            initialScale = state.scale;
        }
    };

    vNode.onpointermove = e => {
        const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
        if (index === -1) return;
        evCache[index] = e;

        if (evCache.length === 2) {
            const currentDist = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
            if (initialDist > 0) {
                const ratio = currentDist / initialDist;
                state.scale = initialScale * ratio;
            }
            state.isTracking = false;
        } else if (evCache.length === 1) {
            state.offsetX = e.clientX - dragStartX;
            state.offsetY = e.clientY - dragStartY;
            state.isTracking = false;
        }
        updateUIControls();
        updateTransform();
    };

    vNode.onpointerup = vNode.onpointercancel = e => {
        if (evCache.length === 1 && state.step === 2) {
            const dist = Math.hypot(e.clientX - (dragStartX + state.offsetX), e.clientY - (dragStartY + state.offsetY));
            if (dist < 10) handleTap(e);
        }
        evCache = evCache.filter(ev => ev.pointerId !== e.pointerId);
        if (evCache.length < 2) initialDist = 0;
        if (evCache.length === 1) {
            dragStartX = evCache[0].clientX - state.offsetX;
            dragStartY = evCache[0].clientY - state.offsetY;
        }
    };

    function updateTransform() {
        let mapRotation = 0;
        if (state.rotateMode === 1) mapRotation = -state.mapNorth; 
        if (state.rotateMode === 2) mapRotation = -state.mapNorth - state.userHeading; 
        
        const img = el('map-img');
        const cx = img.naturalWidth / 2, cy = img.naturalHeight / 2;

        // 基準を画面中央(50%, 50%)にし、そこからのoffsetX/Yで動かす
        el('map-container').style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) rotate(${mapRotation}deg) scale(${state.scale})`;
        
        const updatePoint = (id, ix, iy) => {
            const dx = (ix - cx) * state.scale, dy = (iy - cy) * state.scale;
            const rad = mapRotation * Math.PI / 180;
            const rx = dx * Math.cos(rad) - dy * Math.sin(rad);
            const ry = dx * Math.sin(rad) + dy * Math.cos(rad);
            const dot = el(id);
            dot.style.left = `calc(50% + ${state.offsetX + rx}px)`;
            dot.style.top = `calc(50% + ${state.offsetY + ry}px)`;
        };

        if (state.p1) updatePoint('p1-dot', state.p1.x, state.p1.y);
        if (state.p2) updatePoint('p2-dot', state.p2.x, state.p2.y);
        if (state.userPos.x) {
            el('user-dot').style.display = 'block';
            updatePoint('user-dot', state.userPos.x, state.userPos.y);
        }
        
        if (state.metersPerPixel > 0) {
            el('scale-bar').style.width = (50 / state.metersPerPixel) * state.scale + 'px';
        }
    }

    function handleTap(e) {
        const img = el('map-img');
        const cx = img.naturalWidth / 2, cy = img.naturalHeight / 2;
        // 逆算して画像座標を取得
        const rx = (e.clientX - vNode.clientWidth/2 - state.offsetX) / state.scale;
        const ry = (e.clientY - vNode.clientHeight/2 - state.offsetY) / state.scale;
        state.tempPoint = { x: rx + cx, y: ry + cy };
        
        const dotId = state.p1 ? 'p2-dot' : 'p1-dot';
        el(dotId).style.display = 'block';
        updateTransform();
    }

    function confirmP1() {
        const lat = parseFloat(el('lat1').value), lng = parseFloat(el('lng1').value);
        if (!state.tempPoint || isNaN(lat)) return alert("地図タップと数値を入力してください");
        state.p1 = {...state.tempPoint, lat, lng};
        state.tempPoint = null;
        el('p1-inputs').style.display = 'none';
        el('p2-inputs').style.display = 'block';
        el('guide').innerText = "P2(緑)をタップして座標入力";
    }

    function confirmP2() {
        const lat = parseFloat(el('lat2').value), lng = parseFloat(el('lng2').value);
        if (!state.tempPoint || isNaN(lat)) return alert("P2の指定が必要です");
        state.p2 = {...state.tempPoint, lat, lng};
        
        // ロジック計算
        const p1 = state.p1, p2 = state.p2;
        const distM = 6371000 * Math.acos(Math.sin(p1.lat*Math.PI/180)*Math.sin(p2.lat*Math.PI/180) + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.cos((p2.lng-p1.lng)*Math.PI/180));
        state.metersPerPixel = distM / Math.hypot(p2.x-p1.x, p2.y-p1.y);
        state.mapNorth = (Math.atan2(p2.x-p1.x, p1.y-p2.y)*180/Math.PI) - (Math.atan2(p2.lng-p1.lng, p2.lat-p1.lat)*180/Math.PI);
        
        showStep(3);
    }

    function saveAndStart() {
        showStep(4);
        el('ui-overlay').style.display = 'flex';
        
        const opt = { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 };
        
        navigator.geolocation.watchPosition(p => {
            const {latitude: lat, longitude: lng, accuracy} = p.coords;
            el('status').innerText = `精度: ±${accuracy.toFixed(0)}m`;
            
            const ratioX = (lng - state.p1.lng) / (state.p2.lng - state.p1.lng);
            const ratioY = (lat - state.p1.lat) / (state.p2.lat - state.p1.lat);
            state.userPos = {
                x: state.p1.x + ratioX * (state.p2.x - state.p1.x),
                y: state.p1.y + ratioY * (state.p2.y - state.p1.y)
            };
            
            if (state.isTracking) {
                const img = el('map-img');
                state.offsetX = -(state.userPos.x - img.naturalWidth/2) * state.scale;
                state.offsetY = -(state.userPos.y - img.naturalHeight/2) * state.scale;
            }
            updateTransform();
        }, err => {
            el('status').innerText = "エラー: " + err.message + " (設定を確認してください)";
        }, opt);
    }

    function toggleTracking() {
        state.isTracking = !state.isTracking;
        updateUIControls();
    }

    function updateUIControls() {
        el('btn-lock').classList.toggle('active-mode', state.isTracking);
    }

    function cycleRotateMode() {
        state.rotateMode = (state.rotateMode + 1) % 3;
        el('btn-rotate').innerText = ['🧭', '⬆️N', '🏃⬆️'][state.rotateMode];
        updateTransform();
    }

    function showStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        el('s' + n).classList.add('active');
        state.step = n;
    }

    async function askGyro() {
        if (DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res !== 'granted') return;
        }
        window.addEventListener('deviceorientation', e => {
            state.userHeading = e.webkitCompassHeading || (360 - e.alpha);
            el('user-dot').style.transform = `translate(-50%, -70%) rotate(${state.userHeading}deg)`;
            if (state.rotateMode === 2) updateTransform();
        }, true);
        el('gyro-btn').style.display = 'none';
    }
</script>
</body>
</html>
