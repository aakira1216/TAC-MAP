<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Advanced Map Tracker v5</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --panel-bg: rgba(30, 41, 59, 0.9);
            --accent: #3b82f6; 
            --success: #10b981; 
            --text: #f8fafc;
        }
        
        body { 
            margin: 0; background: #000; color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; height: 100dvh; 
            position: fixed; width: 100%;
        }
        
        #viewport { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #000; touch-action: none; 
        }
        
        #map-container { 
            position: absolute; 
            transform-origin: center center; /* 回転軸を中央に */
            will-change: transform;
        }
        
        #map-img { display: none; pointer-events: none; }
        
        .dot { 
            position: absolute; width: 22px; height: 22px; border-radius: 50%; 
            border: 2px solid #fff; transform: translate(-50%, -50%); 
            display: none; z-index: 100; pointer-events: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #p1-dot { background: #ef4444; }
        #p2-dot { background: #22c55e; }
        
        #user-dot { 
            width: 0; height: 0; 
            border-left: 12px solid transparent; 
            border-right: 12px solid transparent; 
            border-bottom: 28px solid var(--accent); 
            z-index: 110; position: absolute; 
            transform: translate(-50%, -70%); 
            display: none;
            pointer-events: none;
            filter: drop-shadow(0 0 4px rgba(0,0,0,0.8));
        }
        
        #scale-container {
            position: fixed; bottom: 100px; right: 20px; z-index: 1005;
            text-align: center; pointer-events: none;
        }
        #scale-bar {
            height: 4px; border: 2px solid white; border-top: none;
            width: 0px; transition: width 0.1s; background: rgba(0,0,0,0.3);
        }
        #scale-label { font-size: 10px; text-shadow: 1px 1px 2px black; font-weight: bold; }

        #ui-overlay {
            position: fixed; top: 50px; right: 15px; display: none; flex-direction: column; gap: 12px; z-index: 1002;
        }
        .ui-btn {
            width: 50px; height: 50px; background: var(--panel-bg); color: white;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 22px;
            backdrop-filter: blur(8px);
        }
        .active-mode { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        #panel { 
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            max-height: 40vh; padding: 18px; background: var(--panel-bg); 
            backdrop-filter: blur(15px); border-radius: 20px;
            overflow-y: auto; z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .step { display: none; }
        .active { display: block; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .blue { background: var(--accent); color: white; }
        .green { background: var(--success); color: white; }
        input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn active-mode" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="scale-container">
    <div id="scale-label">50m</div>
    <div id="scale-bar"></div>
</div>

<div id="viewport">
    <div id="map-container">
        <img id="map-img">
    </div>
    
    <div id="p1-dot" class="dot"></div>
    <div id="p2-dot" class="dot"></div>
    <div id="user-dot"></div>
</div>

<div id="panel">
    <div id="s1" class="step active">
        <h3 style="margin-top:0">STEP 1: 地図画像を選択</h3>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div id="s2" class="step">
        <p id="guide" style="font-weight:bold; color:var(--accent)">P1(赤)をタップして「登録」</p>
        <div id="p1-inputs">
            <input type="number" id="lat1" placeholder="P1緯度 (例: 35.123)" step="any">
            <input type="number" id="lng1" placeholder="P1経度 (例: 139.123)" step="any">
            <button onclick="confirmP1()" class="blue">P1を登録</button>
        </div>
        <div id="p2-inputs" style="display:none">
            <input type="number" id="lat2" placeholder="P2緯度" step="any">
            <input type="number" id="lng2" placeholder="P2経度" step="any">
            <button onclick="confirmP2()" class="green">P2を登録</button>
        </div>
    </div>

    <div id="s3" class="step">
        <p>設定完了。追跡を開始しますか？</p>
        <button onclick="saveAndStart()" class="blue">開始する</button>
    </div>

    <div id="s4" class="step">
        <div id="status" style="font-size:12px; text-align:center; margin-bottom:10px;">GPS信号待機中...</div>
        <button id="gyro-btn" onclick="askGyro()" class="blue">方位計（コンパス）を有効化</button>
        <button onclick="location.reload()" style="background:#444; color:white; margin-top:10px;">地図をリセット</button>
    </div>
</div>

<script>
    const state = { 
        step: 1, p1: null, p2: null, 
        scale: 1, offsetX: 0, offsetY: 0, 
        isTracking: true, rotateMode: 0, 
        mapNorth: 0, metersPerPixel: 0,
        userPos: {x:0, y:0}, userHeading: 0,
        tempPoint: null
    };
    
    const el = id => document.getElementById(id);
    const vNode = el('viewport');
    let mapDataUrl = "";

    // 画像読み込み
    el('file-input').onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            mapDataUrl = ev.target.result;
            const img = el('map-img');
            img.src = mapDataUrl;
            img.onload = () => {
                img.style.display = 'block';
                fitImage();
                showStep(2);
            };
        };
        reader.readAsDataURL(file);
    };

    function fitImage() {
        const img = el('map-img'), vw = vNode.clientWidth, vh = vNode.clientHeight;
        state.scale = Math.min(vw / img.naturalWidth, vh / img.naturalHeight);
        state.offsetX = vw / 2;
        state.offsetY = vh / 2;
        updateTransform();
    }

    // タッチ制御（iPhone最適化）
    let evCache = [];
    let initialDist = 0;
    let initialScale = 1;
    let dragStartX = 0;
    let dragStartY = 0;

    vNode.onpointerdown = e => {
        evCache.push(e);
        vNode.setPointerCapture(e.pointerId);
        if (evCache.length === 1) {
            dragStartX = e.clientX - state.offsetX;
            dragStartY = e.clientY - state.offsetY;
        } else if (evCache.length === 2) {
            initialDist = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
            initialScale = state.scale;
        }
    };

    vNode.onpointermove = e => {
        const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
        if (index === -1) return;
        evCache[index] = e;

        if (evCache.length === 2) {
            const currentDist = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
            const centerX = (evCache[0].clientX + evCache[1].clientX) / 2;
            const centerY = (evCache[0].clientY + evCache[1].clientY) / 2;
            
            if (initialDist > 0) {
                const ratio = currentDist / initialDist;
                const newScale = initialScale * ratio;
                if (newScale > 0.01 && newScale < 100) {
                    // スケール変更に合わせてオフセットを調整（中心基準ズーム）
                    state.offsetX = centerX - (centerX - state.offsetX) * (newScale / state.scale);
                    state.offsetY = centerY - (centerY - state.offsetY) * (newScale / state.scale);
                    state.scale = newScale;
                }
            }
            state.isTracking = false; 
            updateUIControls();
            updateTransform();
        } 
        else if (evCache.length === 1) {
            state.offsetX = e.clientX - dragStartX;
            state.offsetY = e.clientY - dragStartY;
            state.isTracking = false; 
            updateUIControls();
            updateTransform();
        }
    };

    vNode.onpointerup = vNode.onpointercancel = e => {
        if (evCache.length === 1) {
            const currentMoveDist = Math.hypot(e.clientX - (dragStartX + state.offsetX), e.clientY - (dragStartY + state.offsetY));
            if (currentMoveDist < 10) handleTap(e);
        }
        evCache = evCache.filter(ev => ev.pointerId !== e.pointerId);
        if (evCache.length < 2) {
            initialDist = 0;
            if (evCache.length === 1) {
                dragStartX = evCache[0].clientX - state.offsetX;
                dragStartY = evCache[0].clientY - state.offsetY;
            }
        }
    };

    function updateTransform() {
        let mapRotation = 0;
        if (state.rotateMode === 1) mapRotation = -state.mapNorth; 
        if (state.rotateMode === 2) mapRotation = -state.mapNorth - state.userHeading; 
        
        const img = el('map-img');
        const cx = img.naturalWidth / 2;
        const cy = img.naturalHeight / 2;

        // 地図の描画 (中央基準で回転とスケール)
        el('map-container').style.transform = 
            `translate(${state.offsetX}px, ${state.offsetY}px) ` +
            `rotate(${mapRotation}deg) ` +
            `scale(${state.scale}) ` +
            `translate(${-cx}px, ${-cy}px)`;
        
        // 各種ドットの位置更新
        if (state.p1) updateDotPos('p1-dot', state.p1.x, state.p1.y, mapRotation, cx, cy);
        if (state.p2) updateDotPos('p2-dot', state.p2.x, state.p2.y, mapRotation, cx, cy);
        if (state.userPos.x !== 0) updateDotPos('user-dot', state.userPos.x, state.userPos.y, mapRotation, cx, cy);
        
        if (state.metersPerPixel > 0) {
            const barWidth = (50 / state.metersPerPixel) * state.scale;
            el('scale-bar').style.width = Math.max(10, barWidth) + 'px';
        }
    }

    function updateDotPos(id, imgX, imgY, rotation, cx, cy) {
        const rad = rotation * Math.PI / 180;
        // 中心からの相対座標
        const dx = (imgX - cx) * state.scale;
        const dy = (imgY - cy) * state.scale;
        
        // 回転適用
        const rx = dx * Math.cos(rad) - dy * Math.sin(rad);
        const ry = dx * Math.sin(rad) + dy * Math.cos(rad);
        
        const dot = el(id);
        dot.style.left = (state.offsetX + rx) + 'px';
        dot.style.top = (state.offsetY + ry) + 'px';
    }

    function handleTap(e) {
        if (state.step !== 2) return;
        const r = vNode.getBoundingClientRect();
        
        // 回転がある状態でのタップは複雑なため、登録時は回転0を推奨
        // 現在の簡易実装では transform-origin 変更に伴い逆算
        const img = el('map-img');
        const cx = img.naturalWidth / 2;
        const cy = img.naturalHeight / 2;
        
        // 回転0の場合の逆変換
        const x = (e.clientX - r.left - state.offsetX) / state.scale + cx;
        const y = (e.clientY - r.top - state.offsetY) / state.scale + cy;

        state.tempPoint = {x, y};
        const dotId = state.p1 ? 'p2-dot' : 'p1-dot';
        const dot = el(dotId);
        dot.style.display = 'block';
        updateTransform();
    }

    function confirmP1() {
        const lat = parseFloat(el('lat1').value);
        const lng = parseFloat(el('lng1').value);
        if (!state.tempPoint || isNaN(lat) || isNaN(lng)) return alert("地図タップと緯度経度入力を完了してください");
        state.p1 = {...state.tempPoint, lat, lng};
        state.tempPoint = null;
        el('p1-inputs').style.display = 'none';
        el('p2-inputs').style.display = 'block';
        el('guide').innerText = "P2(緑)をタップして「登録」";
    }

    function confirmP2() {
        const lat = parseFloat(el('lat2').value);
        const lng = parseFloat(el('lng2').value);
        if (!state.tempPoint || isNaN(lat) || isNaN(lng)) return alert("地図タップと緯度経度入力を完了してください");
        state.p2 = {...state.tempPoint, lat, lng};
        calculateMapLogic();
        showStep(3);
    }

    function calculateMapLogic() {
        const p1 = state.p1, p2 = state.p2;
        const R = 6371000;
        const dLat = (p2.lat - p1.lat) * Math.PI / 180;
        const dLng = (p2.lng - p1.lng) * Math.PI / 180;
        const a = Math.sin(dLat/2) ** 2 + Math.cos(p1.lat * Math.PI/180) * Math.cos(p2.lat * Math.PI/180) * Math.sin(dLng/2) ** 2;
        const distanceMeters = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        const pixelDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        state.metersPerPixel = distanceMeters / pixelDist;
        
        const bearingGps = Math.atan2(dLng, dLat) * 180 / Math.PI;
        const bearingImg = Math.atan2(p2.x - p1.x, p1.y - p2.y) * 180 / Math.PI;
        state.mapNorth = bearingImg - bearingGps;
    }

    function saveAndStart() {
        el('ui-overlay').style.display = 'flex';
        showStep(4);
        
        if (!navigator.geolocation) {
            el('status').innerText = "GPS非対応デバイスです";
            return;
        }

        navigator.geolocation.watchPosition(p => {
            const {latitude: lat, longitude: lng, accuracy} = p.coords;
            el('status').innerText = `精度: ±${accuracy.toFixed(0)}m / Lat: ${lat.toFixed(5)}`;
            
            // 座標計算の改善
            const dLng = state.p2.lng - state.p1.lng;
            const dLat = state.p2.lat - state.p1.lat;
            if (dLng !== 0 && dLat !== 0) {
                const ratioX = (lng - state.p1.lng) / dLng;
                const ratioY = (lat - state.p1.lat) / dLat;
                const px = state.p1.x + ratioX * (state.p2.x - state.p1.x);
                const py = state.p1.y + ratioY * (state.p2.y - state.p1.y);
                
                state.userPos = {x: px, y: py};
                el('user-dot').style.display = 'block';
                
                if (state.isTracking) centerOn(px, py);
                else updateTransform();
            }
        }, err => {
            el('status').innerText = "GPSエラー: " + err.message;
        }, {enableHighAccuracy: true, maximumAge: 0, timeout: 10000});
    }

    function centerOn(x, y) {
        const vw = vNode.clientWidth, vh = vNode.clientHeight;
        state.offsetX = vw / 2;
        state.offsetY = vh / 2;
        
        const img = el('map-img');
        const cx = img.naturalWidth / 2;
        const cy = img.naturalHeight / 2;

        // 現在地が画面中央にくるようにオフセットを逆算
        // 回転を考慮した中心合わせは複雑なため、シンプルに現在地へのオフセットをセット
        state.offsetX = vw/2 - (x - cx) * state.scale;
        state.offsetY = vh/2 - (y - cy) * state.scale;
        
        updateTransform();
    }

    function cycleRotateMode() {
        state.rotateMode = (state.rotateMode + 1) % 3;
        el('btn-rotate').innerText = ['🧭', '⬆️N', '🏃⬆️'][state.rotateMode];
        el('btn-rotate').classList.toggle('active-mode', state.rotateMode > 0);
        updateTransform();
    }

    function toggleTracking() {
        state.isTracking = !state.isTracking;
        updateUIControls();
        if(state.isTracking && state.userPos.x !== 0) centerOn(state.userPos.x, state.userPos.y);
    }

    function updateUIControls() {
        el('btn-lock').classList.toggle('active-mode', state.isTracking);
    }

    function showStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        el('s' + n).classList.add('active');
        state.step = n;
    }

    async function askGyro() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res !== 'granted') return alert("方位計の利用が拒否されました");
            } catch (e) { console.error(e); }
        }
        window.addEventListener('deviceorientation', e => {
            // iOS用のコンパス方位優先、なければ alpha
            const heading = e.webkitCompassHeading || (360 - e.alpha);
            if (heading !== undefined) {
                state.userHeading = heading;
                el('user-dot').style.transform = `translate(-50%, -70%) rotate(${state.userHeading}deg)`;
                if (state.rotateMode === 2) updateTransform();
            }
        }, true);
        el('gyro-btn').style.display = 'none';
    }
</script>
</body>
</html>
