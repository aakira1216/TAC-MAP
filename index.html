<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Map PWA</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: rgba(30, 30, 30, 0.85);
            --accent-color: #00ff00;
            --text-color: #ffffff;
            --disabled-color: #555555;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* 上部情報ウィンドウ */
        .info-panel {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--bg-color);
            padding: 5px 10px;
            border-radius: 5px;
            color: var(--text-color);
            display: flex;
            gap: 15px;
            font-size: 14px;
            white-space: nowrap;
            border: 1px solid var(--accent-color);
        }

        /* 左側ボタンコンテナ */
        .side-controls {
            position: absolute;
            left: 10px;
            bottom: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 横向き画面時のボタン配置修正 (下から 終了 > HUD > その他) */
        @media (orientation: landscape) {
            .side-controls {
                flex-direction: column-reverse; /* 下から順に配置 */
            }
        }

        .btn {
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--accent-color);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            min-width: 60px;
        }

        .btn:active { background: var(--accent-color); color: #000; }

        /* グレーアウト用スタイル */
        .btn-disabled {
            border-color: var(--disabled-color) !important;
            color: var(--disabled-color) !important;
            pointer-events: none; /* クリック不可 */
            opacity: 0.6;
        }

        .exit-btn { width: 50px; border-color: #ff4444; color: #ff4444; }

        /* スケールバー調整 */
        .leaflet-control-scale { margin-bottom: 20px !important; }
    </style>
</head>
<body>

<div class="info-panel" id="gps-info">
    <span>GPS: <span id="accuracy">--</span>m</span>
    <span>ALT: <span id="altitude">--</span>m</span>
</div>

<div id="map"></div>

<div class="side-controls">
    <!-- 終了ボタン (Landscapeで一番下) -->
    <button class="btn exit-btn" onclick="window.close()">終了</button>
    
    <!-- HUD設定ボタン -->
    <button class="btn" id="hud-toggle" onclick="toggleHudMode()">HUD設定</button>
    
    <!-- マップ方向モードボタン (目標追加中はグレーアウト) -->
    <button class="btn" id="dir-mode-btn" onclick="cycleDirectionMode()">方位固定</button>
    
    <!-- 方位許可ボタン -->
    <button class="btn" onclick="requestOrientation()">方位許可</button>
    
    <!-- センタリングボタン (常に使用可能) -->
    <button class="btn" id="center-btn" onclick="toggleCenter()">追従ON</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, userMarker, accuracyCircle;
    let isCentering = true;
    let dirMode = 0; // 0:固定, 1:進行方向, 2:北上
    let isHudTargetMode = false; // HUD新規目標追加モード状態

    // マップ初期化
    map = L.map('map', { zoomControl: false, attributionControl: false }).setView([35.6812, 139.7671], 18);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
    L.control.scale({ imperial: false, maxWidth: 100 }).addTo(map);

    // GPS取得
    navigator.geolocation.watchPosition(pos => {
        const { latitude, longitude, accuracy, altitude } = pos.coords;
        const latlng = [latitude, longitude];

        document.getElementById('accuracy').innerText = Math.round(accuracy);
        document.getElementById('altitude').innerText = altitude ? Math.round(altitude) : "--";

        if (!userMarker) {
            userMarker = L.circleMarker(latlng, { color: '#00ff00', radius: 8, fillOpacity: 1 }).addTo(map);
            accuracyCircle = L.circle(latlng, { radius: accuracy, color: '#00ff00', weight: 1, fillOpacity: 0.1 }).addTo(map);
        } else {
            userMarker.setLatLng(latlng);
            accuracyCircle.setLatLng(latlng).setRadius(accuracy);
        }

        if (isCentering) map.panTo(latlng);
    }, err => console.error(err), { enableHighAccuracy: true });

    // センタリング切替
    function toggleCenter() {
        isCentering = !isCentering;
        document.getElementById('center-btn').innerText = isCentering ? "追従ON" : "追従OFF";
    }

    // 方向モード切替
    function cycleDirectionMode() {
        if (isHudTargetMode) return; // モードロック中は動作させない
        dirMode = (dirMode + 1) % 3;
        const labels = ["方位固定", "進行方向", "北上固定"];
        document.getElementById('dir-mode-btn').innerText = labels[dirMode];
    }

    // HUD設定モード（シミュレーション）
    function toggleHudMode() {
        isHudTargetMode = !isHudTargetMode;
        const hudBtn = document.getElementById('hud-toggle');
        const dirBtn = document.getElementById('dir-mode-btn');

        if (isHudTargetMode) {
            hudBtn.style.backgroundColor = "var(--accent-color)";
            hudBtn.style.color = "#000";
            // マップ方向ボタンをグレーアウト
            dirBtn.classList.add('btn-disabled');
            console.log("目標追加モード: マップ向きを固定しました。");
        } else {
            hudBtn.style.backgroundColor = "var(--bg-color)";
            hudBtn.style.color = "var(--text-color)";
            // グレーアウト解除
            dirBtn.classList.remove('btn-disabled');
        }
    }

    // 方位センサー許可
    function requestOrientation() {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => {
                if (res === 'granted') window.addEventListener('deviceorientation', handleOrientation);
            });
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }
    }

    function handleOrientation(e) {
        // 方位制御ロジック（省略）
    }

    // マップタップ時の挙動
    map.on('click', (e) => {
        if (isHudTargetMode) {
            L.marker(e.latlng).addTo(map).bindPopup("目標地点").openPopup();
            // 目標追加後にモードを自動解除する場合などはここに追記
        }
    });

</script>
</body>
</html>
