<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Map Tracker Pro v15.0 - Ultimate</title>
    <style>
        :root { 
            --bg: #0f172a; --panel-bg: rgba(30, 41, 59, 0.9); --accent: #3b82f6; 
            --success: #10b981; --danger: #ef4444; --text: #f8fafc;
            --glass: rgba(15, 23, 42, 0.6); --glass-border: rgba(255, 255, 255, 0.2);
            --btn-bg: rgba(255, 255, 255, 0.1);
        }
        body { margin: 0; background: #000; color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100dvh; width: 100%; position: fixed; }
        
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        #map-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
        #map-img { display: none; pointer-events: none; vertical-align: top; }
        
        .dot { 
            position: absolute; width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff; 
            transform: translate(-50%, -50%); display: none; z-index: 100; pointer-events: none; 
            transform-origin: center;
        }
        #p1-dot { background: var(--danger); }
        #p2-dot { background: var(--success); }
        #temp-target-dot { z-index: 110; border: 2px solid #000; box-shadow: 0 0 5px #fff; } 
        
        .target-marker { 
            position: absolute; font-weight: bold; font-size: 20px; 
            transform-origin: center; z-index: 105; pointer-events: none; text-shadow: 0 0 4px #000;
            display: flex; align-items: center; justify-content: center; width: 30px; height: 30px;
        }

        #user-container { position: absolute; pointer-events: none; display: none; z-index: 110; }
        #user-dot-wrapper { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #user-dot { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 24px solid var(--accent); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -70%); }
        
        #hud-visual { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        #hud-info-list { 
            position: absolute; top: 50px; left: 50%; transform: translateX(-50%); 
            display: flex; flex-direction: column; align-items: flex-start;
            gap: 2px; padding: 6px 12px; border-radius: 10px;
            background: var(--glass); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            min-width: max-content; pointer-events: none;
        }
        .hud-row { 
            font-size: 13px; font-weight: 900; text-shadow: 1px 1px 2px #000; 
            font-family: 'SF Mono', Menlo, monospace; white-space: nowrap;
            display: flex; align-items: center;
        }

        #line-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 90; }

        #scale-bar-container { 
            position: fixed; bottom: 116px; right: 15px; z-index: 1001; pointer-events: none; display: none; 
            flex-direction: column; align-items: center; 
            background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 8px; border-radius: 12px; border: 1px solid var(--glass-border); width: 110px; 
        }
        #scale-label { font-size: 12px; font-weight: 900; text-shadow: 0 0 4px #000; margin-bottom: 4px; font-family: monospace; color: white; }
        #scale-bar { height: 4px; width: 100px; background: linear-gradient(90deg, #fff 50%, #000 50%); background-size: 20px 100%; border: 1px solid #fff; }

        #panel { position: fixed; bottom: 20px; left: 15px; right: 15px; padding: 15px; background: var(--panel-bg); backdrop-filter: blur(15px); border-radius: 20px; z-index: 1000; border: 1px solid rgba(255,255,255,0.1); }
        .step { display: none; } .active { display: block; }
        button { width: 100%; padding: 14px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; touch-action: manipulation; transition: transform 0.1s, background-color 0.2s; }
        button:active:not(:disabled) { transform: scale(0.96); opacity: 0.8; }
        button:disabled { opacity: 0.3; filter: grayscale(1); pointer-events: none; }

        .blue { background: var(--accent); color: white; } 
        .red { background: var(--danger); color: white; } 
        .outline { background: var(--btn-bg); border: 1px solid rgba(255,255,255,0.4); color: white; }
        .outline-danger { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: white; }

        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: white; box-sizing: border-box; }

        #hud-config-panel, #target-setting-panel { display: none; position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: var(--panel-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--accent); z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .target-list-row { display: grid; grid-template-columns: 20px 1.2fr 1fr 1fr 1fr 1.5fr; gap: 4px; align-items: center; padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.1); font-size: 11px; }

        #ui-overlay { position: fixed; top: 44px; right: 15px; display: none; flex-direction: column; gap: 12px; z-index: 1002; }
        .ui-btn { width: 50px; height: 50px; background: var(--panel-bg); color: white; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .ui-btn.disabled { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        
        #target-guide { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: var(--panel-bg); backdrop-filter: blur(10px); border: 1px solid var(--accent); padding: 15px; border-radius: 15px; font-weight: bold; display: none; z-index: 3000; text-align: center; width: 240px; }
        .coord-row { display: flex; align-items: center; gap: 4px; }
    </style>
</head>
<body>

<svg id="line-svg"></svg>
<div id="scale-bar-container"><div id="scale-label">---m</div><div id="scale-bar"></div></div>

<div id="target-guide">
    <div id="target-guide-text" style="margin-bottom:12px;"></div>
    <div style="display:flex; gap:10px;">
        <button id="target-decide-btn" class="blue" style="margin:0; padding:10px; flex:1;">決定</button>
        <button id="target-cancel-btn" class="outline" style="margin:0; padding:10px; flex:1;" onclick="cancelTargeting()">戻る</button>
    </div>
</div>

<div id="target-setting-panel">
    <p style="text-align:center; font-weight:bold;">続けて次の目標を設定しますか？</p>
    <div style="display:flex; gap:10px;">
        <button class="blue" onclick="continueTargetFlow()">はい</button>
        <button class="outline" onclick="closeTargetFlow()">いいえ</button>
    </div>
</div>

<div id="hud-config-panel">
    <h3 style="margin:0 0 10px 0; text-align:center; color:var(--accent);">HUD設定</h3>
    <div style="display:flex;justify-content:space-between;margin:10px 0;"><span>HUD表示</span><input type="checkbox" id="hud-enable" onchange="updateHudSettings()" style="width:20px"></div>
    <div style="display:flex;justify-content:space-between;margin:10px 0;"><span>サークル半径</span><select id="hud-radius-select" onchange="updateHudSettings()" style="background:#1a1a1a;color:white;"></select></div>
    <div style="display:flex;justify-content:space-between;margin:10px 0;"><span>新規目標</span><input type="checkbox" id="target-enable" onchange="handleTargetCheck(this)" style="width:20px"></div>
    <div id="target-config-list" style="max-height:220px; overflow-y:auto; border-top:1px solid #444; margin-top:10px;"></div>
    <button class="blue" onclick="toggleHudConfig()" style="margin-top:15px">閉じる</button>
</div>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="viewport">
    <div id="map-container">
        <img id="map-img">
        <div id="p1-dot" class="dot"></div>
        <div id="p2-dot" class="dot"></div>
        <div id="temp-target-dot" class="dot"></div>
        <div id="target-layer"></div>
    </div>
    <div id="user-container">
        <div id="user-dot-wrapper">
             <div id="user-dot"></div>
             <svg id="hud-visual" width="1000" height="1000" viewBox="0 0 1000 1000">
                <circle cx="500" cy="500" r="0" fill="rgba(59, 130, 246, 0.1)" stroke="rgba(59, 130, 246, 0.4)" stroke-width="2" id="hud-circle" />
                <path id="hud-wedge" fill="rgba(59, 130, 246, 0.2)" stroke="rgba(59, 130, 246, 0.5)" stroke-width="2" />
            </svg>
        </div>
        <div id="hud-info-list" style="display:none;"></div>
    </div>
</div>

<div id="panel">
    <div id="s0" class="step active"><h3 style="margin:0;color:var(--accent)">Map Tracker Pro</h3><button class="blue" onclick="startNewMap()">＋ 新規マップ</button><button class="outline" onclick="showMapList()">📂 保存した地図</button></div>
    <div id="s2" class="step"><p id="guide" style="margin:0 0 5px 0; font-weight:bold;">地点1をタップ</p>
        <div id="p1-inputs"><div class="coord-row"><input type="text" id="lat1_int" placeholder="35">. <input type="text" id="lat1_dec" placeholder="00000"></div><div class="coord-row"><input type="text" id="lng1_int" placeholder="135">. <input type="text" id="lng1_dec" placeholder="00000"></div><button onclick="confirmP1()" class="red">P1登録</button></div>
        <div id="p2-inputs" style="display:none"><div class="coord-row"><input type="text" id="lat2_int" placeholder="35">. <input type="text" id="lat2_dec" placeholder="00001"></div><div class="coord-row"><input type="text" id="lng2_int" placeholder="135">. <input type="text" id="lng2_dec" placeholder="00001"></div><button onclick="confirmP2()" class="blue" style="background:var(--success)">P2登録</button></div>
    </div>
    <div id="s4" class="step">
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div id="status" style="font-size:13px; font-weight:bold; color:var(--text); flex-shrink:0;">GPS待機中...</div>
                <div style="display:flex; gap:6px; align-items:center;">
                    <button id="gyro-btn" onclick="askGyro()" class="blue" style="margin:0; padding:8px 10px; font-size:12px; width:auto; height:36px; white-space:nowrap;">🧭 方位許可</button>
                    <button id="btn-hud-config" onclick="toggleHudConfig()" class="outline" style="padding:8px; font-size:12px; width:80px; margin:0; height:36px;">HUD設定</button>
                    <button id="btn-exit" onclick="exitApp()" class="outline-danger" style="padding:8px; font-size:12px; width:50px; margin:0; height:36px;">終了</button>
                </div>
            </div>
        </div>
    </div>
    <div id="s-list" class="step"><div id="map-list-container" style="max-height:300px; overflow-y:auto; margin-bottom:10px;"></div><button class="outline" onclick="showStep(0)">戻る</button></div>
</div>

<script>
    const DB_NAME = "MapTrackerDB", STORE_NAME = "maps";
    let db, pointers = [], lastDist = 0, lastPoint = null, ticking = false, locationHistory = []; 

    const state = { 
        step: 0, p1: null, p2: null, scale: 1, x: 0, y: 0, 
        isTracking: true, rotateMode: 0, mapNorth: 0, metersPerPixel: 0,
        userPos: {x:0, y:0}, userHeading: 0, userAcc: 0, tempPoint: null,
        hudOn: false, hudRadius: 20,
        targets: [], targetMode: false, currentTargetLetter: null,
        colors: ["#facc15", "#a855f7", "#f97316", "#22d3ee", "#fb7185"],
        lastRot: 0, lastRotateMode: 0 
    };

    function haptic() { if (window.navigator.vibrate) window.navigator.vibrate(10); }

    const initDB = () => new Promise(r => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => { db = e.target.result; r(); };
    });

    const el = id => document.getElementById(id), vNode = el('viewport'), container = el('map-container');
    for(let r=5; r<=50; r+=5){ const opt=document.createElement('option'); opt.value=r; opt.textContent=r; if(r===20)opt.selected=true; el('hud-radius-select').appendChild(opt); }

    window.onload = async () => { await initDB(); };

    function showStep(n){ haptic(); document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); if(el('s'+n)) el('s'+n).classList.add('active'); state.step=n; }
    
    function startNewMap() { 
        haptic();
        const input = document.createElement('input'); input.type='file'; input.accept='image/*'; 
        input.onchange=e=>{
            const file=e.target.files[0]; if(!file)return; state.currentImgBlob=file; 
            const img = el('map-img'); img.src = URL.createObjectURL(file); 
            img.onload = () => { img.style.display='block'; fitImage(); showStep(2); };
        }; input.click(); 
    }
    
    async function showMapList() {
        haptic(); showStep('-list'); const listEl = el('map-list-container'); listEl.innerHTML = "読込中...";
        const tx = db.transaction(STORE_NAME, "readonly");
        const maps = await new Promise(r => { tx.objectStore(STORE_NAME).getAll().onsuccess = e => r(e.target.result); });
        listEl.innerHTML = maps.length ? "" : "保存なし";
        maps.forEach(m => {
            const d = document.createElement('div'); d.style="display:flex;align-items:center;gap:5px;margin-bottom:8px;background:rgba(255,255,255,0.05);padding:10px;border-radius:10px";
            d.innerHTML = `<span style="flex:1;font-size:13px;font-weight:bold">${m.name}</span>
                <button class="blue" style="width:50px;padding:8px;margin:0;font-size:11px" onclick="loadMap(${m.id})">開く</button>
                <button class="red" style="width:50px;padding:8px;margin:0;font-size:11px" onclick="deleteMap(${m.id})">削除</button>`;
            listEl.appendChild(d);
        });
    }

    async function deleteMap(id) { haptic(); if(!confirm("この地図を削除しますか？")) return; const tx = db.transaction(STORE_NAME, "readwrite"); tx.objectStore(STORE_NAME).delete(id); showMapList(); }

    async function loadMap(id) {
        haptic();
        const tx = db.transaction(STORE_NAME, "readonly");
        const data = await new Promise(r => { tx.objectStore(STORE_NAME).get(id).onsuccess = e => r(e.target.result); });
        state.p1 = data.p1; state.p2 = data.p2; state.mapNorth = data.mapNorth; state.metersPerPixel = data.metersPerPixel;
        const img = el('map-img'); img.src = URL.createObjectURL(data.image);
        img.onload = () => { img.style.display='block'; fitImage(); saveAndStart(); };
    }

    function fitImage() {
        const img = el('map-img'), vw = vNode.clientWidth, vh = vNode.clientHeight;
        state.scale = Math.min(vw/img.naturalWidth, vh/img.naturalHeight)*0.8;
        state.x = vw/2 - (img.naturalWidth/2*state.scale); state.y = vh/2 - (img.naturalHeight/2*state.scale);
        requestRender();
    }

    vNode.addEventListener('pointerdown', e => {
        vNode.setPointerCapture(e.pointerId); pointers.push(e);
        if(pointers.length === 1) lastPoint = { x: e.clientX, y: e.clientY };
        else if(pointers.length === 2) lastDist = Math.hypot(pointers[0].clientX - pointers[1].clientX, pointers[0].clientY - pointers[1].clientY);
    });

    vNode.addEventListener('pointermove', e => {
        const idx = pointers.findIndex(p => p.pointerId === e.pointerId); if(idx === -1) return; pointers[idx] = e;
        if(pointers.length === 1 && lastPoint) {
            state.x += e.clientX - lastPoint.x; state.y += e.clientY - lastPoint.y;
            lastPoint = { x: e.clientX, y: e.clientY }; state.isTracking = false;
        } else if(pointers.length === 2) {
            const midX = (pointers[0].clientX + pointers[1].clientX) / 2, midY = (pointers[0].clientY + pointers[1].clientY) / 2;
            const dist = Math.hypot(pointers[0].clientX - pointers[1].clientX, pointers[0].clientY - pointers[1].clientY);
            const zoom = dist / lastDist; state.scale *= zoom;
            state.x = midX - (midX - state.x) * zoom; state.y = midY - (midY - state.y) * zoom;
            lastDist = dist; state.isTracking = false;
        }
        requestRender();
    });

    const endPointer = e => {
        if(pointers.length === 1 && (state.step === 2 || state.targetMode)) handleTap(e);
        pointers = pointers.filter(p => p.pointerId !== e.pointerId);
        if(pointers.length < 2) lastDist = 0; if(pointers.length === 0) lastPoint = null;
    };
    vNode.addEventListener('pointerup', endPointer); vNode.addEventListener('pointercancel', endPointer);

    function handleTap(e) {
        const vw = vNode.clientWidth, vh = vNode.clientHeight;
        const rot = (state.rotateMode === 1) ? -state.mapNorth : (state.rotateMode === 2) ? -state.mapNorth - state.userHeading : 0;
        const rad = -rot * Math.PI / 180; 
        const sx = vw / 2, sy = (state.rotateMode === 2) ? vh * 0.7 : vh / 2;
        const dx = e.clientX - sx, dy = e.clientY - sy;
        const rx = dx * Math.cos(rad) - dy * Math.sin(rad), ry = dx * Math.sin(rad) + dy * Math.cos(rad);
        state.tempPoint = { x: (rx + sx - state.x) / state.scale, y: (ry + sy - state.y) / state.scale };
        requestRender();
    }

    function requestRender() { if(!ticking) { window.requestAnimationFrame(() => { render(); ticking = false; }); ticking = true; } }
    
    function render() {
        const vw = vNode.clientWidth, vh = vNode.clientHeight;
        const rot = (state.rotateMode === 1) ? -state.mapNorth : (state.rotateMode === 2) ? -state.mapNorth - state.userHeading : 0;
        const rad = rot * Math.PI / 180;
        const sx = vw / 2, sy = (state.rotateMode === 2) ? vh * 0.7 : vh / 2;

        if(state.isTracking && state.userPos.x){
            state.x = sx - (state.userPos.x * state.scale * Math.cos(rad) - state.userPos.y * state.scale * Math.sin(rad));
            state.y = sy - (state.userPos.x * state.scale * Math.sin(rad) + state.userPos.y * state.scale * Math.cos(rad));
        } else if (state.lastRot !== undefined && state.lastRot !== rot && state.lastRotateMode === state.rotateMode) {
            const diffRad = (rot - state.lastRot) * Math.PI / 180;
            const cos = Math.cos(diffRad), sin = Math.sin(diffRad);
            const dx = state.x - sx, dy = state.y - sy;
            state.x = sx + (dx * cos - dy * sin); state.y = sy + (dx * sin + dy * cos);
        }
        state.lastRot = rot; state.lastRotateMode = state.rotateMode;
        container.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${rot}deg) scale(${state.scale})`;
        
        if(state.metersPerPixel) {
            el('scale-bar-container').style.display = 'flex';
            const totalMeters = 100 * (state.metersPerPixel / state.scale);
            let labelText = totalMeters >= 1000 ? (totalMeters/1000).toFixed(2)+"km" : (totalMeters>=10 ? Math.round(totalMeters)+"m" : totalMeters.toFixed(1)+"m");
            el('scale-label').innerText = labelText;
        }

        const updP = (id, p, color) => { 
            const d = el(id); 
            if(p && state.step === 2){ 
                d.style.left = p.x + 'px'; d.style.top = p.y + 'px'; d.style.display = 'block'; 
                if(color) d.style.backgroundColor = color; 
                d.style.transform = `translate(-50%, -50%) rotate(${-rot}deg) scale(${1/state.scale})`;
            } else d.style.display = 'none'; 
        };
        updP('p1-dot', state.p1 || (state.step === 2 && !state.p1 ? state.tempPoint : null), 'var(--danger)');
        updP('p2-dot', state.p2 || (state.step === 2 && state.p1 ? state.tempPoint : null));
        
        const ttDot = el('temp-target-dot');
        if(state.targetMode && state.tempPoint) {
            ttDot.style.left = state.tempPoint.x + 'px'; ttDot.style.top = state.tempPoint.y + 'px'; ttDot.style.display = 'block';
            ttDot.style.backgroundColor = state.colors[["A","B","C","D","E"].indexOf(state.currentTargetLetter)];
            ttDot.style.transform = `translate(-50%, -50%) rotate(${-rot}deg) scale(${1/state.scale})`;
        } else ttDot.style.display = 'none';

        const tLayer = el('target-layer'); tLayer.innerHTML = '';
        const lineSvg = el('line-svg'); lineSvg.innerHTML = '';
        const infoList = el('hud-info-list'); infoList.innerHTML = '';
        const uPosScreen = state.userPos.x ? { sx: state.x + (state.userPos.x * state.scale * Math.cos(rad) - state.userPos.y * state.scale * Math.sin(rad)), sy: state.y + (state.userPos.x * state.scale * Math.sin(rad) + state.userPos.y * state.scale * Math.cos(rad)) } : null;

        // 最短距離地点の特定
        let minDist = Infinity, nearestId = null;
        if(uPosScreen) {
            state.targets.forEach(t => {
                const d = Math.hypot(t.x - state.userPos.x, t.y - state.userPos.y);
                if(d < minDist) { minDist = d; nearestId = t.id; }
            });
        }

        state.targets.forEach((t, i) => {
            const m = document.createElement('div'); m.className = 'target-marker'; m.innerText = t.id; m.style.color = t.color; m.style.left = t.x + 'px'; m.style.top = t.y + 'px';
            m.style.transform = `translate(-50%, -50%) rotate(${-rot}deg) scale(${1/state.scale})`;
            tLayer.appendChild(m);
            if(uPosScreen) {
                const tx = state.x + (t.x * state.scale * Math.cos(rad) - t.y * state.scale * Math.sin(rad)), ty = state.y + (t.x * state.scale * Math.sin(rad) + t.y * state.scale * Math.cos(rad));
                const distM = Math.round(Math.hypot(t.x - state.userPos.x, t.y - state.userPos.y) * state.metersPerPixel);
                let bearing = (Math.round(Math.atan2(t.x - state.userPos.x, state.userPos.y - t.y) * 180 / Math.PI + state.mapNorth) + 360) % 360;
                if(t.showLine) { const line = document.createElementNS("http://www.w3.org/2000/svg", "line"); line.setAttribute("x1", uPosScreen.sx); line.setAttribute("y1", uPosScreen.sy); line.setAttribute("x2", tx); line.setAttribute("y2", ty); line.setAttribute("stroke", t.color); line.setAttribute("stroke-width", "2"); line.setAttribute("stroke-dasharray", "6,4"); lineSvg.appendChild(line); }
                if(t.showDist || t.showDir) { 
                    const row = document.createElement('div'); row.className = 'hud-row'; row.style.color = t.color; 
                    const prefix = (t.id === nearestId) ? '<span style="margin-right:6px">🔴</span>' : '<span style="margin-right:6px;visibility:hidden">🔴</span>';
                    row.innerHTML = `${prefix}${t.id}: ${t.showDist?distM.toString().padStart(4, ' ')+'m ':''}${t.showDir?bearing.toString().padStart(3, ' ')+'°':''}`; 
                    infoList.appendChild(row); 
                }
            }
        });

        const uContainer = el('user-container');
        if(uPosScreen){
            uContainer.style.left = uPosScreen.sx + 'px'; uContainer.style.top = uPosScreen.sy + 'px'; uContainer.style.display = 'block';
            el('user-dot-wrapper').style.transform = `translate(-50%, -50%) rotate(${state.userHeading + state.mapNorth + rot}deg)`;
            const pxRadius = state.hudOn ? (state.hudRadius / state.metersPerPixel) * state.scale : 0; el('hud-circle').setAttribute('r', pxRadius);
            const sA = -60*Math.PI/180, eA = 60*Math.PI/180;
            const x1 = 500+pxRadius*Math.sin(sA), y1 = 500-pxRadius*Math.cos(sA), x2 = 500+pxRadius*Math.sin(eA), y2 = 500-pxRadius*Math.cos(eA);
            el('hud-wedge').setAttribute('d', pxRadius > 0 ? `M 500 500 L ${x1} ${y1} A ${pxRadius} ${pxRadius} 0 0 1 ${x2} ${y2} Z` : '');
            infoList.style.display = (infoList.children.length > 0) ? 'flex' : 'none';
        } else {
            uContainer.style.display = 'none';
            infoList.style.display = 'none';
        }

        el('btn-lock').style.borderColor = state.isTracking ? 'var(--accent)' : 'rgba(255,255,255,0.2)';
        if(state.targetMode) el('btn-rotate').classList.add('disabled'); else el('btn-rotate').classList.remove('disabled');
    }

    function handleTargetCheck(cb) { if(cb.checked) { haptic(); el('hud-config-panel').style.display='none'; state.rotateMode = 0; el('btn-rotate').innerText = '🧭'; startTargetFlow(); } }
    function startTargetFlow(targetLetter = null) {
        const ids = ["A","B","C","D","E"]; 
        if(!targetLetter) { const nextIdx = state.targets.length; if(nextIdx >= 5) return; state.currentTargetLetter = ids[nextIdx]; } else state.currentTargetLetter = targetLetter;
        state.targetMode = true; el('target-guide').style.display='block';
        el('target-guide-text').innerHTML = `目標 <span style="color:${state.colors[ids.indexOf(state.currentTargetLetter)]}">${state.currentTargetLetter}</span> を指定`;
        el('target-decide-btn').onclick = () => {
            haptic(); if(!state.tempPoint) return;
            const idx = state.targets.findIndex(t => t.id === state.currentTargetLetter);
            const newTarget = { id: state.currentTargetLetter, x: state.tempPoint.x, y: state.tempPoint.y, color: state.colors[ids.indexOf(state.currentTargetLetter)], showDist: true, showDir: true, showLine: true };
            if(idx > -1) state.targets[idx] = newTarget; else state.targets.push(newTarget);
            state.tempPoint = null; state.targetMode = false; el('target-guide').style.display = 'none';
            if(idx === -1 && state.targets.length < 5) el('target-setting-panel').style.display = 'block'; else el('hud-config-panel').style.display = 'block';
            buildTargetConfigList(); requestRender();
        };
    }
    function continueTargetFlow() { haptic(); el('target-setting-panel').style.display = 'none'; startTargetFlow(); }
    function cancelTargeting() { haptic(); state.targetMode = false; state.tempPoint = null; el('target-guide').style.display = 'none'; el('hud-config-panel').style.display = 'block'; el('target-enable').checked = false; requestRender(); }
    function closeTargetFlow() { haptic(); el('target-setting-panel').style.display='none'; el('hud-config-panel').style.display='block'; el('target-enable').checked = false; }
    function buildTargetConfigList() {
        const list = el('target-config-list'); list.innerHTML = '';
        state.targets.forEach((t, i) => {
            const row = document.createElement('div'); row.className = 'target-list-row'; row.style.color = t.color;
            row.innerHTML = `<span>${t.id}</span>
                <label><input type="checkbox" ${t.showDist?'checked':''} onchange="state.targets[${i}].showDist=this.checked;requestRender()">距離</label>
                <label><input type="checkbox" ${t.showDir?'checked':''} onchange="state.targets[${i}].showDir=this.checked;requestRender()">方位</label>
                <label><input type="checkbox" ${t.showLine?'checked':''} onchange="state.targets[${i}].showLine=this.checked;requestRender()">線</label>
                <button class="outline" style="padding:4px;margin:0;font-size:10px;width:100%" onclick="reTarget('${t.id}')">変更</button>`;
            list.appendChild(row);
        });
    }
    function reTarget(letter) { haptic(); el('hud-config-panel').style.display='none'; state.rotateMode = 0; el('btn-rotate').innerText = '🧭'; startTargetFlow(letter); }
    function confirmP1() { haptic(); const lat=parseCoord(el('lat1_int').value, el('lat1_dec').value), lng=parseCoord(el('lng1_int').value, el('lng1_dec').value); if(!state.tempPoint||isNaN(lat))return; state.p1={...state.tempPoint, lat, lng}; state.tempPoint=null; el('p1-inputs').style.display='none'; el('p2-inputs').style.display='block'; el('guide').innerText="地点2をタップ"; requestRender(); }
    function parseCoord(i, d) { const c=(i+" "+d).replace(/[^0-9.\-\s]/g,' ').trim().split(/\s+/); if(!c[0])return NaN; if(c.length===2 && !i.includes(" ")) return parseFloat(i+"."+d); let deg=parseFloat(c[0])||0, min=parseFloat(c[1])||0, sec=parseFloat(c[2])||0; return (Math.abs(deg)+(min/60)+(sec/3600))*(deg<0?-1:1); }
    async function confirmP2() { 
        haptic(); const lat=parseCoord(el('lat2_int').value, el('lat2_dec').value), lng=parseCoord(el('lng2_int').value, el('lng2_dec').value); if(!state.tempPoint||isNaN(lat))return; 
        state.p2={...state.tempPoint, lat, lng}; const p1=state.p1, p2=state.p2, r=Math.PI/180;
        state.metersPerPixel = (6371000 * Math.acos(Math.sin(p1.lat*r)*Math.sin(p2.lat*r)+Math.cos(p1.lat*r)*Math.cos(p2.lat*r)*Math.cos((p2.lng-p1.lng)*r))) / Math.hypot(p2.x-p1.x, p2.y-p1.y);
        state.mapNorth = (Math.atan2(p2.x-p1.x, p1.y-p2.y)*180/Math.PI) - (Math.atan2(p2.lng-p1.lng, p2.lat-p1.lat)*180/Math.PI);
        const name = prompt("地図名", "Map_" + new Date().toLocaleTimeString());
        if(name) { const tx = db.transaction(STORE_NAME, "readwrite"); tx.objectStore(STORE_NAME).add({ name, image: state.currentImgBlob, p1: state.p1, p2: state.p2, mapNorth: state.mapNorth, metersPerPixel: state.metersPerPixel }); }
        saveAndStart(); 
    }
    function saveAndStart() { 
        showStep(4); el('ui-overlay').style.display='flex'; 
        navigator.geolocation.watchPosition(p => { 
            if(p.coords.accuracy>35)return; state.userAcc=p.coords.accuracy; 
            locationHistory.push({lat:p.coords.latitude, lng:p.coords.longitude}); if(locationHistory.length>3)locationHistory.shift(); 
            const aLat=locationHistory.reduce((s,c)=>s+c.lat,0)/locationHistory.length, aLng=locationHistory.reduce((s,c)=>s+c.lng,0)/locationHistory.length; 
            state.userPos={x:state.p1.x+(aLng-state.p1.lng)/(state.p2.lng-state.p1.lng)*(state.p2.x-state.p1.x), y:state.p1.y+(aLat-state.p1.lat)/(state.p2.lat-state.p1.lat)*(state.p2.y-state.p1.y)}; 
            el('status').innerHTML=`精度: &plusmn;${Math.round(state.userAcc)}m`; requestRender(); 
        }, null, {enableHighAccuracy:true}); 
    }
    function exitApp() { haptic(); location.reload(); }
    function toggleTracking(){ haptic(); state.isTracking=!state.isTracking; requestRender(); }
    function cycleRotateMode(){ if(state.targetMode) return; haptic(); state.rotateMode=(state.rotateMode+1)%3; el('btn-rotate').innerText=['🧭','⬆️N','🏃⬆️'][state.rotateMode]; requestRender(); }
    function toggleHudConfig(){ haptic(); el('hud-config-panel').style.display=el('hud-config-panel').style.display==='block'?'none':'block'; }
    function updateHudSettings(){ haptic(); state.hudOn=el('hud-enable').checked; state.hudRadius=parseInt(el('hud-radius-select').value); requestRender(); }
    async function askGyro(){ haptic(); if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){if(await DeviceOrientationEvent.requestPermission()!=='granted')return;} window.addEventListener('deviceorientation', e=>{state.userHeading=e.webkitCompassHeading||(360-e.alpha); requestRender();}, true); el('gyro-btn').style.display='none'; }
</script>
</body>
