<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Map Tracker Pro v7.1</title>
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root { 
            --bg: #0f172a; --panel-bg: rgba(30, 41, 59, 0.95);
            --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --text: #f8fafc;
        }
        body { 
            margin: 0; background: #000; color: var(--text); 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; height: 100dvh; width: 100%; position: fixed;
        }
        #viewport { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; touch-action: none; -webkit-user-select: none;
        }
        #map-container { position: absolute; top: 50%; left: 50%; transform-origin: center center; backface-visibility: hidden; }
        #map-img { display: none; pointer-events: none; position: absolute; transform: translate(-50%, -50%); }
        .dot { position: absolute; width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff; transform: translate(-50%, -50%); display: none; z-index: 100; pointer-events: none; }
        #p1-dot { background: #ef4444; }
        #p2-dot { background: #22c55e; }
        #user-dot { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 24px solid var(--accent); z-index: 110; position: absolute; transform: translate(-50%, -70%); display: none; pointer-events: none; }
        
        #ui-overlay { position: fixed; top: 44px; right: 15px; display: none; flex-direction: column; gap: 10px; z-index: 1002; }
        .ui-btn { width: 44px; height: 44px; background: var(--panel-bg); color: white; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .active-mode { border-color: var(--accent); color: var(--accent); }

        #panel { position: fixed; bottom: 20px; left: 15px; right: 15px; max-height: 50vh; padding: 20px; background: var(--panel-bg); backdrop-filter: blur(10px); border-radius: 20px; overflow-y: auto; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .step { display: none; }
        .active { display: block; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .blue { background: var(--accent); color: white; }
        .green { background: var(--success); color: white; }
        .danger { background: var(--danger); color: white; }
        .outline { background: transparent; border: 1px solid #444; color: white; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: white; box-sizing: border-box; font-size: 16px; }
        .coord-row { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; }
        .int-part { width: 70px; text-align: center; }
        .dec-part { flex: 1; }
        
        /* 保存リスト用スタイル */
        .map-item { padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .map-name { flex: 1; font-weight: bold; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-sm { width: 60px; padding: 8px; font-size: 12px; margin: 0; }
        .btn-del { width: 40px; background: rgba(239, 68, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        #save-confirm-box { text-align: center; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 15px; padding-top: 15px; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn active-mode" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="viewport">
    <div id="map-container"><img id="map-img"></div>
    <div id="p1-dot" class="dot"></div>
    <div id="p2-dot" class="dot"></div>
    <div id="user-dot"></div>
</div>

<div id="panel">
    <div id="s0" class="step active">
        <h2 style="margin-top:0">Map Tracker Pro</h2>
        <button class="blue" onclick="startNewMap()">＋ 新規マップ作成</button>
        <button class="outline" onclick="showMapList()">📂 保存した地図を開く</button>
    </div>

    <div id="s1" class="step">
        <p>地図画像を選択してください</p>
        <input type="file" id="file-input" accept="image/*">
        <button class="outline" onclick="showStep(0)">戻る</button>
    </div>

    <div id="s-list" class="step">
        <h3>保存済みマップ</h3>
        <div id="map-list-container"></div>
        <button class="outline" onclick="showStep(0)">戻る</button>
    </div>

    <div id="s2" class="step">
        <p id="guide">P1(赤)をタップして座標入力</p>
        <div id="p1-inputs">
            <div class="coord-row">
                <input type="number" id="lat1_int" class="int-part" placeholder="35"><span>.</span><input type="number" id="lat1_dec" class="dec-part" placeholder="000000">
            </div>
            <div class="coord-row">
                <input type="number" id="lng1_int" class="int-part" placeholder="135"><span>.</span><input type="number" id="lng1_dec" class="dec-part" placeholder="000000">
            </div>
            <button onclick="confirmP1()" class="blue">P1登録</button>
        </div>
        <div id="p2-inputs" style="display:none">
            <div class="coord-row">
                <input type="number" id="lat2_int" class="int-part" placeholder="35"><span>.</span><input type="number" id="lat2_dec" class="dec-part" placeholder="000000">
            </div>
            <div class="coord-row">
                <input type="number" id="lng2_int" class="int-part" placeholder="135"><span>.</span><input type="number" id="lng2_dec" class="dec-part" placeholder="000000">
            </div>
            <button onclick="confirmP2()" class="green">P2登録</button>
        </div>
    </div>

    <div id="s3" class="step">
        <button onclick="saveAndStart()" class="blue">追跡開始</button>
    </div>

    <div id="s4" class="step">
        <div id="status">GPS待機中...</div>
        <div id="save-prompt" style="display:none">
            <div id="save-confirm-box">
                <p>このマップを保存しますか？</p>
                <div style="display:flex; gap:10px">
                    <button class="blue" onclick="showSaveForm()">はい</button>
                    <button class="outline" onclick="el('save-prompt').style.display='none'">いいえ</button>
                </div>
            </div>
        </div>
        <div id="save-form" style="display:none">
            <input type="text" id="map-name-input" placeholder="マップ名を入力">
            <button class="green" onclick="executeSave()">保存して完了</button>
        </div>
        <button id="gyro-btn" onclick="askGyro()" class="outline" style="margin-top:20px">🧭 方位計を許可</button>
        <button onclick="location.reload()" class="outline">終了</button>
    </div>
</div>

<script>
    // --- データベース制御 ---
    const DB_NAME = "MapTrackerDB";
    const STORE_NAME = "maps";
    let db;

    const initDB = () => {
        return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = e => {
                e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
            };
            request.onsuccess = e => { db = e.target.result; resolve(); };
        });
    };

    const state = { 
        step: 0, p1: null, p2: null, scale: 1, offsetX: 0, offsetY: 0, 
        isTracking: true, rotateMode: 0, mapNorth: 0, metersPerPixel: 0,
        userPos: {x:0, y:0}, userHeading: 0, tempPoint: null, ticking: false,
        isNewMap: false, hasSaved: false, currentImgBlob: null
    };
    
    const el = id => document.getElementById(id);
    const vNode = el('viewport');

    window.onload = async () => {
        await initDB();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
    };

    function startNewMap() { state.isNewMap = true; showStep(1); }

    // --- 改良版リスト表示（削除機能付き） ---
    async function showMapList() {
        showStep('-list');
        const container = el('map-list-container');
        container.innerHTML = "読込中...";
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const maps = await new Promise(r => { store.getAll().onsuccess = e => r(e.target.result); });
        
        container.innerHTML = maps.length ? "" : "保存されたマップはありません";
        maps.forEach(m => {
            const div = document.createElement('div');
            div.className = 'map-item';
            div.innerHTML = `
                <span class="map-name">${m.name}</span>
                <button class="blue btn-sm" onclick="loadSavedMapById(${m.id})">開く</button>
                <button class="btn-del btn-sm" onclick="deleteMap(${m.id}, '${m.name}')">🗑️</button>
            `;
            container.appendChild(div);
        });
    }

    // IDからマップを読み込む関数
    async function loadSavedMapById(id) {
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const data = await new Promise(r => { store.get(id).onsuccess = e => r(e.target.result); });
        if(data) loadSavedMap(data);
    }

    // 削除実行関数
    async function deleteMap(id, name) {
        if (!confirm(`マップ「${name}」を削除しますか？`)) return;
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).delete(id);
        tx.oncomplete = () => showMapList(); // リストを再更新
    }

    async function loadSavedMap(data) {
        state.isNewMap = false;
        state.p1 = data.p1; state.p2 = data.p2;
        state.mapNorth = data.mapNorth; state.metersPerPixel = data.metersPerPixel;
        const img = el('map-img');
        img.src = URL.createObjectURL(data.image);
        await img.decode();
        img.style.display = 'block';
        fitImage();
        saveAndStart();
    }

    el('file-input').onchange = async e => {
        const file = e.target.files[0];
        if (!file) return;
        state.currentImgBlob = file;
        const img = el('map-img');
        img.src = URL.createObjectURL(file);
        await img.decode();
        img.style.display = 'block';
        fitImage();
        showStep(2);
    };

    function showSaveForm() { el('save-confirm-box').style.display='none'; el('save-form').style.display='block'; }
    async function executeSave() {
        const name = el('map-name-input').value || "無題のマップ";
        const mapData = {
            name, p1: state.p1, p2: state.p2, 
            mapNorth: state.mapNorth, metersPerPixel: state.metersPerPixel,
            image: state.currentImgBlob, date: Date.now()
        };
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).add(mapData);
        tx.oncomplete = () => { alert("保存しました"); el('save-prompt').style.display='none'; state.hasSaved = true; };
    }

    function fitImage() {
        const img = el('map-img');
        state.scale = Math.min(vNode.clientWidth / img.naturalWidth, vNode.clientHeight / img.naturalHeight) * 0.9;
        state.offsetX = 0; state.offsetY = 0;
        requestRender();
    }

    function requestRender() {
        if (!state.ticking) {
            window.requestAnimationFrame(() => { render(); state.ticking = false; });
            state.ticking = true;
        }
    }

    function render() {
        let rot = 0;
        if (state.rotateMode === 1) rot = -state.mapNorth;
        if (state.rotateMode === 2) rot = -state.mapNorth - state.userHeading;
        el('map-container').style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) rotate(${rot}deg) scale(${state.scale})`;
        const img = el('map-img'), cx = img.naturalWidth / 2, cy = img.naturalHeight / 2;
        const updatePoint = (id, ix, iy) => {
            const dot = el(id), rad = rot * Math.PI / 180;
            const dx = (ix - cx) * state.scale, dy = (iy - cy) * state.scale;
            dot.style.left = `calc(50% + ${state.offsetX + (dx * Math.cos(rad) - dy * Math.sin(rad))}px)`;
            dot.style.top = `calc(50% + ${state.offsetY + (dx * Math.sin(rad) + dy * Math.cos(rad))}px)`;
        };
        if (state.p1) updatePoint('p1-dot', state.p1.x, state.p1.y);
        if (state.tempPoint && !state.p1) updatePoint('p1-dot', state.tempPoint.x, state.tempPoint.y);
        if (state.p2) updatePoint('p2-dot', state.p2.x, state.p2.y);
        if (state.tempPoint && state.p1) updatePoint('p2-dot', state.tempPoint.x, state.tempPoint.y);
        if (state.userPos.x) { el('user-dot').style.display = 'block'; updatePoint('user-dot', state.userPos.x, state.userPos.y); }
    }

    let evCache = [], initialDist = 0, initialScale = 1, dragStartX = 0, dragStartY = 0, isClickCandidate = false;
    vNode.onpointerdown = e => {
        evCache.push(e); vNode.setPointerCapture(e.pointerId); isClickCandidate = true;
        if (evCache.length === 1) { dragStartX = e.clientX - state.offsetX; dragStartY = e.clientY - state.offsetY; }
        else if (evCache.length === 2) { initialDist = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY); initialScale = state.scale; }
    };
    vNode.onpointermove = e => {
        const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
        if (index === -1) return; evCache[index] = e;
        if (evCache.length === 2) { isClickCandidate = false; const d = Math.hypot(evCache[0].clientX-evCache[1].clientX, evCache[0].clientY-evCache[1].clientY); state.scale = initialScale * (d / initialDist); state.isTracking = false; }
        else if (evCache.length === 1) { if(Math.hypot(e.clientX-(dragStartX+state.offsetX), e.clientY-(dragStartY+state.offsetY))>5) isClickCandidate = false; state.offsetX = e.clientX - dragStartX; state.offsetY = e.clientY - dragStartY; state.isTracking = false; }
        updateUIControls(); requestRender();
    };
    vNode.onpointerup = e => { if (isClickCandidate && state.step === 2) handleTap(e); evCache = evCache.filter(ev => ev.pointerId !== e.pointerId); };

    function handleTap(e) {
        const img = el('map-img'), vw = vNode.clientWidth, vh = vNode.clientHeight;
        let rot = (state.rotateMode === 1) ? -state.mapNorth : (state.rotateMode === 2) ? -state.mapNorth - state.userHeading : 0;
        const rad = -rot * Math.PI / 180;
        const dx = (e.clientX - vw/2 - state.offsetX) / state.scale, dy = (e.clientY - vh/2 - state.offsetY) / state.scale;
        state.tempPoint = { x: (dx * Math.cos(rad) - dy * Math.sin(rad)) + (img.naturalWidth / 2), y: (dx * Math.sin(rad) + dy * Math.cos(rad)) + (img.naturalHeight / 2) };
        el(state.p1 ? 'p2-dot' : 'p1-dot').style.display = 'block'; requestRender();
    }

    function confirmP1() {
        const lat = parseFloat(el('lat1_int').value + "." + el('lat1_dec').value);
        const lng = parseFloat(el('lng1_int').value + "." + el('lng1_dec').value);
        if (!state.tempPoint || isNaN(lat)) return alert("地点を選んで座標を入れてください");
        state.p1 = {...state.tempPoint, lat, lng}; state.tempPoint = null;
        el('p1-inputs').style.display = 'none'; el('p2-inputs').style.display = 'block';
    }

    function confirmP2() {
        const lat = parseFloat(el('lat2_int').value + "." + el('lat2_dec').value);
        const lng = parseFloat(el('lng2_int').value + "." + el('lng2_dec').value);
        if (!state.tempPoint || isNaN(lat)) return alert("地点を選んで座標を入れてください");
        state.p2 = {...state.tempPoint, lat, lng};
        const p1 = state.p1, p2 = state.p2, toRad = Math.PI/180;
        const distM = 6371000 * Math.acos(Math.sin(p1.lat*toRad)*Math.sin(p2.lat*toRad) + Math.cos(p1.lat*toRad)*Math.cos(p2.lat*toRad)*Math.cos((p2.lng-p1.lng)*toRad));
        state.metersPerPixel = distM / Math.hypot(p2.x-p1.x, p2.y-p1.y);
        state.mapNorth = (Math.atan2(p2.x-p1.x, p1.y-p2.y)*180/Math.PI) - (Math.atan2(p2.lng-p1.lng, p2.lat-p1.lat)*180/Math.PI);
        showStep(3);
    }

    function saveAndStart() {
        showStep(4); el('ui-overlay').style.display = 'flex';
        navigator.geolocation.watchPosition(p => {
            const {latitude: lat, longitude: lng, accuracy} = p.coords;
            el('status').innerText = `精度: ±${accuracy.toFixed(0)}m`;
            const rX = (lng - state.p1.lng) / (state.p2.lng - state.p1.lng), rY = (lat - state.p1.lat) / (state.p2.lat - state.p1.lat);
            state.userPos = { x: state.p1.x + rX * (state.p2.x - state.p1.x), y: state.p1.y + rY * (state.p2.y - state.p1.y) };
            if (state.isTracking) {
                state.offsetX = -(state.userPos.x - el('map-img').naturalWidth/2) * state.scale;
                state.offsetY = -(state.userPos.y - el('map-img').naturalHeight/2) * state.scale;
            }
            if (state.isNewMap && !state.hasSaved) el('save-prompt').style.display = 'block';
            requestRender();
        }, null, { enableHighAccuracy: true });
    }

    function toggleTracking() { state.isTracking = !state.isTracking; updateUIControls(); }
    function updateUIControls() { el('btn-lock').classList.toggle('active-mode', state.isTracking); }
    function cycleRotateMode() { state.rotateMode = (state.rotateMode + 1) % 3; el('btn-rotate').innerText = ['🧭', '⬆️N', '🏃⬆️'][state.rotateMode]; requestRender(); }
    function showStep(n) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); el('s' + n).classList.add('active'); state.step = n; }
    async function askGyro() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            if (await DeviceOrientationEvent.requestPermission() !== 'granted') return;
        }
        window.addEventListener('deviceorientation', e => {
            state.userHeading = e.webkitCompassHeading || (360 - e.alpha);
            el('user-dot').style.transform = `translate(-50%, -70%) rotate(${state.userHeading}deg)`;
            if (state.rotateMode === 2) requestRender();
        }, true);
        el('gyro-btn').style.display = 'none';
    }
</script>
</body>
</html>
