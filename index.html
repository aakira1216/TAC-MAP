<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Map Tracker Pro v11.4</title>
    <style>
        :root { --bg: #0f172a; --panel-bg: rgba(30, 41, 59, 0.95); --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --text: #f8fafc; }
        body { margin: 0; background: #000; color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100dvh; width: 100%; position: fixed; }
        
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        #map-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
        #map-img { display: none; pointer-events: none; vertical-align: top; }
        
        .dot { position: absolute; width: 22px; height: 22px; border-radius: 50%; border: 2.5px solid #fff; transform: translate(-50%, -50%); display: none; z-index: 100; pointer-events: none; }
        #p1-dot { background: var(--danger); }
        #p2-dot { background: var(--success); }
        #temp-target-dot { background: #fff; z-index: 110; border: 2px solid #000; box-shadow: 0 0 10px #fff; }
        
        .target-marker { position: absolute; font-weight: bold; font-size: 20px; transform: translate(-50%, -50%); z-index: 105; pointer-events: none; text-shadow: 0 0 4px #000; }
        #user-container { position: absolute; pointer-events: none; display: none; z-index: 110; }
        #user-dot { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 24px solid var(--accent); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -70%); }
        
        #line-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 90; }
        #hud-info-list { position: absolute; top: 75px; left: 50%; transform: translateX(-50%); text-align: center; font-size: 14px; font-weight: bold; text-shadow: 0 0 5px #000; width: 220px; line-height: 1.2; }

        #panel { position: fixed; bottom: 20px; left: 15px; right: 15px; padding: 15px; background: var(--panel-bg); backdrop-filter: blur(15px); border-radius: 20px; z-index: 1000; border: 1px solid rgba(255,255,255,0.1); }
        .step { display: none; } .active { display: block; }
        button { width: 100%; padding: 14px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; touch-action: manipulation; }
        .blue { background: var(--accent); color: white; } .red { background: var(--danger); color: white; } .outline { background: transparent; border: 1px solid #444; color: white; }
        
        #ui-overlay { position: fixed; top: 44px; right: 15px; display: none; flex-direction: column; gap: 12px; z-index: 1002; }
        .ui-btn { width: 50px; height: 50px; background: var(--panel-bg); color: white; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        #scale-bar-container { position: fixed; bottom: 130px; right: 20px; z-index: 1001; display: none; flex-direction: column; align-items: center; }
        #scale-bar { height: 4px; border: 1.5px solid #fff; border-top: none; }

        .coord-row { display: flex; justify-content: center; align-items: center; gap: 4px; margin-bottom: 5px; }
        input[type="text"] { width: 45%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: white; text-align: center; font-size: 16px; }

        #hud-config-panel, #target-setting-panel { display: none; position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: var(--panel-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--accent); z-index: 2000; }
        #target-guide { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: var(--panel-bg); border: 1px solid var(--accent); padding: 15px; border-radius: 15px; font-weight: bold; display: none; z-index: 3000; text-align: center; width: 240px; }
    </style>
</head>
<body>

<svg id="line-svg"></svg>
<div id="scale-bar-container"><div id="scale-label" style="font-size:10px; text-shadow:0 0 4px #000;">50m</div><div id="scale-bar"></div></div>

<div id="target-guide">
    <div id="target-guide-text" style="margin-bottom:12px;"></div>
    <div style="display:flex; gap:10px;">
        <button id="target-decide-btn" class="blue" style="margin:0; padding:10px; flex:1;">決定</button>
        <button class="outline" style="margin:0; padding:10px; flex:1;" onclick="cancelTargeting()">戻る</button>
    </div>
</div>

<div id="target-setting-panel">
    <p style="text-align:center; font-weight:bold;">続けて次の目標を設定しますか？</p>
    <div style="display:flex; gap:10px;">
        <button class="blue" onclick="continueTargetFlow()">はい</button>
        <button class="outline" onclick="closeTargetFlow()">いいえ</button>
    </div>
</div>

<div id="hud-config-panel">
    <h3 style="margin:0 0 10px 0; text-align:center; color:var(--accent);">HUD設定</h3>
    <div style="display:flex;justify-content:space-between;margin:10px 0;align-items:center;"><span>HUD表示</span><input type="checkbox" id="hud-enable" onchange="updateHudSettings()" style="width:20px;height:20px;"></div>
    <div style="display:flex;justify-content:space-between;margin:10px 0;align-items:center;"><span>サークル半径</span><select id="hud-radius-select" onchange="updateHudSettings()" style="background:#1a1a1a;color:white;"></select></div>
    <div style="display:flex;justify-content:space-between;margin:10px 0;align-items:center;"><span>新規目標</span><input type="checkbox" id="target-enable" onchange="handleTargetCheck(this)" style="width:20px;height:20px;"></div>
    <div id="target-config-list" style="max-height:220px; overflow-y:auto; border-top:1px solid #444; margin-top:10px;"></div>
    <button class="blue" onclick="toggleHudConfig()" style="margin-top:15px">閉じる</button>
</div>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="viewport">
    <div id="map-container">
        <img id="map-img">
        <div id="p1-dot" class="dot"></div>
        <div id="p2-dot" class="dot"></div>
        <div id="temp-target-dot" class="dot"></div>
        <div id="target-layer"></div>
    </div>
    <div id="user-container">
        <svg id="hud-visual" width="1000" height="1000" viewBox="0 0 1000 1000">
            <circle cx="500" cy="500" r="0" fill="rgba(59, 130, 246, 0.1)" stroke="rgba(59, 130, 246, 0.4)" stroke-width="2" id="hud-circle" />
            <path id="hud-wedge" fill="rgba(59, 130, 246, 0.2)" stroke="rgba(59, 130, 246, 0.5)" stroke-width="2" />
        </svg>
        <div id="hud-info-list"></div>
        <div id="user-dot"></div>
    </div>
</div>

<div id="panel">
    <div id="s0" class="step active"><h3 style="margin:0;color:var(--accent)">Map Tracker Pro</h3><button class="blue" onclick="startNewMap()">＋ 新規マップ</button><button class="outline" onclick="showMapList()">📂 保存した地図</button></div>
    <div id="s2" class="step"><p id="guide" style="margin:0 0 5px 0; font-weight:bold;">地点1をタップ</p>
        <div id="p1-inputs">
            <div class="coord-row"><input type="text" id="lat1_int"> . <input type="text" id="lat1_dec" placeholder="00000"></div>
            <div class="coord-row"><input type="text" id="lng1_int"> . <input type="text" id="lng1_dec" placeholder="00000"></div>
            <button onclick="confirmP1()" class="blue">P1登録</button>
        </div>
        <div id="p2-inputs" style="display:none">
            <div class="coord-row"><input type="text" id="lat2_int"> . <input type="text" id="lat2_dec" placeholder="00000"></div>
            <div class="coord-row"><input type="text" id="lng2_int"> . <input type="text" id="lng2_dec" placeholder="00000"></div>
            <button onclick="confirmP2()" class="blue" style="background:var(--success)">P2登録</button>
        </div>
    </div>
    <div id="s4" class="step"><div style="display:flex; justify-content:space-between; align-items:center;"><div id="status">GPS待機中...</div><div style="display:flex; gap:5px;"><button onclick="toggleHudConfig()" class="outline" style="padding:8px; font-size:12px; width:80px; margin:0;">HUD設定</button><button onclick="location.reload()" class="outline" style="padding:8px; font-size:12px; width:60px; margin:0;">終了</button></div></div><button id="gyro-btn" onclick="askGyro()" class="outline" style="margin-top:10px; padding:10px; font-size:14px">🧭 方位計を許可</button></div>
    <div id="s-list" class="step"><div id="map-list-container" style="max-height:300px; overflow-y:auto; margin-bottom:10px;"></div><button class="outline" onclick="showStep(0)">戻る</button></div>
</div>

<script>
    const DB_NAME = "MapTrackerDB", STORE_NAME = "maps";
    let db, pointers = [], lastDist = 0, lastMid = null, ticking = false;
    let locationHistory = []; 

    const state = { 
        step: 0, p1: null, p2: null, scale: 1, x: 0, y: 0, 
        isTracking: true, rotateMode: 0, mapNorth: 0, metersPerPixel: 0,
        userPos: {x:0, y:0}, userHeading: 0, userAcc: 0, tempPoint: null,
        hudOn: false, hudRadius: 20,
        targets: [], targetMode: false, currentTargetLetter: null,
        colors: ["#facc15", "#a855f7", "#f97316", "#22d3ee", "#fb7185"]
    };

    const el = id => document.getElementById(id), vNode = el('viewport'), container = el('map-container');
    for(let r=5; r<=50; r+=5){ const opt=document.createElement('option'); opt.value=r; opt.textContent=r; if(r===20)opt.selected=true; el('hud-radius-select').appendChild(opt); }

    const initDB = () => new Promise(r => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => { db = e.target.result; r(); };
    });
    window.onload = async () => { await initDB(); };

    function showStep(n){ document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); if(el('s'+n)) el('s'+n).classList.add('active'); state.step=n; }
    
    function startNewMap() { 
        const input = document.createElement('input'); input.type='file'; input.accept='image/*'; 
        input.onchange=e=>{
            const file=e.target.files[0]; if(!file)return; state.currentImgBlob=file; 
            const img = el('map-img'); img.src = URL.createObjectURL(file); 
            img.onload = () => { img.style.display='block'; fitImage(); showStep(2); };
        }; input.click(); 
    }

    async function showMapList() {
        showStep('-list'); const listEl = el('map-list-container'); listEl.innerHTML = "読み込み中...";
        const tx = db.transaction(STORE_NAME, "readonly");
        tx.objectStore(STORE_NAME).getAll().onsuccess = e => {
            const maps = e.target.result;
            listEl.innerHTML = "";
            if(!maps.length) listEl.innerHTML = "保存なし";
            maps.forEach(m => {
                const d = document.createElement('div'); d.style="display:flex;align-items:center;gap:10px;margin-bottom:10px;background:rgba(255,255,255,0.05);padding:12px;border-radius:12px";
                d.innerHTML = `
                    <span style="flex:1;font-size:14px;font-weight:bold">${m.name}</span>
                    <button class="blue" style="width:60px;padding:8px;margin:0;font-size:12px" onclick="loadMap(${m.id})">開く</button>
                    <button class="red" style="width:60px;padding:8px;margin:0;font-size:12px" onclick="deleteMap(${m.id})">削除</button>`;
                listEl.appendChild(d);
            });
        };
    }

    async function deleteMap(id) { if(confirm("この地図を削除しますか？")) { const tx = db.transaction(STORE_NAME, "readwrite"); tx.objectStore(STORE_NAME).delete(id).onsuccess = () => showMapList(); } }

    async function loadMap(id) {
        const tx = db.transaction(STORE_NAME, "readonly");
        tx.objectStore(STORE_NAME).get(id).onsuccess = e => {
            const data = e.target.result;
            state.p1 = data.p1; state.p2 = data.p2; state.mapNorth = data.mapNorth; state.metersPerPixel = data.metersPerPixel;
            const img = el('map-img'); img.src = URL.createObjectURL(data.image);
            img.onload = () => { img.style.display='block'; fitImage(); saveAndStart(); };
        };
    }

    function fitImage() {
        const img = el('map-img'), vw = vNode.clientWidth, vh = vNode.clientHeight;
        state.scale = Math.min(vw/img.naturalWidth, vh/img.naturalHeight)*0.8;
        state.x = vw/2 - (img.naturalWidth/2*state.scale); state.y = vh/2 - (img.naturalHeight/2*state.scale);
        requestRender();
    }

    vNode.addEventListener('pointerdown', e => {
        vNode.setPointerCapture(e.pointerId); pointers.push(e);
        if(pointers.length === 1) lastMid = { x: e.clientX, y: e.clientY };
        else if(pointers.length === 2) {
            lastDist = Math.hypot(pointers[0].clientX - pointers[1].clientX, pointers[0].clientY - pointers[1].clientY);
            lastMid = { x: (pointers[0].clientX + pointers[1].clientX)/2, y: (pointers[0].clientY + pointers[1].clientY)/2 };
        }
    });

    vNode.addEventListener('pointermove', e => {
        const idx = pointers.findIndex(p => p.pointerId === e.pointerId);
        if(idx === -1) return; pointers[idx] = e;
        
        if(pointers.length === 1 && lastMid) {
            state.isTracking = false; // 動かした瞬間にトラッキングをオフにする
            state.x += (e.clientX - lastMid.x); state.y += (e.clientY - lastMid.y);
            lastMid = { x: e.clientX, y: e.clientY };
        } else if(pointers.length === 2 && lastMid) {
            state.isTracking = false;
            const dist = Math.hypot(pointers[0].clientX - pointers[1].clientX, pointers[0].clientY - pointers[1].clientY);
            const mid = { x: (pointers[0].clientX + pointers[1].clientX)/2, y: (pointers[0].clientY + pointers[1].clientY)/2 };
            const zoom = dist / lastDist;
            state.x = mid.x - (mid.x - state.x) * zoom;
            state.y = mid.y - (mid.y - state.y) * zoom;
            state.scale *= zoom;
            lastDist = dist; lastMid = mid;
        }
        requestRender();
    });

    const endPointer = e => {
        if(pointers.length === 1 && (state.step === 2 || state.targetMode)) handleTap(e);
        pointers = pointers.filter(p => p.pointerId !== e.pointerId);
        lastMid = null; if(pointers.length < 2) lastDist = 0;
    };
    vNode.addEventListener('pointerup', endPointer); vNode.addEventListener('pointercancel', endPointer);

    function handleTap(e) {
        const vw = vNode.clientWidth, vh = vNode.clientHeight;
        const rot = (state.rotateMode === 1) ? -state.mapNorth : (state.rotateMode === 2) ? -state.mapNorth - state.userHeading : 0;
        const rad = -rot * Math.PI / 180;
        const sx = vw / 2, sy = (state.rotateMode === 2) ? vh * 0.7 : vh / 2;
        const dx = e.clientX - sx, dy = e.clientY - sy;
        const rx = dx * Math.cos(rad) - dy * Math.sin(rad);
        const ry = dx * Math.sin(rad) + dy * Math.cos(rad);
        state.tempPoint = { x: (rx + sx - state.x) / state.scale, y: (ry + sy - state.y) / state.scale };
        requestRender();
    }

    function requestRender() { if(!ticking) { window.requestAnimationFrame(() => { render(); ticking = false; }); ticking = true; } }
    
    function render() {
        const vw = vNode.clientWidth, vh = vNode.clientHeight;
        const rot = (state.rotateMode === 1) ? -state.mapNorth : (state.rotateMode === 2) ? -state.mapNorth - state.userHeading : 0;
        const px = vw / 2, py = (state.rotateMode === 2) ? vh * 0.7 : vh / 2;

        if(state.isTracking && state.userPos.x){
            const rad = rot * Math.PI / 180;
            const cos = Math.cos(rad), sin = Math.sin(rad);
            state.x = px - (state.userPos.x * state.scale * cos - state.userPos.y * state.scale * sin);
            state.y = py - (state.userPos.x * state.scale * sin + state.userPos.y * state.scale * cos);
        }

        container.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${rot}deg) scale(${state.scale})`;
        
        if(state.metersPerPixel) {
            el('scale-bar-container').style.display = 'flex';
            el('scale-bar').style.width = (50 / state.metersPerPixel * state.scale) + 'px';
        }

        const updP = (id, p, color) => { const d = el(id); if(p){ d.style.left = p.x + 'px'; d.style.top = p.y + 'px'; d.style.display = 'block'; if(color) d.style.backgroundColor = color; } else d.style.display = 'none'; };
        updP('p1-dot', state.p1 || (state.step === 2 && !state.p1 ? state.tempPoint : null));
        updP('p2-dot', state.p2 || (state.step === 2 && state.p1 ? state.tempPoint : null));
        const colorIdx = ["A","B","C","D","E"].indexOf(state.currentTargetLetter);
        updP('temp-target-dot', state.targetMode ? state.tempPoint : null, state.colors[colorIdx]);

        const tLayer = el('target-layer'), lineSvg = el('line-svg'), infoList = el('hud-info-list');
        tLayer.innerHTML = ''; lineSvg.innerHTML = ''; infoList.innerHTML = '';

        state.targets.forEach((t, i) => {
            const m = document.createElement('div'); m.className = 'target-marker'; m.innerText = t.id; m.style.color = t.color; m.style.left = t.x + 'px'; m.style.top = t.y + 'px';
            tLayer.appendChild(m);
            if(state.userPos.x) {
                const distM = Math.round(Math.hypot(t.x - state.userPos.x, t.y - state.userPos.y) * state.metersPerPixel);
                let bearing = (Math.round(Math.atan2(t.x - state.userPos.x, state.userPos.y - t.y) * 180 / Math.PI + state.mapNorth) + 360) % 360;
                if(t.showLine) {
                    const rad = rot * Math.PI / 180;
                    const cos = Math.cos(rad), sin = Math.sin(rad);
                    const tx_scr = state.x + (t.x * state.scale * cos - t.y * state.scale * sin);
                    const ty_scr = state.y + (t.x * state.scale * sin + t.y * state.scale * cos);
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", px); line.setAttribute("y1", py); line.setAttribute("x2", tx_scr); line.setAttribute("y2", ty_scr);
                    line.setAttribute("stroke", t.color); line.setAttribute("stroke-width", "2.5"); line.setAttribute("stroke-dasharray", "6,4"); lineSvg.appendChild(line);
                }
                if(t.showDist || t.showDir) {
                    const info = document.createElement('div'); info.style.color = t.color;
                    info.innerText = `${t.id}: ${t.showDist?distM+'m ':''}${t.showDir?bearing+'°':''}`; infoList.appendChild(info);
                }
            }
        });

        const uContainer = el('user-container');
        if(state.userPos.x){
            uContainer.style.left = px + 'px'; uContainer.style.top = py + 'px'; uContainer.style.display = 'block';
            uContainer.style.transform = `translate(-50%, -50%) rotate(${state.userHeading + state.mapNorth + rot}deg)`;
            const pxRadius = state.hudOn ? (state.hudRadius / state.metersPerPixel) * state.scale : 0;
            el('hud-circle').setAttribute('r', pxRadius);
            const sA = -60*Math.PI/180, eA = 60*Math.PI/180;
            const x1 = 500 + pxRadius * Math.sin(sA), y1 = 500 - pxRadius * Math.cos(sA), x2 = 500 + pxRadius * Math.sin(eA), y2 = 500 - pxRadius * Math.cos(eA);
            el('hud-wedge').setAttribute('d', pxRadius > 0 ? `M 500 500 L ${x1} ${y1} A ${pxRadius} ${pxRadius} 0 0 1 ${x2} ${y2} Z` : '');
        } else uContainer.style.display = 'none';
        el('btn-lock').style.borderColor = state.isTracking ? 'var(--accent)' : 'rgba(255,255,255,0.2)';
    }

    function handleTargetCheck(cb) { if(cb.checked) { state.savedRotateMode = state.rotateMode; state.rotateMode = 0; el('hud-config-panel').style.display='none'; startTargetFlow(); } }
    function startTargetFlow(letter = null) {
        const ids = ["A","B","C","D","E"];
        state.currentTargetLetter = letter || ids[state.targets.length];
        if(!letter && state.targets.length >= 5) { alert("上限5地点です"); return; }
        state.targetMode = true; el('target-guide').style.display='block';
        el('target-guide-text').innerHTML = `目標 <span style="color:${state.colors[ids.indexOf(state.currentTargetLetter)]}">${state.currentTargetLetter}</span> を設定`;
        el('target-decide-btn').onclick = () => {
            if(!state.tempPoint) return;
            const idx = state.targets.findIndex(t => t.id === state.currentTargetLetter);
            state.targets[idx > -1 ? idx : state.targets.length] = { id: state.currentTargetLetter, x: state.tempPoint.x, y: state.tempPoint.y, color: state.colors[ids.indexOf(state.currentTargetLetter)], showDist: true, showDir: true, showLine: true };
            state.tempPoint = null; state.targetMode = false; el('target-guide').style.display = 'none';
            if(idx === -1 && state.targets.length < 5) el('target-setting-panel').style.display = 'block'; else finishTargetFlow();
            buildTargetConfigList(); requestRender();
        };
    }
    function finishTargetFlow() { el('target-setting-panel').style.display = 'none'; el('hud-config-panel').style.display = 'block'; el('target-enable').checked = false; if(state.savedRotateMode!==undefined) state.rotateMode = state.savedRotateMode; requestRender(); }
    function cancelTargeting() { state.targetMode = false; state.tempPoint = null; el('target-guide').style.display = 'none'; finishTargetFlow(); }
    function continueTargetFlow() { el('target-setting-panel').style.display = 'none'; startTargetFlow(); }
    function closeTargetFlow() { finishTargetFlow(); }

    function buildTargetConfigList() {
        const list = el('target-config-list'); list.innerHTML = '';
        state.targets.forEach((t, i) => {
            const row = document.createElement('div'); row.className = 'target-list-row'; row.style="display:grid;grid-template-columns:20px 1fr 1fr 1fr 1fr 1fr;gap:4px;align-items:center;padding:8px 0;border-top:1px solid #333;font-size:11px;color:"+t.color;
            row.innerHTML = `<span>${t.id}</span>
                <label><input type="checkbox" ${t.showDist?'checked':''} onchange="state.targets[${i}].showDist=this.checked;requestRender()">距</label>
                <label><input type="checkbox" ${t.showDir?'checked':''} onchange="state.targets[${i}].showDir=this.checked;requestRender()">方</label>
                <label><input type="checkbox" ${t.showLine?'checked':''} onchange="state.targets[${i}].showLine=this.checked;requestRender()">線</label>
                <button class="outline" style="padding:4px;margin:0;font-size:10px;width:100%" onclick="reTarget('${t.id}')">変</button>`;
            list.appendChild(row);
        });
    }
    function reTarget(letter) { el('hud-config-panel').style.display='none'; startTargetFlow(letter); }

    function parseCoord(i, d) { 
        let integer = i.trim();
        let decimal = d.trim() || "0";
        if(integer === "" || isNaN(integer)) return NaN;
        return parseFloat(integer + "." + decimal);
    }
    function confirmP1() { const lat=parseCoord(el('lat1_int').value, el('lat1_dec').value), lng=parseCoord(el('lng1_int').value, el('lng1_dec').value); if(!state.tempPoint||isNaN(lat)||isNaN(lng)) { alert("位置と数値を正しく入力してください"); return; } state.p1={...state.tempPoint, lat, lng}; state.tempPoint=null; el('p1-inputs').style.display='none'; el('p2-inputs').style.display='block'; el('guide').innerText="地点2をタップ"; requestRender(); }
    async function confirmP2() { 
        const lat=parseCoord(el('lat2_int').value, el('lat2_dec').value), lng=parseCoord(el('lng2_int').value, el('lng2_dec').value); if(!state.tempPoint||isNaN(lat)||isNaN(lng)) { alert("位置と数値を正しく入力してください"); return; }
        state.p2={...state.tempPoint, lat, lng}; const p1=state.p1, p2=state.p2, r=Math.PI/180;
        state.metersPerPixel = (6371000 * Math.acos(Math.sin(p1.lat*r)*Math.sin(p2.lat*r)+Math.cos(p1.lat*r)*Math.cos(p2.lat*r)*Math.cos((p2.lng-p1.lng)*r))) / Math.hypot(p2.x-p1.x, p2.y-p1.y);
        state.mapNorth = (Math.atan2(p2.x-p1.x, p1.y-p2.y)*180/Math.PI) - (Math.atan2(p2.lng-p1.lng, p2.lat-p1.lat)*180/Math.PI);
        const name = prompt("地図名", "Map_" + new Date().toLocaleTimeString());
        if(name) { const tx = db.transaction(STORE_NAME, "readwrite"); tx.objectStore(STORE_NAME).add({ name, image: state.currentImgBlob, p1: state.p1, p2: state.p2, mapNorth: state.mapNorth, metersPerPixel: state.metersPerPixel }); }
        saveAndStart(); 
    }
    function saveAndStart() { 
        showStep(4); el('ui-overlay').style.display='flex'; 
        navigator.geolocation.watchPosition(p => { 
            if(p.coords.accuracy>35)return; state.userAcc=p.coords.accuracy; 
            locationHistory.push({lat:p.coords.latitude, lng:p.coords.longitude}); if(locationHistory.length>3)locationHistory.shift(); 
            const aLat=locationHistory.reduce((s,c)=>s+c.lat,0)/locationHistory.length, aLng=locationHistory.reduce((s,c)=>s+c.lng,0)/locationHistory.length; 
            state.userPos={x:state.p1.x+(aLng-state.p1.lng)/(state.p2.lng-state.p1.lng)*(state.p2.x-state.p1.x), y:state.p1.y+(aLat-state.p1.lat)/(state.p2.lat-state.p1.lat)*(state.p2.y-state.p1.y)}; 
            el('status').innerHTML=`精度: &plusmn;${Math.round(state.userAcc)}m`; requestRender(); 
        }, null, {enableHighAccuracy:true}); 
    }
    function toggleTracking(){ state.isTracking=!state.isTracking; requestRender(); }
    function cycleRotateMode(){ state.rotateMode=(state.rotateMode+1)%3; el('btn-rotate').innerText=['🧭','⬆️N','🏃⬆️'][state.rotateMode]; requestRender(); }
    function toggleHudConfig(){ el('hud-config-panel').style.display=el('hud-config-panel').style.display==='block'?'none':'block'; }
    function updateHudSettings(){ state.hudOn=el('hud-enable').checked; state.hudRadius=parseInt(el('hud-radius-select').value); requestRender(); }
    async function askGyro(){ if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){if(await DeviceOrientationEvent.requestPermission()!=='granted')return;} window.addEventListener('deviceorientation', e=>{state.userHeading=e.webkitCompassHeading||(360-e.alpha); requestRender();}, true); el('gyro-btn').style.display='none'; }
</script>
