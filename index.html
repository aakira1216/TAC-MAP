<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Map Tracker v19.9</title>
    <style>
        /* =========================================
           1. 縦画面：V17.9/19.8のUIを完全維持
        ========================================= */
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100dvh; width: 100%; position: fixed; }
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        #map-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
        #map-img { display: none; pointer-events: none; }
        
        /* 操作パネル */
        #panel { position: fixed; bottom: 20px; left: 10px; right: 10px; padding: 15px; background: rgba(30,30,30,0.9); border-radius: 10px; z-index: 2000; border: 1px solid #444; }
        .step { display: none; } .active { display: block; }
        button { width: 100%; padding: 12px; margin: 4px 0; border-radius: 5px; border: 1px solid #666; background: #444; color: white; font-size: 16px; font-weight: bold; touch-action: manipulation; }
        .blue { background: #2563eb; } .red { background: #dc2626; }
        .outline { background: rgba(255,255,255,0.1); border: 1px solid #999; }
        .outline-danger { background: rgba(220, 38, 38, 0.2); border: 1px solid #dc2626; }
        input { width: 100%; padding: 8px; margin: 4px 0; background: #111; color: white; border: 1px solid #666; box-sizing: border-box; }
        .coord-row { display: flex; align-items: center; gap: 4px; }

        /* オーバーレイ要素 */
        #scale-bar-container { position: fixed; bottom: 120px; right: 15px; z-index: 1200; display: none; flex-direction: column; align-items: center; background: rgba(0,0,0,0.6); padding: 5px; border: 1px solid #fff; }
        #ui-overlay { position: fixed; top: 40px; right: 15px; display: none; flex-direction: column; gap: 10px; z-index: 1002; }
        .ui-btn { width: 50px; height: 50px; background: rgba(30,30,30,0.9); border: 1px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        #hud-info-list { position: absolute; top: 45px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 8px; border: 1px solid #fff; pointer-events: none; }
        .hud-row { font-size: 12px; font-weight: bold; white-space: nowrap; height: 18px; display: flex; align-items: center; }
        #proximity-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5000; display: none; background: rgba(220, 38, 38, 0.3); animation: blink 0.6s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* =========================================
           2. 横向き（Landscape）レイアウト調整のみ
        ========================================= */
        @media (orientation: landscape) {
            /* 左側：幅を縦HUDボタンサイズ(約90px)に固定 */
            #panel {
                top: 10px; bottom: 10px; left: 10px; right: auto;
                width: 90px;
                padding: 10px 5px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                border-radius: 8px;
            }

            /* 計測画面(s4)の縦積み構成 */
            #s4 { height: 100%; }
            #s4 > div {
                height: 100%;
                display: flex !important;
                flex-direction: column !important;
                justify-content: space-between !important;
                align-items: center !important;
            }

            /* GPS精度表示を1番上に */
            #status { order: -1; font-size: 11px; text-align: center; width: 100%; }

            /* ボタン群を下から上へ積み上げ */
            #s4 div[style*="flex"] {
                flex-direction: column-reverse !important;
                width: 100%;
                gap: 5px !important;
            }

            /* ボタンのスリム化 */
            #panel button { padding: 8px 0 !important; font-size: 11px !important; margin: 0 !important; height: 38px; }

            /* 右側中央：🎯と🧭 */
            #ui-overlay {
                top: 50%;
                right: 15px;
                transform: translateY(-50%);
                display: flex;
            }

            /* 右側下：スケールバー */
            #scale-bar-container { bottom: 15px; right: 15px; top: auto; }
        }

        /* 共通マーカー等 */
        .dot { position: absolute; width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff; transform: translate(-50%, -50%); display: none; z-index: 1000; }
        .target-marker { position: absolute; font-weight: bold; transform: translate(-50%, -50%); z-index: 1005; background: rgba(0,0,0,0.7); padding: 2px 6px; border: 1px solid #fff; border-radius: 4px; }
    </style>
</head>
<body>

<div id="proximity-overlay"></div>
<div id="viewport">
    <div id="map-container"><img id="map-img"></div>
    <svg id="line-svg" style="position:absolute; width:100%; height:100%; pointer-events:none; z-index:900;"></svg>
    <div id="p1-dot" class="dot"></div>
    <div id="p2-dot" class="dot"></div>
    <div id="temp-target-dot" class="dot"></div>
    <div id="target-layer"></div>
    <div id="user-container" style="position:absolute; display:none; z-index:1100; pointer-events:none;">
        <div id="user-dot-wrapper" style="position:absolute; transform:translate(-50%, -50%);">
            <div id="user-dot" style="width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-bottom:24px solid #2563eb; position:absolute; top:50%; left:50%; transform:translate(-50%, -70%);"></div>
            <svg id="hud-visual" width="1000" height="1000" viewBox="0 0 1000 1000" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%);">
                <circle cx="500" cy="500" r="0" fill="rgba(37, 99, 235, 0.1)" stroke="rgba(37, 99, 235, 0.4)" stroke-width="2" id="hud-circle" />
                <path id="hud-wedge" fill="rgba(37, 99, 235, 0.2)" stroke="rgba(37, 99, 235, 0.5)" stroke-width="2" />
            </svg>
        </div>
        <div id="hud-info-list" style="display:none;"></div>
    </div>
</div>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="scale-bar-container">
    <div id="scale-label">---m</div>
    <div id="scale-bar"></div>
</div>

<div id="panel">
    <div id="s0" class="step active">
        <button class="blue" onclick="startNewMap()">新規マップ</button>
        <button onclick="showMapList()">保存リスト</button>
        <button onclick="importMapFile()">インポート</button>
    </div>

    <div id="s2" class="step">
        <p id="guide" style="font-size:12px; margin:0;">P1指定</p>
        <div id="p1-inputs">
            <div class="coord-row"><input type="text" id="lat1_int" placeholder="35">.<input type="text" id="lat1_dec" placeholder="000"></div>
            <div class="coord-row"><input type="text" id="lng1_int" placeholder="135">.<input type="text" id="lng1_dec" placeholder="000"></div>
            <button onclick="confirmP1()" class="red">P1登録</button>
        </div>
        <div id="p2-inputs" style="display:none">
            <div class="coord-row"><input type="text" id="lat2_int">.<input type="text" id="lat2_dec"></div>
            <div class="coord-row"><input type="text" id="lng2_int">.<input type="text" id="lng2_dec"></div>
            <button onclick="confirmP2()" class="blue">P2登録</button>
        </div>
    </div>

    <div id="s4" class="step">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="status" style="font-size:13px; font-weight:bold;">GPS待機中...</div>
            <div style="display:flex; gap:5px;">
                <button id="proximity-dismiss-btn" onclick="dismissProximity()" class="outline-danger" style="display:none;">通知解除</button>
                <button id="gyro-btn" onclick="askGyro()" class="blue">方位許可</button>
                <button onclick="toggleHudConfig()" class="outline">HUD設定</button>
                <button onclick="exitApp()" class="outline-danger">終了</button>
            </div>
        </div>
    </div>
    <div id="s-list" class="step"><div id="map-list-container" style="max-height:200px; overflow-y:auto; margin-bottom:10px;"></div><button class="outline" onclick="showStep(0)">戻る</button></div>
</div>

<!-- 設定モーダル類（機能維持のため保持） -->
<div id="hud-config-panel" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:300px; background:#222; padding:20px; border-radius:10px; border:1px solid #2563eb; z-index:3000;">
    <h3 style="margin-top:0;">HUD設定</h3>
    <div style="margin:10px 0;">表示 <input type="checkbox" id="hud-enable" onchange="updateHudSettings()"></div>
    <div style="margin:10px 0;">半径 <select id="hud-radius-select" onchange="updateHudSettings()"></select></div>
    <div style="margin:10px 0;">通知 <input type="checkbox" id="proximity-enable" onchange="updateHudSettings()"></div>
    <div style="margin:10px 0;">目標追加 <input type="checkbox" id="target-enable" onchange="handleTargetCheck(this)"></div>
    <div id="target-config-list" style="max-height:150px; overflow-y:auto; border-top:1px solid #444; margin-top:10px; padding-top:10px;"></div>
    <button onclick="toggleHudConfig()" style="margin-top:10px;">閉じる</button>
</div>

<script>
    const DB_NAME = "MapTrackerDB", STORE_NAME = "maps";
    let db, pointers = [], lastDist = 0, lastPoint = null, ticking = false;
    const state = { 
        step: 0, p1: null, p2: null, scale: 1, x: 0, y: 0, isTracking: true, rotateMode: 0, mapNorth: 0, metersPerPixel: 0,
        userPos: {x:0, y:0}, userHeading: 0, userAcc: 0, tempPoint: null, hudOn: false, hudRadius: 20, proximityOn: false, 
        isAlerting: false, manuallyDismissed: false, targets: [], targetMode: false, currentTargetLetter: null, 
        colors: ["#facc15", "#a855f7", "#f97316", "#22d3ee", "#fb7185"], lastRot: 0, lastRotateMode: 0 
    };

    const el = id => document.getElementById(id), vNode = el('viewport'), container = el('map-container');
    const initDB = () => new Promise(r => { const req = indexedDB.open(DB_NAME, 1); req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true }); req.onsuccess = e => { db = e.target.result; r(); }; });
    for(let r=5; r<=50; r+=5){ const opt=document.createElement('option'); opt.value=r; opt.textContent=r; if(r===20)opt.selected=true; el('hud-radius-select').appendChild(opt); }
    window.onload = async () => { await initDB(); };

    function haptic() { if (window.navigator.vibrate) window.navigator.vibrate(10); }
    function showStep(n){ haptic(); document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); if(el('s'+n)) el('s'+n).classList.add('active'); state.step=n; requestRender(); }

    function startNewMap() { 
        const input = document.createElement('input'); input.type='file'; input.accept='image/*'; 
        input.onchange=e=>{ 
            const file=e.target.files[0]; if(!file)return; state.currentImgBlob=file; 
            const img = el('map-img'); img.onload = () => { img.style.display='block'; fitImage(); showStep(2); }; img.src = URL.createObjectURL(file); 
        }; input.click(); 
    }

    async function showMapList() {
        haptic(); showStep('-list'); const listEl = el('map-list-container'); listEl.innerHTML = "";
        const tx = db.transaction(STORE_NAME, "readonly");
        tx.objectStore(STORE_NAME).getAll().onsuccess = e => {
            e.target.result.forEach(m => {
                const d = document.createElement('div'); d.style="display:flex; justify-content:space-between; margin-bottom:5px; background:#333; padding:5px; border-radius:5px;";
                d.innerHTML = `<span>${m.name}</span><div><button style="width:50px; padding:5px; margin:0 2px" onclick="loadMap(${m.id})">開</button><button style="width:50px; padding:5px; margin:0 2px" onclick="deleteMap(${m.id})" class="red">消</button></div>`;
                listEl.appendChild(d);
            });
        };
    }
    async function deleteMap(id) { haptic(); if(!confirm("削除?")) return; const tx = db.transaction(STORE_NAME, "readwrite"); tx.objectStore(STORE_NAME).delete(id); showMapList(); }
    async function loadMap(id) {
        haptic(); const tx = db.transaction(STORE_NAME, "readonly");
        tx.objectStore(STORE_NAME).get(id).onsuccess = e => {
            const data = e.target.result; state.p1 = data.p1; state.p2 = data.p2; state.mapNorth = data.mapNorth; state.metersPerPixel = data.metersPerPixel;
            const img = el('map-img'); img.src = URL.createObjectURL(data.image); img.onload = () => { img.style.display='block'; fitImage(); saveAndStart(); };
        };
    }

    function fitImage() {
        const img = el('map-img'), vw = vNode.clientWidth, vh = vNode.clientHeight;
        state.scale = Math.min(vw/img.naturalWidth, vh/img.naturalHeight)*0.8;
        state.x = vw/2 - (img.naturalWidth/2*state.scale); state.y = vh/2 - (img.naturalHeight/2*state.scale);
        requestRender();
    }

    vNode.addEventListener('pointerdown', e => { vNode.setPointerCapture(e.pointerId); pointers.push(e); if(pointers.length === 1) lastPoint = { x: e.clientX, y: e.clientY }; else if(pointers.length === 2) lastDist = Math.hypot(pointers[0].clientX - pointers[1].clientX, pointers[0].clientY - pointers[1].clientY); });
    vNode.addEventListener('pointermove', e => {
        const idx = pointers.findIndex(p => p.pointerId === e.pointerId); if(idx === -1) return; pointers[idx] = e;
        if(pointers.length === 1 && lastPoint) { state.x += e.clientX - lastPoint.x; state.y += e.clientY - lastPoint.y; lastPoint = { x: e.clientX, y: e.clientY }; state.isTracking = false; } 
        else if(pointers.length === 2) { const midX = (pointers[0].clientX + pointers[1].clientX) / 2, midY = (pointers[0].clientY + pointers[1].clientY) / 2, dist = Math.hypot(pointers[0].clientX - pointers[1].clientX, pointers[0].clientY - pointers[1].clientY), zoom = dist / lastDist; state.scale *= zoom; state.x = midX - (midX - state.x) * zoom; state.y = midY - (midY - state.y) * zoom; lastDist = dist; state.isTracking = false; }
        requestRender();
    });
    const endPointer = e => { if(pointers.length === 1 && (state.step === 2 || state.targetMode)) handleTap(e); pointers = pointers.filter(p => p.pointerId !== e.pointerId); if(pointers.length < 2) lastDist = 0; if(pointers.length === 0) lastPoint = null; };
    vNode.addEventListener('pointerup', endPointer); vNode.addEventListener('pointercancel', endPointer);

    function handleTap(e) {
        const vw = vNode.clientWidth, vh = vNode.clientHeight, rot = (state.rotateMode === 1) ? -state.mapNorth : (state.rotateMode === 2) ? -state.mapNorth - state.userHeading : 0;
        const rad = -rot * Math.PI / 180, sx = vw / 2, sy = (state.rotateMode === 2) ? vh * 0.7 : vh / 2;
        const dx = e.clientX - sx, dy = e.clientY - sy, rx = dx * Math.cos(rad) - dy * Math.sin(rad), ry = dx * Math.sin(rad) + dy * Math.cos(rad);
        state.tempPoint = { x: (rx + sx - state.x) / state.scale, y: (ry + sy - state.y) / state.scale };
        requestRender();
    }

    function requestRender() { if(!ticking) { window.requestAnimationFrame(() => { render(); ticking = false; }); ticking = true; } }
    
    function drawDot(domId, p, color) {
        const d = el(domId); if(!p) { d.style.display = 'none'; return; }
        const vw = vNode.clientWidth, vh = vNode.clientHeight, rot = (state.rotateMode === 1) ? -state.mapNorth : (state.rotateMode === 2) ? -state.mapNorth - state.userHeading : 0;
        const rad = rot * Math.PI / 180, cos = Math.cos(rad), sin = Math.sin(rad);
        const tx = state.x + (p.x * state.scale * cos - p.y * state.scale * sin), ty = state.y + (p.x * state.scale * sin + p.y * state.scale * cos);
        d.style.left = tx + 'px'; d.style.top = ty + 'px'; d.style.backgroundColor = color; d.style.display = 'block';
    }

    function render() {
        const vw = vNode.clientWidth, vh = vNode.clientHeight, rot = (state.rotateMode === 1) ? -state.mapNorth : (state.rotateMode === 2) ? -state.mapNorth - state.userHeading : 0;
        const rad = rot * Math.PI / 180, cos = Math.cos(rad), sin = Math.sin(rad), sx = vw / 2, sy = (state.rotateMode === 2) ? vh * 0.7 : vh / 2;
        if(state.isTracking && state.userPos.x){ state.x = sx - (state.userPos.x * state.scale * cos - state.userPos.y * state.scale * sin); state.y = sy - (state.userPos.x * state.scale * sin + state.userPos.y * state.scale * cos); } 
        else if (state.lastRot !== undefined && state.lastRot !== rot) { const diffRad = (rot - state.lastRot) * Math.PI / 180, c = Math.cos(diffRad), s = Math.sin(diffRad), dx = state.x - sx, dy = state.y - sy; state.x = sx + (dx * c - dy * s); state.y = sy + (dx * s + dy * c); }
        state.lastRot = rot; container.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${rot}deg) scale(${state.scale})`;
        if(state.metersPerPixel) { el('scale-bar-container').style.display = 'flex'; const totalMeters = 100 * (state.metersPerPixel / state.scale); el('scale-label').innerText = totalMeters >= 1000 ? (totalMeters/1000).toFixed(2)+"km" : Math.round(totalMeters)+"m"; }
        
        drawDot('p1-dot', state.step === 2 ? (state.p1 || (!state.p2 ? state.tempPoint : null)) : null, '#f00');
        drawDot('p2-dot', state.step === 2 ? (state.p1 ? (state.p2 || state.tempPoint) : null) : null, '#0f0');
        drawDot('temp-target-dot', (state.targetMode ? state.tempPoint : null), '#fff');

        const tLayer = el('target-layer'); tLayer.innerHTML = ''; const lineSvg = el('line-svg'); lineSvg.innerHTML = '';
        const uPosScreen = state.userPos.x ? { sx: state.x + (state.userPos.x * state.scale * cos - state.userPos.y * state.scale * sin), sy: state.y + (state.userPos.x * state.scale * sin + state.userPos.y * state.scale * cos) } : null;
        
        let minDist = Infinity;
        state.targets.forEach(t => {
            const tx = state.x + (t.x * state.scale * cos - t.y * state.scale * sin), ty = state.y + (t.x * state.scale * sin + t.y * state.scale * cos);
            const m = document.createElement('div'); m.className = 'target-marker'; m.innerText = t.id; m.style.color = t.color; m.style.left = tx + 'px'; m.style.top = ty + 'px'; tLayer.appendChild(m);
            if(uPosScreen) {
                const distM = Math.hypot(t.x - state.userPos.x, t.y - state.userPos.y) * state.metersPerPixel;
                if(distM < minDist) minDist = distM;
                if(t.showLine) { const line = document.createElementNS("http://www.w3.org/2000/svg", "line"); line.setAttribute("x1", uPosScreen.sx); line.setAttribute("y1", uPosScreen.sy); line.setAttribute("x2", tx); line.setAttribute("y2", ty); line.setAttribute("stroke", t.color); line.setAttribute("stroke-width", "2"); line.setAttribute("stroke-dasharray", "4"); lineSvg.appendChild(line); }
            }
        });
        if(state.proximityOn && minDist <= state.hudRadius && !state.manuallyDismissed) triggerProximity(); else if(minDist > state.hudRadius) { state.manuallyDismissed = false; stopAlert(); }

        const uContainer = el('user-container');
        if(uPosScreen){
            uContainer.style.left = uPosScreen.sx + 'px'; uContainer.style.top = uPosScreen.sy + 'px'; uContainer.style.display = 'block';
            el('user-dot-wrapper').style.transform = `translate(-50%, -50%) rotate(${state.userHeading + state.mapNorth + rot}deg)`;
            const pxR = state.hudOn ? (state.hudRadius / state.metersPerPixel) * state.scale : 0; el('hud-circle').setAttribute('r', pxR);
        } else { uContainer.style.display = 'none'; }
        el('btn-lock').style.borderColor = state.isTracking ? '#2563eb' : '#fff';
    }

    function triggerProximity() { state.isAlerting = true; el('proximity-overlay').style.display = 'block'; el('proximity-dismiss-btn').style.display = 'block'; el('gyro-btn').style.display = 'none'; }
    function stopAlert() { state.isAlerting = false; el('proximity-overlay').style.display = 'none'; el('proximity-dismiss-btn').style.display = 'none'; if(!window.gyroActive) el('gyro-btn').style.display = 'block'; }
    function dismissProximity() { state.manuallyDismissed = true; stopAlert(); }

    function parseCoord(i, d) { return parseFloat(i+"."+d); }
    function confirmP1() { haptic(); state.p1={...state.tempPoint, lat:parseCoord(el('lat1_int').value, el('lat1_dec').value), lng:parseCoord(el('lng1_int').value, el('lng1_dec').value)}; state.tempPoint=null; el('p1-inputs').style.display='none'; el('p2-inputs').style.display='block'; el('guide').innerText="P2タップ"; requestRender(); }
    function confirmP2() { 
        haptic(); state.p2={...state.tempPoint, lat:parseCoord(el('lat2_int').value, el('lat2_dec').value), lng:parseCoord(el('lng2_int').value, el('lng2_dec').value)};
        const p1=state.p1, p2=state.p2, r=Math.PI/180;
        state.metersPerPixel = (6371000 * Math.acos(Math.sin(p1.lat*r)*Math.sin(p2.lat*r)+Math.cos(p1.lat*r)*Math.cos(p2.lat*r)*Math.cos((p2.lng-p1.lng)*r))) / Math.hypot(p2.x-p1.x, p2.y-p1.y);
        state.mapNorth = (Math.atan2(p2.x-p1.x, p1.y-p2.y)*180/Math.PI) - (Math.atan2(p2.lng-p1.lng, p2.lat-p1.lat)*180/Math.PI);
        const name = prompt("保存名", "Map"); if(name) { const tx = db.transaction(STORE_NAME, "readwrite"); tx.objectStore(STORE_NAME).add({ name, image: state.currentImgBlob, p1: state.p1, p2: state.p2, mapNorth: state.mapNorth, metersPerPixel: state.metersPerPixel }); }
        saveAndStart(); 
    }

    function saveAndStart() { 
        showStep(4); el('ui-overlay').style.display='flex'; 
        navigator.geolocation.watchPosition(p => { 
            state.userAcc=p.coords.accuracy; 
            state.userPos={x:state.p1.x+(p.coords.longitude-state.p1.lng)/(state.p2.lng-state.p1.lng)*(state.p2.x-state.p1.x), y:state.p1.y+(p.coords.latitude-state.p1.lat)/(state.p2.lat-state.p1.lat)*(state.p2.x-state.p1.x)};
            el('status').innerText=`精度:±${Math.round(state.userAcc)}m`; requestRender(); 
        }, null, {enableHighAccuracy:true});
    }

    function toggleTracking(){ haptic(); state.isTracking=!state.isTracking; requestRender(); }
    function cycleRotateMode(){ haptic(); state.rotateMode=(state.rotateMode+1)%3; el('btn-rotate').innerText=['🧭','⬆️N','🏃⬆️'][state.rotateMode]; requestRender(); }
    function toggleHudConfig(){ haptic(); el('hud-config-panel').style.display=el('hud-config-panel').style.display==='block'?'none':'block'; }
    function updateHudSettings(){ state.hudOn=el('hud-enable').checked; state.hudRadius=parseInt(el('hud-radius-select').value); state.proximityOn=el('proximity-enable').checked; requestRender(); }
    function exitApp() { location.reload(); }
    async function askGyro(){ haptic(); if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){ if(await DeviceOrientationEvent.requestPermission()!=='granted')return; } window.addEventListener('deviceorientation', e=>{ state.userHeading=e.webkitCompassHeading||(360-e.alpha); requestRender(); }, true); window.gyroActive=true; el('gyro-btn').style.display='none'; }
    function handleTargetCheck(cb){ if(cb.checked){ state.targetMode=true; state.currentTargetLetter="A"; alert("地図をタップして目標Aを配置"); toggleHudConfig(); } }
</script>
</body>
</html>
