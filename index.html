<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Advanced Map Tracker v6.3 - Optimized</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --panel-bg: rgba(30, 41, 59, 0.95);
            --accent: #3b82f6; 
            --text: #f8fafc;
        }
        
        body { 
            margin: 0; background: #000; color: var(--text); 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; height: 100dvh; width: 100%; position: fixed;
        }
        
        #viewport { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; touch-action: none; -webkit-user-select: none;
        }
        
        #map-container { 
            position: absolute; 
            top: 50%; left: 50%;
            transform-origin: center center;
            /* iOSのメモリ保護のためwill-changeは控えめに */
            backface-visibility: hidden;
        }
        
        #map-img { 
            display: none; 
            pointer-events: none; 
            position: absolute;
            transform: translate(-50%, -50%); 
        }
        
        .dot { 
            position: absolute; width: 20px; height: 20px; border-radius: 50%; 
            border: 2px solid #fff; transform: translate(-50%, -50%); 
            display: none; z-index: 100; pointer-events: none;
        }
        #p1-dot { background: #ef4444; }
        #p2-dot { background: #22c55e; }
        
        #user-dot { 
            width: 0; height: 0; 
            border-left: 10px solid transparent; border-right: 10px solid transparent; 
            border-bottom: 24px solid var(--accent); 
            z-index: 110; position: absolute; 
            transform: translate(-50%, -70%); display: none; pointer-events: none;
        }
        
        #scale-container {
            position: fixed; bottom: 100px; right: 20px; z-index: 1005;
            text-align: center; pointer-events: none;
        }
        #scale-bar { height: 4px; border: 2px solid white; border-top: none; width: 0px; background: rgba(0,0,0,0.3); }

        #ui-overlay {
            position: fixed; top: 40px; right: 15px; display: none; flex-direction: column; gap: 10px; z-index: 1002;
        }
        .ui-btn {
            width: 44px; height: 44px; background: var(--panel-bg); color: white;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .active-mode { border-color: var(--accent); color: var(--accent); }

        #panel { 
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            max-height: 40vh; padding: 15px; background: var(--panel-bg); 
            backdrop-filter: blur(10px); border-radius: 15px;
            overflow-y: auto; z-index: 1000;
        }
        
        .step { display: none; }
        .active { display: block; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; }
        .blue { background: var(--accent); color: white; }
        input { padding: 10px; margin: 4px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        
        .coord-row { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; }
        .coord-label { width: 45px; font-size: 14px; color: #94a3b8; }
        .int-part { width: 70px; text-align: center; }
        .dec-part { flex: 1; }
        .dot-separator { font-weight: bold; font-size: 20px; color: var(--accent); }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn active-mode" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="scale-container">
    <div id="scale-label">50m</div>
    <div id="scale-bar"></div>
</div>

<div id="viewport">
    <div id="map-container">
        <img id="map-img">
    </div>
    <div id="p1-dot" class="dot"></div>
    <div id="p2-dot" class="dot"></div>
    <div id="user-dot"></div>
</div>

<div id="panel">
    <div id="s1" class="step active">
        <p>STEP 1: 地図画像を選択</p>
        <input type="file" id="file-input" accept="image/*" style="width:100%">
    </div>
    <div id="s2" class="step">
        <p id="guide">P1(赤)をタップして座標入力</p>
        
        <div id="p1-inputs">
            <div class="coord-row">
                <span class="coord-label">P1 緯度</span>
                <input type="number" id="lat1_int" class="int-part" placeholder="35">
                <span class="dot-separator">.</span>
                <input type="number" id="lat1_dec" class="dec-part" placeholder="000000">
            </div>
            <div class="coord-row">
                <span class="coord-label">P1 経度</span>
                <input type="number" id="lng1_int" class="int-part" placeholder="135">
                <span class="dot-separator">.</span>
                <input type="number" id="lng1_dec" class="dec-part" placeholder="000000">
            </div>
            <button onclick="confirmP1()" class="blue">P1登録</button>
        </div>

        <div id="p2-inputs" style="display:none">
            <div class="coord-row">
                <span class="coord-label">P2 緯度</span>
                <input type="number" id="lat2_int" class="int-part" placeholder="35">
                <span class="dot-separator">.</span>
                <input type="number" id="lat2_dec" class="dec-part" placeholder="000000">
            </div>
            <div class="coord-row">
                <span class="coord-label">P2 経度</span>
                <input type="number" id="lng2_int" class="int-part" placeholder="135">
                <span class="dot-separator">.</span>
                <input type="number" id="lng2_dec" class="dec-part" placeholder="000000">
            </div>
            <button onclick="confirmP2()" class="blue" style="background:#10b981">P2登録</button>
        </div>
    </div>
    <div id="s3" class="step">
        <button onclick="saveAndStart()" class="blue">追跡開始</button>
    </div>
    <div id="s4" class="step">
        <div id="status">GPS待機中...</div>
        <button id="gyro-btn" onclick="askGyro()" class="blue">方位計を許可</button>
        <button onclick="location.reload()" style="background:#555; color:white;">リセット</button>
    </div>
</div>

<script>
    const state = { 
        step: 1, p1: null, p2: null, 
        scale: 1, offsetX: 0, offsetY: 0, 
        isTracking: true, rotateMode: 0, 
        mapNorth: 0, metersPerPixel: 0,
        userPos: {x:0, y:0}, userHeading: 0,
        tempPoint: null,
        ticking: false // requestAnimationFrame制御用
    };
    
    const el = id => document.getElementById(id);
    const vNode = el('viewport');

    // 改善点: メモリ効率の良いBlob URLを使用
    el('file-input').onchange = async e => {
        const file = e.target.files[0];
        if (!file) return;

        // 前のURLを解放してメモリを空ける
        const img = el('map-img');
        if (img.src) URL.revokeObjectURL(img.src);

        const blobUrl = URL.createObjectURL(file);
        img.src = blobUrl;
        
        try {
            // 画像のデコードを待機してスムーズに表示
            await img.decode();
            img.style.display = 'block';
            fitImage();
            showStep(2);
        } catch (err) {
            console.error("Image loading failed", err);
        }
    };

    function fitImage() {
        const img = el('map-img');
        const vw = vNode.clientWidth, vh = vNode.clientHeight;
        if (!img.naturalWidth) return;
        state.scale = Math.min(vw / img.naturalWidth, vh / img.naturalHeight) * 0.9; 
        state.offsetX = 0; state.offsetY = 0;
        requestRender();
    }

    let evCache = [];
    let initialDist = 0, initialScale = 1;
    let dragStartX = 0, dragStartY = 0;
    let isClickCandidate = false;

    vNode.onpointerdown = e => {
        evCache.push(e);
        vNode.setPointerCapture(e.pointerId);
        isClickCandidate = true;
        if (evCache.length === 1) {
            dragStartX = e.clientX - state.offsetX;
            dragStartY = e.clientY - state.offsetY;
        } else if (evCache.length === 2) {
            initialDist = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
            initialScale = state.scale;
        }
    };

    vNode.onpointermove = e => {
        const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
        if (index === -1) return;
        evCache[index] = e;
        if (evCache.length === 2) {
            isClickCandidate = false;
            const currentDist = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
            if (initialDist > 0) state.scale = initialScale * (currentDist / initialDist);
            state.isTracking = false;
        } else if (evCache.length === 1) {
            const movement = Math.hypot(e.clientX - (dragStartX + state.offsetX), e.clientY - (dragStartY + state.offsetY));
            if (movement > 5) isClickCandidate = false;
            state.offsetX = e.clientX - dragStartX;
            state.offsetY = e.clientY - dragStartY;
            state.isTracking = false;
        }
        updateUIControls();
        requestRender();
    };

    vNode.onpointerup = vNode.onpointercancel = e => {
        if (isClickCandidate && state.step === 2) handleTap(e);
        evCache = evCache.filter(ev => ev.pointerId !== e.pointerId);
        if (evCache.length < 2) initialDist = 0;
        if (evCache.length === 1) {
            dragStartX = evCache[0].clientX - state.offsetX;
            dragStartY = evCache[0].clientY - state.offsetY;
        }
    };

    // 改善点: 描画ループを最適化
    function requestRender() {
        if (!state.ticking) {
            window.requestAnimationFrame(() => {
                render();
                state.ticking = false;
            });
            state.ticking = true;
        }
    }

    function render() {
        let mapRotation = 0;
        if (state.rotateMode === 1) mapRotation = -state.mapNorth; 
        if (state.rotateMode === 2) mapRotation = -state.mapNorth - state.userHeading; 
        
        el('map-container').style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) rotate(${mapRotation}deg) scale(${state.scale})`;
        
        const img = el('map-img');
        const cx = img.naturalWidth / 2, cy = img.naturalHeight / 2;

        const updatePoint = (id, ix, iy) => {
            const dot = el(id);
            const rad = mapRotation * Math.PI / 180;
            const dx = (ix - cx) * state.scale;
            const dy = (iy - cy) * state.scale;
            const rx = dx * Math.cos(rad) - dy * Math.sin(rad);
            const ry = dx * Math.sin(rad) + dy * Math.cos(rad);
            dot.style.left = `calc(50% + ${state.offsetX + rx}px)`;
            dot.style.top = `calc(50% + ${state.offsetY + ry}px)`;
        };

        if (state.p1) updatePoint('p1-dot', state.p1.x, state.p1.y);
        if (state.tempPoint && !state.p1) updatePoint('p1-dot', state.tempPoint.x, state.tempPoint.y);
        if (state.p2) updatePoint('p2-dot', state.p2.x, state.p2.y);
        if (state.tempPoint && state.p1) updatePoint('p2-dot', state.tempPoint.x, state.tempPoint.y);
        if (state.userPos.x) {
            el('user-dot').style.display = 'block';
            updatePoint('user-dot', state.userPos.x, state.userPos.y);
        }
        if (state.metersPerPixel > 0) el('scale-bar').style.width = (50 / state.metersPerPixel) * state.scale + 'px';
    }

    function handleTap(e) {
        const img = el('map-img');
        if (!img.naturalWidth) return;
        
        const vw = vNode.clientWidth, vh = vNode.clientHeight;
        let mapRotation = 0;
        if (state.rotateMode === 1) mapRotation = -state.mapNorth;
        if (state.rotateMode === 2) mapRotation = -state.mapNorth - state.userHeading;
        const rad = -mapRotation * Math.PI / 180;

        const dx = (e.clientX - vw/2 - state.offsetX) / state.scale;
        const dy = (e.clientY - vh/2 - state.offsetY) / state.scale;

        const rx = dx * Math.cos(rad) - dy * Math.sin(rad);
        const ry = dx * Math.sin(rad) + dy * Math.cos(rad);

        state.tempPoint = { 
            x: rx + (img.naturalWidth / 2), 
            y: ry + (img.naturalHeight / 2) 
        };
        
        const dotId = state.p1 ? 'p2-dot' : 'p1-dot';
        el(dotId).style.display = 'block';
        requestRender();
    }

    function getCombinedCoord(prefix) {
        const i = el(prefix + '_int').value, d = el(prefix + '_dec').value;
        return (i === "" || d === "") ? NaN : parseFloat(i + "." + d);
    }

    function confirmP1() {
        const lat = getCombinedCoord('lat1'), lng = getCombinedCoord('lng1');
        if (!state.tempPoint || isNaN(lat) || isNaN(lng)) return alert("地図をタップして赤点を選び、緯度経度を入力してください");
        state.p1 = {...state.tempPoint, lat, lng};
        state.tempPoint = null;
        el('p1-inputs').style.display = 'none';
        el('p2-inputs').style.display = 'block';
        el('guide').innerText = "P2(緑)をタップして座標入力";
    }

    function confirmP2() {
        const lat = getCombinedCoord('lat2'), lng = getCombinedCoord('lng2');
        if (!state.tempPoint || isNaN(lat) || isNaN(lng)) return alert("地図をタップして緑点を選び、緯度経度を入力してください");
        state.p2 = {...state.tempPoint, lat, lng};
        const p1 = state.p1, p2 = state.p2;
        
        // 2点間の距離と方位角の計算
        const toRad = Math.PI/180;
        const distM = 6371000 * Math.acos(Math.sin(p1.lat*toRad)*Math.sin(p2.lat*toRad) + Math.cos(p1.lat*toRad)*Math.cos(p2.lat*toRad)*Math.cos((p2.lng-p1.lng)*toRad));
        state.metersPerPixel = distM / Math.hypot(p2.x-p1.x, p2.y-p1.y);
        state.mapNorth = (Math.atan2(p2.x-p1.x, p1.y-p2.y)*180/Math.PI) - (Math.atan2(p2.lng-p1.lng, p2.lat-p1.lat)*180/Math.PI);
        showStep(3);
    }

    function saveAndStart() {
        showStep(4); el('ui-overlay').style.display = 'flex';
        navigator.geolocation.watchPosition(p => {
            const {latitude: lat, longitude: lng, accuracy} = p.coords;
            el('status').innerText = `精度: ±${accuracy.toFixed(0)}m`;
            
            // 比率による位置算出
            const ratioX = (lng - state.p1.lng) / (state.p2.lng - state.p1.lng);
            const ratioY = (lat - state.p1.lat) / (state.p2.lat - state.p1.lat);
            state.userPos = { 
                x: state.p1.x + ratioX * (state.p2.x - state.p1.x), 
                y: state.p1.y + ratioY * (state.p2.y - state.p1.y) 
            };

            if (state.isTracking) {
                state.offsetX = -(state.userPos.x - el('map-img').naturalWidth/2) * state.scale;
                state.offsetY = -(state.userPos.y - el('map-img').naturalHeight/2) * state.scale;
            }
            requestRender();
        }, e => { el('status').innerText = "GPSエラー: " + e.message; }, { enableHighAccuracy: true });
    }

    function toggleTracking() { state.isTracking = !state.isTracking; updateUIControls(); }
    function updateUIControls() { el('btn-lock').classList.toggle('active-mode', state.isTracking); }
    function cycleRotateMode() { 
        state.rotateMode = (state.rotateMode + 1) % 3; 
        el('btn-rotate').innerText = ['🧭', '⬆️N', '🏃⬆️'][state.rotateMode]; 
        requestRender(); 
    }
    
    function showStep(n) { 
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); 
        el('s' + n).classList.add('active'); 
        state.step = n; 
        if (n === 4 && 'wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(()=>{}); 
        }
    }

    async function askGyro() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res !== 'granted') return;
        }
        window.addEventListener('deviceorientation', e => {
            state.userHeading = e.webkitCompassHeading || (360 - e.alpha);
            el('user-dot').style.transform = `translate(-50%, -70%) rotate(${state.userHeading}deg)`;
            if (state.rotateMode === 2) requestRender();
        }, true);
        el('gyro-btn').style.display = 'none';
    }
</script>
</body>
</html>
