<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Advanced Map Tracker v4</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --panel-bg: rgba(30, 41, 59, 0.9);
            --accent: #3b82f6; 
            --success: #10b981; 
            --text: #f8fafc;
        }
        
        body { 
            margin: 0; background: #000; color: var(--text); 
            font-family: sans-serif; overflow: hidden; height: 100dvh; 
        }
        
        #viewport { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #000; touch-action: none; 
        }
        
        #map-container { 
            position: absolute; transform-origin: 0 0; will-change: transform;
        }
        
        #map-img { display: none; pointer-events: none; }
        
        .dot { 
            position: absolute; width: 20px; height: 20px; border-radius: 50%; 
            border: 2px solid #fff; transform: translate(-50%, -50%); 
            display: none; z-index: 10;
        }
        #p1-dot { background: #ef4444; }
        #p2-dot { background: #22c55e; }
        
        #user-dot { 
            width: 0; height: 0; border-left: 10px solid transparent; 
            border-right: 10px solid transparent; border-bottom: 24px solid var(--accent); 
            z-index: 20; position: absolute; transform: translate(-50%, -70%); display: none;
        }
        
        /* スケールバー */
        #scale-container {
            position: fixed; bottom: 80px; right: 20px; z-index: 1005;
            text-align: center; pointer-events: none;
        }
        #scale-bar {
            height: 4px; border: 2px solid white; border-top: none;
            width: 0px; transition: width 0.1s; background: rgba(0,0,0,0.3);
        }
        #scale-label { font-size: 10px; text-shadow: 1px 1px 2px black; }

        /* 回転モードボタン */
        #ui-overlay {
            position: fixed; top: 20px; right: 15px; display: none; flex-direction: column; gap: 10px; z-index: 1002;
        }
        .ui-btn {
            width: 44px; height: 44px; background: var(--panel-bg); color: white;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 18px;
        }
        .active-mode { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        #panel { 
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            max-height: 40vh; padding: 15px; background: var(--panel-bg); 
            backdrop-filter: blur(10px); border-radius: 15px;
            overflow-y: auto; z-index: 1000;
        }
        
        .step { display: none; }
        .active { display: block; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; }
        .blue { background: var(--accent); color: white; }
        .green { background: var(--success); color: white; }
        input { width: 100%; padding: 10px; margin: 4px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn active-mode" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="scale-container">
    <div id="scale-label">50m</div>
    <div id="scale-bar"></div>
</div>

<div id="viewport">
    <div id="map-container">
        <img id="map-img">
        <div id="p1-dot" class="dot"></div>
        <div id="p2-dot" class="dot"></div>
        <div id="user-dot"></div>
    </div>
</div>

<div id="panel">
    <div id="s1" class="step active">
        <p>STEP 1: 地図画像を選択</p>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div id="s2" class="step">
        <p id="guide">P1(赤)をタップして「登録」</p>
        <div id="p1-inputs">
            <input type="number" id="lat1" placeholder="P1緯度" step="any">
            <input type="number" id="lng1" placeholder="P1経度" step="any">
            <button onclick="confirmP1()" class="blue">P1を登録</button>
        </div>
        <div id="p2-inputs" style="display:none">
            <input type="number" id="lat2" placeholder="P2緯度" step="any">
            <input type="number" id="lng2" placeholder="P2経度" step="any">
            <button onclick="confirmP2()" class="green">P2を登録</button>
        </div>
    </div>

    <div id="s3" class="step">
        <p>マップ名を入力して開始</p>
        <input type="text" id="map-name" placeholder="山歩きルートなど">
        <button onclick="saveAndStart()" class="blue">追跡開始</button>
    </div>

    <div id="s4" class="step">
        <div id="status" style="font-size:11px; text-align:center;">GPS信号待機中...</div>
        <button id="gyro-btn" onclick="askGyro()">方位計を有効化</button>
        <button onclick="location.reload()" style="background:#555; color:white;">リセット</button>
    </div>
</div>

<script>
    const state = { 
        step: 1, p1: null, p2: null, 
        scale: 1, offsetX: 0, offsetY: 0, 
        isTracking: true, rotateMode: 0, // 0:固定, 1:ノースアップ, 2:ヘディングアップ
        mapNorth: 0, metersPerPixel: 0,
        userPos: {x:0, y:0}, userHeading: 0,
        tempPoint: null
    };
    
    const el = id => document.getElementById(id);
    let mapDataUrl = "";

    // --- 画像読み込み ---
    el('file-input').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            mapDataUrl = ev.target.result;
            el('map-img').src = mapDataUrl;
            el('map-img').onload = () => {
                el('map-img').style.display = 'block';
                fitImage();
                showStep(2);
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function fitImage() {
        const img = el('map-img'), vw = el('viewport').clientWidth, vh = el('viewport').clientHeight;
        state.scale = Math.min(vw / img.naturalWidth, vh / img.naturalHeight);
        state.offsetX = vw/2 - (img.naturalWidth * state.scale)/2;
        state.offsetY = vh/2 - (img.naturalHeight * state.scale)/2;
        updateTransform();
    }

    // --- 地点登録ロジック ---
    function confirmP1() {
        if (!state.tempPoint) return alert("地図をタップして地点を選択してください");
        state.p1 = {...state.tempPoint, lat: parseFloat(el('lat1').value), lng: parseFloat(el('lng1').value)};
        state.tempPoint = null;
        el('p1-inputs').style.display = 'none';
        el('p2-inputs').style.display = 'block';
        el('guide').innerText = "P2(緑)をタップして「登録」";
    }

    function confirmP2() {
        if (!state.tempPoint) return alert("地図をタップして地点を選択してください");
        state.p2 = {...state.tempPoint, lat: parseFloat(el('lat2').value), lng: parseFloat(el('lng2').value)};
        calculateMapLogic();
        showStep(3);
    }

    // 2点からスケールと北を計算
    function calculateMapLogic() {
        const p1 = state.p1, p2 = state.p2;
        // 距離計算 (ハバサイン公式の簡易版)
        const R = 6371000; // 地球の半径(m)
        const dLat = (p2.lat - p1.lat) * Math.PI / 180;
        const dLng = (p2.lng - p1.lng) * Math.PI / 180;
        const a = Math.sin(dLat/2) ** 2 + Math.cos(p1.lat * Math.PI/180) * Math.cos(p2.lat * Math.PI/180) * Math.sin(dLng/2) ** 2;
        const distanceMeters = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        
        const pixelDist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        state.metersPerPixel = distanceMeters / pixelDist;

        // 地図の北（画像上での角度）を計算
        const bearingGps = Math.atan2(dLng, dLat) * 180 / Math.PI; // 真北に対するP1->P2の角度
        const bearingImg = Math.atan2(p2.x - p1.x, p1.y - p2.y) * 180 / Math.PI; // 画像上のP1->P2の角度
        state.mapNorth = bearingImg - bearingGps;
    }

    // --- インタラクション ---
    let evCache = [], lastDist = 0, isDragging = false, startX, startY;

    el('viewport').onpointerdown = e => {
        evCache.push(e);
        isDragging = true;
        startX = e.clientX - state.offsetX;
        startY = e.clientY - state.offsetY;
        el('viewport').setPointerCapture(e.pointerId);
    };

    el('viewport').onpointermove = e => {
        const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
        evCache[index] = e;

        if (evCache.length === 2) {
            const dist = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
            if (lastDist > 0) {
                const cx = (evCache[0].clientX + evCache[1].clientX) / 2;
                const cy = (evCache[0].clientY + evCache[1].clientY) / 2;
                zoomAt(cx, cy, dist / lastDist);
            }
            lastDist = dist;
        } else if (isDragging && evCache.length === 1) {
            state.offsetX = e.clientX - startX;
            state.offsetY = e.clientY - startY;
            state.isTracking = false;
            updateUIControls();
            updateTransform();
        }
    };

    el('viewport').onpointerup = e => {
        const moveDist = Math.hypot(e.clientX - (startX + state.offsetX), e.clientY - (startY + state.offsetY));
        if (moveDist < 10 && evCache.length === 1) handleTap(e);
        evCache = evCache.filter(ev => ev.pointerId !== e.pointerId);
        if (evCache.length < 2) lastDist = 0;
        isDragging = false;
    };

    function handleTap(e) {
        const r = el('viewport').getBoundingClientRect();
        // 表示上の座標から画像上のピクセル座標へ変換（回転を考慮しない簡易版、登録時は回転0前提）
        const x = (e.clientX - r.left - state.offsetX) / state.scale;
        const y = (e.clientY - r.top - state.offsetY) / state.scale;

        if (state.step === 2) {
            state.tempPoint = {x, y};
            const dotId = state.p1 ? 'p2-dot' : 'p1-dot';
            const dot = el(dotId);
            dot.style.left = x + 'px'; dot.style.top = y + 'px'; dot.style.display = 'block';
        }
    }

    function zoomAt(x, y, delta) {
        const newScale = state.scale * delta;
        state.offsetX = x - (x - state.offsetX) * delta;
        state.offsetY = y - (y - state.offsetY) * delta;
        state.scale = newScale;
        updateTransform();
    }

    function updateTransform() {
        // 回転の適用
        let mapRotation = 0;
        if (state.rotateMode === 1) mapRotation = -state.mapNorth; // ノースアップ
        if (state.rotateMode === 2) mapRotation = -state.mapNorth - state.userHeading; // ヘディングアップ
        
        el('map-container').style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) scale(${state.scale}) rotate(${mapRotation}deg)`;
        
        // スケールバー更新 (50mが何ピクセルか)
        if (state.metersPerPixel > 0) {
            const barWidth = (50 / state.metersPerPixel) * state.scale;
            el('scale-bar').style.width = barWidth + 'px';
        }
    }

    // --- 追跡機能 ---
    function saveAndStart() {
        el('ui-overlay').style.display = 'flex';
        showStep(4);
        navigator.geolocation.watchPosition(p => {
            const {latitude: lat, longitude: lng} = p.coords;
            el('status').innerText = `Lat: ${lat.toFixed(5)} Lng: ${lng.toFixed(5)}`;
            
            // 座標変換
            const px = state.p1.x + ((lng - state.p1.lng) / (state.p2.lng - state.p1.lng)) * (state.p2.x - state.p1.x);
            const py = state.p1.y + ((lat - state.p1.lat) / (state.p2.lat - state.p1.lat)) * (state.p2.y - state.p1.y);
            
            state.userPos = {x: px, y: py};
            const dot = el('user-dot');
            dot.style.left = px + 'px'; dot.style.top = py + 'px'; dot.style.display = 'block';

            if (state.isTracking) centerOn(px, py);
        }, null, {enableHighAccuracy: true});
    }

    function centerOn(x, y) {
        const vw = el('viewport').clientWidth, vh = el('viewport').clientHeight;
        // 回転がある場合の中心移動は複雑なため、簡易的に中心へ。
        state.offsetX = vw/2 - (x * state.scale);
        state.offsetY = vh/2 - (y * state.scale);
        updateTransform();
    }

    function cycleRotateMode() {
        state.rotateMode = (state.rotateMode + 1) % 3;
        const icon = ['🧭', '⬆️N', '🏃⬆️'][state.rotateMode];
        el('btn-rotate').innerText = icon;
        el('btn-rotate').classList.toggle('active-mode', state.rotateMode > 0);
        updateTransform();
    }

    function toggleTracking() {
        state.isTracking = !state.isTracking;
        updateUIControls();
    }

    function updateUIControls() {
        el('btn-lock').classList.toggle('active-mode', state.isTracking);
    }

    function showStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        el('s' + n).classList.add('active');
        state.step = n;
    }

    async function askGyro() {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            await DeviceOrientationEvent.requestPermission();
        }
        window.addEventListener('deviceorientation', e => {
            state.userHeading = e.webkitCompassHeading || (360 - e.alpha);
            el('user-dot').style.transform = `translate(-50%, -70%) rotate(${state.userHeading + state.mapNorth}deg)`;
            if (state.rotateMode === 2) updateTransform();
        });
        el('gyro-btn').style.display = 'none';
    }
</script>
</body>
</html>
