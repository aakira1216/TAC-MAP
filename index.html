<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Tactical Map Tracker</title>
    <style>
        /* --- V17.9/19.8 オリジナルUIの維持 --- */
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; height: 100dvh; width: 100%; position: fixed; }
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; }
        #map-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
        #map-img { display: none; pointer-events: none; }
        
        #panel { position: fixed; bottom: 20px; left: 10px; right: 10px; padding: 15px; background: rgba(30,30,30,0.9); border-radius: 10px; z-index: 2000; border: 1px solid #444; }
        .step { display: none; } .active { display: block; }
        button { width: 100%; padding: 12px; margin: 4px 0; border-radius: 5px; border: 1px solid #666; background: #444; color: white; font-size: 16px; font-weight: bold; }
        .blue { background: #2563eb; } .red { background: #dc2626; }
        input { width: 100%; padding: 8px; margin: 4px 0; background: #111; color: white; border: 1px solid #666; box-sizing: border-box; }
        .coord-row { display: flex; align-items: center; gap: 4px; }

        #scale-bar-container { position: fixed; bottom: 120px; right: 15px; z-index: 1200; display: none; background: rgba(0,0,0,0.6); padding: 5px; border: 1px solid #fff; }
        #ui-overlay { position: fixed; top: 40px; right: 15px; display: none; flex-direction: column; gap: 10px; z-index: 1002; }
        .ui-btn { width: 50px; height: 50px; background: rgba(30,30,30,0.9); border: 1px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* --- 横向き（Landscape）指定レイアウト修正 --- */
        @media (orientation: landscape) {
            #panel {
                top: 10px; bottom: 10px; left: 10px; right: auto;
                width: 90px;
                padding: 10px 5px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
            #s4 { height: 100%; }
            #s4 > div {
                height: 100%;
                display: flex !important;
                flex-direction: column !important;
                justify-content: space-between !important;
                align-items: center !important;
            }
            /* ステータス(GPS精度)を一番上に配置 */
            #status { order: -1; font-size: 11px; text-align: center; width: 100%; line-height: 1.2; }
            /* ボタンを下から順に積み上げ（終了が一番下） */
            #s4 div[style*="flex"] {
                flex-direction: column-reverse !important;
                width: 100%;
                gap: 5px !important;
            }
            #panel button { padding: 8px 0 !important; font-size: 11px !important; margin: 0 !important; height: 40px; }

            /* 右側：中央に🎯🧭 / 右下隅にスケールバー */
            #ui-overlay { top: 50%; right: 15px; transform: translateY(-50%); display: flex; }
            #scale-bar-container { bottom: 15px; right: 15px; top: auto; display: flex; }
        }
    </style>
</head>
<body>

<div id="viewport">
    <div id="map-container"><img id="map-img"></div>
    <div id="user-container" style="position:absolute; display:none; z-index:1100;">
        <div id="user-dot" style="width:0; height:0; border-left:10px solid transparent; border-right:10px solid transparent; border-bottom:20px solid #2563eb;"></div>
    </div>
</div>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="scale-bar-container">
    <div id="scale-label" style="font-size:11px; text-align:center;">---m</div>
    <div id="scale-bar" style="height:4px; width:100px; background: linear-gradient(90deg, #fff 50%, #000 50%); background-size:20px 100%; border:1px solid #fff;"></div>
</div>

<div id="panel">
    <div id="s0" class="step active">
        <button class="blue" onclick="startNewMap()">新規マップ</button>
        <button onclick="showMapList()">保存リスト</button>
    </div>
    <div id="s2" class="step">
        <p id="guide" style="font-size:12px; margin:0; text-align:center;">P1座標を入力</p>
        <div id="p1-inputs">
            <div class="coord-row"><input type="number" id="lat1_int">.<input type="number" id="lat1_dec"></div>
            <div class="coord-row"><input type="number" id="lng1_int">.<input type="number" id="lng1_dec"></div>
            <button onclick="confirmP1()" class="red">P1確定</button>
        </div>
        <div id="p2-inputs" style="display:none">
            <div class="coord-row"><input type="number" id="lat2_int">.<input type="number" id="lat2_dec"></div>
            <div class="coord-row"><input type="number" id="lng2_int">.<input type="number" id="lng2_dec"></div>
            <button onclick="confirmP2()" class="blue">P2確定</button>
        </div>
    </div>
    <div id="s4" class="step">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="status">GPS待機中...</div>
            <div style="display:flex; gap:5px;">
                <button id="gyro-btn" onclick="askGyro()" class="blue">方位許可</button>
                <button id="hud-toggle-btn" onclick="toggleHudConfig()">HUD設定</button>
                <button id="exit-btn" onclick="exitApp()" class="red">終了</button>
            </div>
        </div>
    </div>
</div>

<script>
    /* --- V17.9/19.8 オリジナルロジックの復旧 --- */
    const DB_NAME = "MapTrackerDB", STORE_NAME = "maps";
    let db, pointers = [], lastPoint = null, ticking = false;
    const state = { step: 0, p1: null, p2: null, scale: 1, x: 0, y: 0, isTracking: true, rotateMode: 0 };

    const el = id => document.getElementById(id), container = el('map-container');

    const initDB = () => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => db = e.target.result;
    };
    initDB();

    function showStep(n){ document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); if(el('s'+n)) el('s'+n).classList.add('active'); state.step=n; }

    function startNewMap() {
        const input = document.createElement('input'); input.type='file';
        input.onchange = e => {
            const file = e.target.files[0]; if(!file) return;
            const img = el('map-img');
            img.onload = () => { img.style.display='block'; showStep(2); };
            img.src = URL.createObjectURL(file);
        };
        input.click();
    }

    function requestRender() {
        if(!ticking) {
            window.requestAnimationFrame(() => {
                container.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
                ticking = false;
            });
            ticking = true;
        }
    }

    /* 基本ナビゲーション/GPS開始 */
    function confirmP1() { el('p1-inputs').style.display='none'; el('p2-inputs').style.display='block'; }
    function confirmP2() { showStep(4); el('ui-overlay').style.display='flex'; el('scale-bar-container').style.display='flex'; }
    function toggleTracking(){ state.isTracking = !state.isTracking; }
    function cycleRotateMode(){ state.rotateMode = (state.rotateMode + 1) % 3; }
    function exitApp() { location.reload(); }
    async function askGyro() { if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') await DeviceOrientationEvent.requestPermission(); el('gyro-btn').style.display='none'; }
</script>
</body>
</html>
