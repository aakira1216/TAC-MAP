<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tactical Map PWA</title>
    <style>
        :root { 
            --panel-bg: rgba(30, 41, 59, 0.9); --accent: #3b82f6; 
            --success: #10b981; --danger: #ef4444; --text: #f8fafc;
            --glass: rgba(15, 23, 42, 0.7); --glass-border: rgba(255, 255, 255, 0.2);
        }
        body { margin: 0; background: #000; color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100dvh; width: 100%; position: fixed; }
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        #map-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
        #map-img { display: none; pointer-events: none; }

        /* --------------------------------------------------
           縦位置（ポートレート）: 14pxパディング・既存配置を固定
           -------------------------------------------------- */
        #panel { position: fixed; bottom: 20px; left: 15px; right: 15px; padding: 15px; background: var(--panel-bg); backdrop-filter: blur(15px); border-radius: 20px; z-index: 2000; border: 1px solid rgba(255,255,255,0.1); }
        .step { display: none; } .active { display: block; }
        
        /* 縦位置ボタン：14pxパディングを厳格に適用 */
        button { width: 100%; padding: 14px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; touch-action: manipulation; }
        .blue { background: var(--accent); color: white; } 
        .red { background: var(--danger); color: white; } 
        .outline { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.4); color: white; }
        .outline-danger { background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); color: white; }

        #status { font-size: 14px; margin-bottom: 5px; }

        /* 縦：右側UI（ターゲット・方位） */
        #ui-overlay { position: fixed; top: 44px; right: 15px; display: none; flex-direction: column; gap: 12px; z-index: 1002; }
        .ui-btn { width: 50px; height: 50px; background: var(--panel-bg); color: white; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* 縦：スケールバー */
        #scale-bar-container { position: fixed; bottom: 116px; right: 15px; z-index: 1200; pointer-events: none; display: none; flex-direction: column; align-items: center; background: var(--glass); backdrop-filter: blur(10px); padding: 8px; border-radius: 12px; border: 1px solid var(--glass-border); width: 110px; }
        #scale-label { font-size: 12px; font-weight: 900; margin-bottom: 4px; font-family: monospace; color: white; }
        #scale-bar { height: 4px; width: 100px; background: linear-gradient(90deg, #fff 50%, #000 50%); background-size: 20px 100%; border: 1px solid #fff; }

        /* --------------------------------------------------
           横位置（ランドスケープ）: 垂直方向の指示通りに配置
           -------------------------------------------------- */
        @media (orientation: landscape) {
            #panel {
                width: 130px;
                left: 15px;
                right: auto;
                top: 15px;
                bottom: 15px;
                padding: 10px;
                display: flex;
                flex-direction: column;
            }
            #s4 { height: 100%; width: 100%; }
            .landscape-left-layout {
                display: flex !important;
                flex-direction: column !important;
                height: 100%;
                width: 100%;
            }
            /* 指示1: 最上部に精度表示 */
            #status {
                order: 1;
                font-size: 11px !important;
                margin: 0 0 auto 0 !important;
                text-align: center;
                padding: 4px 0;
            }
            /* ボタンスタック */
            .landscape-btns {
                order: 2;
                display: flex !important;
                flex-direction: column !important;
                gap: 5px !important;
            }
            /* 指示2: ボタン順序（動的 > HUD > 終了） */
            #gyro-btn, #proximity-dismiss-btn { order: 1; }
            #hud-btn-el { order: 2; }
            #exit-btn { order: 3; }

            /* 横画面専用ボタン調整 */
            #s4 button {
                width: 100% !important;
                padding: 10px 0 !important;
                font-size: 12px !important;
                margin: 0 !important;
            }

            /* 指示3: 右側中央にターゲット系UI */
            #ui-overlay {
                display: flex !important;
                top: 50% !important;
                right: 15px;
                transform: translateY(-50%);
            }
            /* 指示4: 右側下部にスケールバー */
            #scale-bar-container {
                display: flex !important;
                bottom: 15px !important;
                top: auto !important;
                right: 15px;
            }
        }

        /* 共通設定 */
        .dot { position: absolute; width: 22px; height: 22px; border-radius: 50%; border: 2px solid #fff; transform: translate(-50%, -50%); display: none; z-index: 1000; }
        #user-container { position: absolute; pointer-events: none; display: none; z-index: 1100; }
        #user-dot { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 24px solid var(--accent); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -70%); }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: white; box-sizing: border-box; }
        .coord-row { display: flex; gap: 4px; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="map-container"><img id="map-img"></div>
    <div id="p1-dot" class="dot"></div>
    <div id="p2-dot" class="dot"></div>
    <div id="user-container"><div id="user-dot-wrapper"><div id="user-dot"></div></div></div>
</div>

<div id="scale-bar-container"><div id="scale-label">---m</div><div id="scale-bar"></div></div>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="panel">
    <div id="s0" class="step active"><button class="blue" onclick="startNewMap()">＋ 新規マップ</button><button class="outline" onclick="location.reload()">📂 読み込み</button></div>
    <div id="s2" class="step">
        <p id="guide" style="margin:0 0 5px 0; font-weight:bold; font-size:12px;">P1座標入力</p>
        <div id="p1-inputs">
            <div class="coord-row"><input type="number" id="lat1_int" placeholder="Lat度">.<input type="number" id="lat1_dec" placeholder="小数"></div>
            <div class="coord-row"><input type="number" id="lng1_int" placeholder="Lng度">.<input type="number" id="lng1_dec" placeholder="小数"></div>
            <button onclick="confirmP1()" class="red">P1登録</button>
        </div>
        <div id="p2-inputs" style="display:none">
            <div class="coord-row"><input type="number" id="lat2_int">.<input type="number" id="lat2_dec"></div>
            <div class="coord-row"><input type="number" id="lng2_int">.<input type="number" id="lng2_dec"></div>
            <button onclick="confirmP2()" class="blue" style="background:var(--success)">P2登録</button>
        </div>
    </div>
    <div id="s4" class="step">
        <div class="landscape-left-layout">
            <div id="status">GPS待機中...</div>
            <div class="landscape-btns">
                <button id="proximity-dismiss-btn" onclick="dismissProximity()" class="outline-danger" style="display:none;">アラート解除</button>
                <button id="gyro-btn" onclick="askGyro()" class="blue">方位許可</button>
                <button id="hud-btn-el" onclick="toggleHudConfig()" class="outline">HUD設定</button>
                <button id="exit-btn" onclick="exitApp()" class="outline-danger">終了</button>
            </div>
        </div>
    </div>
</div>

<script>
    const el = id => document.getElementById(id), vNode = el('viewport'), container = el('map-container');
    let pointers = [], lastDist = 0, lastPoint = null;
    const state = { step: 0, p1: null, p2: null, scale: 1, x: 0, y: 0, isTracking: true, rotateMode: 0, mapNorth: 0, metersPerPixel: 0, userPos: {x:0, y:0}, userHeading: 0, userAcc: 0 };

    function showStep(n){ document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); if(el('s'+n)) el('s'+n).classList.add('active'); state.step=n; }
    function startNewMap() { const input = document.createElement('input'); input.type='file'; input.accept='image/*'; input.onchange=e=>{ const file=e.target.files[0]; if(!file)return; const img = el('map-img'); img.onload = () => { img.style.display='block'; fitImage(); showStep(2); }; img.src = URL.createObjectURL(file); }; input.click(); }
    function fitImage() { const img = el('map-img'), vw = vNode.clientWidth, vh = vNode.clientHeight; state.scale = Math.min(vw/img.naturalWidth, vh/img.naturalHeight)*0.8; state.x = vw/2 - (img.naturalWidth/2*state.scale); state.y = vh/2 - (img.naturalHeight/2*state.scale); render(); }

    vNode.addEventListener('pointerdown', e => { vNode.setPointerCapture(e.pointerId); pointers.push(e); if(pointers.length === 1) lastPoint = { x: e.clientX, y: e.clientY }; else if(pointers.length === 2) lastDist = Math.hypot(pointers[0].clientX - pointers[1].clientX, pointers[0].clientY - pointers[1].clientY); });
    vNode.addEventListener('pointermove', e => {
        const idx = pointers.findIndex(p => p.pointerId === e.pointerId); if(idx === -1) return; pointers[idx] = e;
        if(pointers.length === 1 && lastPoint) { state.x += e.clientX - lastPoint.x; state.y += e.clientY - lastPoint.y; lastPoint = { x: e.clientX, y: e.clientY }; state.isTracking = false; }
        else if(pointers.length === 2) {
            const midX = (pointers[0].clientX + pointers[1].clientX) / 2, midY = (pointers[0].clientY + pointers[1].clientY) / 2, dist = Math.hypot(pointers[0].clientX - pointers[1].clientX, pointers[0].clientY - pointers[1].clientY), zoom = dist / lastDist;
            state.scale *= zoom; state.x = midX - (midX - state.x) * zoom; state.y = midY - (midY - state.y) * zoom; lastDist = dist;
        }
        render();
    });
    vNode.addEventListener('pointerup', e => { if(pointers.length === 1 && state.step === 2) handleTap(e); pointers = pointers.filter(p => p.pointerId !== e.pointerId); });

    function handleTap(e) { state.tempPoint = { x: (e.clientX - state.x) / state.scale, y: (e.clientY - state.y) / state.scale }; render(); }
    function render() {
        const rot = (state.rotateMode === 1) ? -state.mapNorth : (state.rotateMode === 2) ? -state.mapNorth - state.userHeading : 0;
        const rad = rot * Math.PI / 180, cos = Math.cos(rad), sin = Math.sin(rad), sx = vNode.clientWidth / 2, sy = vNode.clientHeight / 2;
        if(state.isTracking && state.userPos.x){ state.x = sx - (state.userPos.x * state.scale * cos - state.userPos.y * state.scale * sin); state.y = sy - (state.userPos.x * state.scale * sin + state.userPos.y * state.scale * cos); }
        container.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${rot}deg) scale(${state.scale})`;
        if(state.metersPerPixel) { el('scale-bar-container').style.display = 'flex'; const mpp = 100 * (state.metersPerPixel / state.scale); el('scale-label').innerText = mpp >= 1000 ? (mpp/1000).toFixed(1)+"km" : Math.round(mpp)+"m"; }
        drawDot('p1-dot', state.p1 || (state.step===2 && !state.p2 ? state.tempPoint : null));
        drawDot('p2-dot', state.p2 || (state.step===2 && state.p1 ? state.tempPoint : null));
        if(state.userPos.x) { const ux = state.x + (state.userPos.x * state.scale * cos - state.userPos.y * state.scale * sin), uy = state.y + (state.userPos.x * state.scale * sin + state.userPos.y * state.scale * cos); el('user-container').style.display='block'; el('user-container').style.left=ux+'px'; el('user-container').style.top=uy+'px'; el('user-dot-wrapper').style.transform=`rotate(${state.userHeading + state.mapNorth + rot}deg)`; }
    }
    function drawDot(id, p) { const d = el(id); if(!p) { d.style.display='none'; return; } const rot = (state.rotateMode === 1) ? -state.mapNorth : (state.rotateMode === 2) ? -state.mapNorth - state.userHeading : 0; const rad = rot * Math.PI / 180; const tx = state.x + (p.x * state.scale * Math.cos(rad) - p.y * state.scale * Math.sin(rad)), ty = state.y + (p.x * state.scale * Math.sin(rad) + p.y * state.scale * Math.cos(rad)); d.style.left = tx+'px'; d.style.top = ty+'px'; d.style.display='block'; }

    function confirmP1() { const lat = parseFloat(el('lat1_int').value+'.'+el('lat1_dec').value), lng = parseFloat(el('lng1_int').value+'.'+el('lng1_dec').value); if(!state.tempPoint||isNaN(lat)) return; state.p1={...state.tempPoint, lat, lng}; state.tempPoint=null; el('p1-inputs').style.display='none'; el('p2-inputs').style.display='block'; el('guide').innerText="P2座標入力"; render(); }
    function confirmP2() { const lat = parseFloat(el('lat2_int').value+'.'+el('lat2_dec').value), lng = parseFloat(el('lng2_int').value+'.'+el('lng2_dec').value); if(!state.tempPoint||isNaN(lat)) return; state.p2={...state.tempPoint, lat, lng}; const p1=state.p1, p2=state.p2, r=Math.PI/180; state.metersPerPixel = (6371000 * Math.acos(Math.sin(p1.lat*r)*Math.sin(p2.lat*r)+Math.cos(p1.lat*r)*Math.cos(p2.lat*r)*Math.cos((p2.lng-p1.lng)*r))) / Math.hypot(p2.x-p1.x, p2.y-p1.y); state.mapNorth = (Math.atan2(p2.x-p1.x, p1.y-p2.y)*180/Math.PI) - (Math.atan2(p2.lng-p1.lng, p2.lat-p1.lat)*180/Math.PI); showStep(4); el('ui-overlay').style.display='flex'; startWatch(); }
    function startWatch() { navigator.geolocation.watchPosition(p => { state.userAcc=p.coords.accuracy; state.userPos={x:state.p1.x+(p.coords.longitude-state.p1.lng)/(state.p2.lng-state.p1.lng)*(state.p2.x-state.p1.x), y:state.p1.y+(p.coords.latitude-state.p1.lat)/(state.p2.lat-state.p1.lat)*(state.p2.y-state.p1.y)}; el('status').innerHTML=`精度: &plusmn;${Math.round(state.userAcc)}m`; render(); }, null, {enableHighAccuracy:true}); }
    function toggleTracking(){ state.isTracking=!state.isTracking; render(); }
    function cycleRotateMode(){ state.rotateMode=(state.rotateMode+1)%3; el('btn-rotate').innerText=['🧭','⬆️N','🏃⬆️'][state.rotateMode]; render(); }
    function exitApp() { location.reload(); }
    async function askGyro(){ if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){ if(await DeviceOrientationEvent.requestPermission()!=='granted')return; } window.addEventListener('deviceorientation', e=>{ state.userHeading=e.webkitCompassHeading||(360-e.alpha); render(); }, true); el('gyro-btn').style.display='none'; }
</script>
</body>
</html>
