<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Map Tracker v8</title>
    <style>
        :root { 
            --bg: #0f172a; --panel-bg: rgba(30, 41, 59, 0.95);
            --accent: #3b82f6; --success: #10b981; --text: #f8fafc;
        }
        body { 
            margin: 0; background: #000; color: var(--text); 
            font-family: -apple-system, sans-serif; overflow: hidden; height: 100dvh; 
            position: fixed; width: 100%;
        }
        #viewport { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden; background: #000; touch-action: none; 
        }
        #map-container { 
            position: absolute; transform-origin: 0 0; will-change: transform;
        }
        #map-img { display: none; pointer-events: none; }
        .dot { 
            position: absolute; width: 22px; height: 22px; border-radius: 50%; 
            border: 2px solid #fff; transform: translate(-50%, -50%); 
            display: none; z-index: 100; pointer-events: none;
        }
        #p1-dot { background: #ef4444; }
        #p2-dot { background: #22c55e; }
        #user-dot { 
            width: 0; height: 0; border-left: 12px solid transparent; 
            border-right: 12px solid transparent; border-bottom: 28px solid var(--accent); 
            z-index: 110; position: absolute; transform: translate(-50%, -70%); 
            display: none; pointer-events: none;
        }
        #ui-overlay {
            position: fixed; top: 40px; right: 15px; display: none; flex-direction: column; gap: 12px; z-index: 1002;
        }
        .ui-btn {
            width: 50px; height: 50px; background: var(--panel-bg); color: white;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 22px;
        }
        .active-mode { border-color: var(--accent); color: var(--accent); }
        #panel { 
            position: fixed; bottom: 20px; left: 15px; right: 15px;
            max-height: 40vh; padding: 18px; background: var(--panel-bg); 
            backdrop-filter: blur(15px); border-radius: 20px; overflow-y: auto; z-index: 1000;
        }
        .step { display: none; }
        .active { display: block; }
        button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .blue { background: var(--accent); color: white; }
        input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn active-mode" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="viewport">
    <div id="map-container">
        <img id="map-img">
    </div>
    <div id="p1-dot" class="dot"></div>
    <div id="p2-dot" class="dot"></div>
    <div id="user-dot"></div>
</div>

<div id="panel">
    <div id="s1" class="step active">
        <p>STEP 1: 地図画像を選択</p>
        <input type="file" id="file-input" accept="image/*">
    </div>
    <div id="s2" class="step">
        <p id="guide">P1(赤)をタップして登録</p>
        <div id="p1-inputs">
            <input type="number" id="lat1" placeholder="P1緯度" step="any">
            <input type="number" id="lng1" placeholder="P1経度" step="any">
            <button onclick="confirmP1()" class="blue">P1を登録</button>
        </div>
        <div id="p2-inputs" style="display:none">
            <input type="number" id="lat2" placeholder="P2緯度" step="any">
            <input type="number" id="lng2" placeholder="P2経度" step="any">
            <button onclick="confirmP2()" class="blue" style="background:#10b981">P2を登録</button>
        </div>
    </div>
    <div id="s3" class="step">
        <button onclick="saveAndStart()" class="blue">追跡開始</button>
    </div>
    <div id="s4" class="step">
        <div id="status" style="font-size:12px; text-align:center;">GPS信号待機中...</div>
        <button id="gyro-btn" onclick="askGyro()" class="blue">方位計を有効化</button>
        <button onclick="location.reload()" style="background:#444; color:white; margin-top:10px;">リセット</button>
    </div>
</div>

<script>
    const state = { 
        step: 1, p1: null, p2: null, 
        scale: 1, offsetX: 0, offsetY: 0, 
        isTracking: true, rotateMode: 0, 
        mapNorth: 0, userPos: {x:0, y:0}, userHeading: 0, tempPoint: null
    };
    
    const el = id => document.getElementById(id);
    const vNode = el('viewport');

    el('file-input').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            el('map-img').src = ev.target.result;
            el('map-img').onload = () => {
                el('map-img').style.display = 'block';
                fitImage();
                showStep(2);
            };
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function fitImage() {
        const img = el('map-img');
        state.scale = Math.min(vNode.clientWidth / img.naturalWidth, vNode.clientHeight / img.naturalHeight);
        state.offsetX = (vNode.clientWidth - img.naturalWidth * state.scale) / 2;
        state.offsetY = (vNode.clientHeight - img.naturalHeight * state.scale) / 2;
        updateTransform();
    }

    let evCache = [];
    let lastDist = 0;
    let dragStartX = 0, dragStartY = 0;

    vNode.onpointerdown = e => {
        evCache.push(e);
        vNode.setPointerCapture(e.pointerId);
        dragStartX = e.clientX - state.offsetX;
        dragStartY = e.clientY - state.offsetY;
    };

    vNode.onpointermove = e => {
        const index = evCache.findIndex(ev => ev.pointerId === e.pointerId);
        if (index === -1) return;
        evCache[index] = e;

        if (evCache.length === 2) {
            const dist = Math.hypot(evCache[0].clientX - evCache[1].clientX, evCache[0].clientY - evCache[1].clientY);
            if (lastDist > 0) {
                const ratio = dist / lastDist;
                const centerX = (evCache[0].clientX + evCache[1].clientX) / 2;
                const centerY = (evCache[0].clientY + evCache[1].clientY) / 2;
                state.offsetX = centerX - (centerX - state.offsetX) * ratio;
                state.offsetY = centerY - (centerY - state.offsetY) * ratio;
                state.scale *= ratio;
            }
            lastDist = dist;
            state.isTracking = false; 
        } else if (evCache.length === 1) {
            state.offsetX = e.clientX - dragStartX;
            state.offsetY = e.clientY - dragStartY;
            state.isTracking = false; 
        }
        updateUIControls();
        updateTransform();
    };

    vNode.onpointerup = vNode.onpointercancel = e => {
        if (evCache.length === 1 && state.step === 2) {
            const currentMoveDist = Math.hypot(e.clientX - (dragStartX + state.offsetX), e.clientY - (dragStartY + state.offsetY));
            if (currentMoveDist < 10) handleTap(e);
        }
        evCache = evCache.filter(ev => ev.pointerId !== e.pointerId);
        if (evCache.length < 2) lastDist = 0;
    };

    function updateTransform() {
        let rot = 0;
        if (state.rotateMode === 1) rot = -state.mapNorth; 
        if (state.rotateMode === 2) rot = -state.mapNorth - state.userHeading; 

        // 描画ロジックの安定化
        el('map-container').style.transform = `translate(${state.offsetX}px, ${state.offsetY}px) scale(${state.scale}) rotate(${rot}deg)`;
        
        const updateDot = (id, x, y) => {
            const rad = rot * Math.PI / 180;
            const sx = x * state.scale, sy = y * state.scale;
            const rx = sx * Math.cos(rad) - sy * Math.sin(rad);
            const ry = sx * Math.sin(rad) + sy * Math.cos(rad);
            const d = el(id);
            d.style.left = (state.offsetX + rx) + 'px';
            d.style.top = (state.offsetY + ry) + 'px';
        };

        if (state.p1) updateDot('p1-dot', state.p1.x, state.p1.y);
        if (state.p2) updateDot('p2-dot', state.p2.x, state.p2.y);
        if (state.userPos.x !== 0) {
            el('user-dot').style.display = 'block';
            updateDot('user-dot', state.userPos.x, state.userPos.y);
        }
    }

    function handleTap(e) {
        const x = (e.clientX - state.offsetX) / state.scale;
        const y = (e.clientY - state.offsetY) / state.scale;
        state.tempPoint = {x, y};
        const dotId = state.p1 ? 'p2-dot' : 'p1-dot';
        el(dotId).style.display = 'block';
        updateTransform();
    }

    function confirmP1() {
        const lat = parseFloat(el('lat1').value), lng = parseFloat(el('lng1').value);
        if (!state.tempPoint || isNaN(lat)) return alert("地点を選択してください");
        state.p1 = {...state.tempPoint, lat, lng};
        state.tempPoint = null;
        el('p1-inputs').style.display = 'none';
        el('p2-inputs').style.display = 'block';
        el('guide').innerText = "P2(緑)をタップして登録";
    }

    function confirmP2() {
        const lat = parseFloat(el('lat2').value), lng = parseFloat(el('lng2').value);
        if (!state.tempPoint || isNaN(lat)) return alert("P2を選択してください");
        state.p2 = {...state.tempPoint, lat, lng};
        
        const p1 = state.p1, p2 = state.p2;
        const dLat = (p2.lat - p1.lat), dLng = (p2.lng - p1.lng);
        state.mapNorth = (Math.atan2(p2.x-p1.x, p1.y-p2.y)*180/Math.PI) - (Math.atan2(dLng, dLat)*180/Math.PI);
        showStep(3);
    }

    function saveAndStart() {
        showStep(4);
        el('ui-overlay').style.display = 'flex';
        
        // 精度設定をiPhone向けに調整
        const geoOptions = { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 };
        
        navigator.geolocation.watchPosition(p => {
            const {latitude: lat, longitude: lng, accuracy} = p.coords;
            el('status').innerText = `精度: ±${accuracy.toFixed(0)}m`;
            
            const dLat = (state.p2.lat - state.p1.lat) || 0.000001;
            const dLng = (state.p2.lng - state.p1.lng) || 0.000001;
            
            const px = state.p1.x + ((lng - state.p1.lng) / dLng) * (state.p2.x - state.p1.x);
            const py = state.p1.y + ((lat - state.p1.lat) / dLat) * (state.p2.y - state.p1.y);
            
            state.userPos = {x: px, y: py};
            if (state.isTracking) {
                state.offsetX = vNode.clientWidth/2 - px * state.scale;
                state.offsetY = vNode.clientHeight/2 - py * state.scale;
            }
            updateTransform();
        }, e => { el('status').innerText = "GPSエラー: " + e.message; }, geoOptions);
    }

    function toggleTracking() {
        state.isTracking = !state.isTracking;
        el('btn-lock').classList.toggle('active-mode', state.isTracking);
    }

    function cycleRotateMode() {
        state.rotateMode = (state.rotateMode + 1) % 3;
        el('btn-rotate').innerText = ['🧭', '⬆️N', '🏃⬆️'][state.rotateMode];
        updateTransform();
    }

    function showStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        el('s' + n).classList.add('active');
        state.step = n;
    }

    async function askGyro() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res !== 'granted') return alert("方位計の利用を許可してください");
            } catch (e) { console.error(e); }
        }
        window.addEventListener('deviceorientation', e => {
            state.userHeading = e.webkitCompassHeading || (360 - e.alpha);
            el('user-dot').style.transform = `translate(-50%, -70%) rotate(${state.userHeading}deg)`;
            if (state.rotateMode === 2) updateTransform();
        }, true);
        el('gyro-btn').style.display = 'none';
    }
</script>
</body>
</html>
