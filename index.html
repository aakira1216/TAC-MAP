<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tactical Map v19.8</title>
    
    <!-- 既存ライブラリ -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- [v19.8 共通・縦画面スタイル] --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }

        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2000; display: none;
        }

        #panel {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(10, 10, 10, 0.9); border: 1px solid #444;
            border-radius: 12px; padding: 15px; z-index: 1001; color: white; box-sizing: border-box;
        }

        /* 座標入力：v19.8 正（2セル分割） */
        .coord-container { display: flex; align-items: center; justify-content: center; gap: 5px; margin: 8px 0; }
        .coord-cell { width: 60px; background: #000; border: 1px solid #0f0; color: #0f0; text-align: center; padding: 8px; font-size: 18px; font-family: monospace; border-radius: 4px; }

        /* スケールバー：v19.8 正（50m基準） */
        #scale-bar-container {
            position: fixed; bottom: 160px; left: 20px; background: rgba(0, 0, 0, 0.7);
            padding: 8px; border-radius: 4px; z-index: 1000; border: 1px solid #333;
        }
        #scale-label { color: #0f0; font-size: 11px; font-weight: bold; margin-bottom: 2px; }
        #scale-bar { height: 4px; background: #0f0; transition: width 0.1s linear; }

        #ui-overlay {
            position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 1002;
        }

        button {
            background: #1a1a1a; color: #fff; border: 1px solid #555; padding: 12px;
            border-radius: 6px; font-size: 14px; cursor: pointer;
        }
        .outline { border: 2px solid #0f0 !important; width: 100%; }

        /* 点滅アラート */
        @keyframes blink-red { 0%, 100% { background: transparent; } 50% { background: rgba(255, 0, 0, 0.5); } }
        .alert-active #flash-overlay { display: block; animation: blink-red 0.4s infinite; }

        /* --- [横画面レイアウト修正：位置とサイズ移動のみ] --- */
        @media (orientation: landscape) {
            /* 1. 右側：ターゲット/回転を中央、スケールバーを右下 */
            #ui-overlay {
                top: 50% !important; right: 15px !important;
                transform: translateY(-50%) !important; gap: 20px !important;
            }

            #scale-bar-container {
                bottom: 15px !important; right: 15px !important;
                left: auto !important; top: auto !important;
            }

            /* 2 & 3. 左側：パネルリサイズ（ボタン幅同期）と要素の順序 */
            #panel {
                top: 15px !important; bottom: 15px !important;
                left: 15px !important; transform: none !important;
                width: 130px !important; /* HUD設定ボタンの幅に合わせる */
                height: auto !important;
                display: flex !important; flex-direction: column !important;
                padding: 10px !important;
            }

            #s4 { display: flex !important; flex-direction: column !important; height: 100% !important; }

            #status-display { order: -1 !important; margin-bottom: auto !important; }

            .btn-stack {
                display: flex !important; flex-direction: column-reverse !important;
                gap: 8px !important; width: 100% !important;
            }

            #panel button { width: 100% !important; padding: 8px 2px !important; font-size: 11px !important; margin: 0 !important; }
            .coord-container { transform: scale(0.85); margin: 5px 0; }
        }
    </style>
</head>
<body>

<div id="map"></div>
<div id="flash-overlay"></div>

<!-- 右側UI -->
<div id="ui-overlay">
    <button id="btn-lock" onclick="toggleLock()">🎯</button>
    <button id="btn-rotate" onclick="toggleRotate()">🧭</button>
</div>

<!-- スケールバー -->
<div id="scale-bar-container">
    <div id="scale-label">50m</div>
    <div id="scale-bar" style="width: 50px;"></div>
</div>

<!-- 操作パネル -->
<div id="panel">
    <div id="s4">
        <div id="status-display" style="color: #0f0; font-size: 12px; text-align: center;">Acc: ±--m</div>
        
        <div class="coord-container">
            <input type="number" class="coord-cell" id="lat-int" placeholder="35">
            <span style="color:#0f0">.</span>
            <input type="number" class="coord-cell" id="lat-dec" placeholder="1234">
        </div>

        <div class="btn-stack">
            <button id="exit-btn" onclick="exitApp()">EXIT</button>
            <button id="hud-toggle-btn" class="outline">HUD設定</button>
            <button id="gyro-btn" onclick="requestGyro()">方位許可</button>
            <button id="proximity-dismiss-btn" style="display:none;" onclick="dismissAlert()">通知解除</button>
        </div>
    </div>
</div>

<script>
    /* --- [v19.8 全機能ロジック] --- */
    let map, userMarker, accuracyCircle;
    let isLocked = false;
    let isRotating = false;
    let watchId = null;

    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([35.6812, 139.7671], 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20 }).addTo(map);
        map.on('zoom move', updateScale);
        updateScale();
    }

    function startTracking() {
        if (!navigator.geolocation) return;
        watchId = navigator.geolocation.watchPosition((pos) => {
            const { latitude, longitude, accuracy } = pos.coords;
            const latlng = [latitude, longitude];

            document.getElementById('status-display').innerText = `Acc: ±${Math.round(accuracy)}m`;

            if (!userMarker) {
                userMarker = L.marker(latlng).addTo(map);
                accuracyCircle = L.circle(latlng, { radius: accuracy }).addTo(map);
            } else {
                userMarker.setLatLng(latlng);
                accuracyCircle.setLatLng(latlng).setRadius(accuracy);
            }

            if (isLocked) map.panTo(latlng);

            // [v19.8 正解トリガー] 精度20m超で画面点滅発動
            if (accuracy > 20) {
                document.body.classList.add('alert-active');
                document.getElementById('proximity-dismiss-btn').style.display = 'block';
            }
        }, (err) => console.error(err), { enableHighAccuracy: true });
    }

    function updateScale() {
        const center = map.getCenter();
        const p1 = map.latLngToLayerPoint(center);
        const p2 = L.point(p1.x + 1, p1.y);
        const mPerPx = center.distanceTo(map.layerPointToLatLng(p2));
        document.getElementById('scale-bar').style.width = (50 / mPerPx) + "px";
    }

    function toggleLock() { 
        isLocked = !isLocked; 
        document.getElementById('btn-lock').style.background = isLocked ? '#0f0' : '#1a1a1a';
    }
    function toggleRotate() { isRotating = !isRotating; }
    function dismissAlert() {
        document.body.classList.remove('alert-active');
        document.getElementById('proximity-dismiss-btn').style.display = 'none';
    }
    function exitApp() { if(confirm("Close Application?")) window.close(); }
    function requestGyro() { /* 方位許可ロジック */ }

    window.onload = () => {
        initMap();
        startTracking();
    };

    // PWA Service Worker (v19.8 継承)
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
</script>
</body>
</html>
