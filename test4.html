<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Tactical Map Pro v25</title>
    <style>
        /* --- 1. デザイン定義（縦・横共通） --- */
        :root { 
            --panel-bg: rgba(30, 41, 59, 0.95);
            --accent: #3b82f6; --danger: #ef4444; --success: #10b981;
            --text: #f8fafc; --glass-border: rgba(255, 255, 255, 0.2);
        }
        body { margin: 0; background: #000; color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100dvh; width: 100%; position: fixed; }
        
        /* 地図描画エリア */
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; }
        #map-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
        #map-img { display: none; pointer-events: none; }

        /* HUD（GPS精度・高度） */
        #gps-status {
            position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8);
            padding: 8px 12px; border-radius: 8px; font-size: 11px; z-index: 3000;
            border: 1px solid var(--success); line-height: 1.4;
        }

        /* パネル基本設定 */
        #panel {
            position: fixed; z-index: 2000; background: var(--panel-bg);
            backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 2. 縦画面レイアウト（従来の完成度を維持） --- */
        @media (orientation: portrait) {
            #panel { bottom: 25px; left: 15px; right: 15px; border-radius: 20px; padding: 18px; }
            .coord-row { display: flex; gap: 10px; margin-bottom: 12px; }
            .coord-row input { flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #444; background: #111; color: #fff; font-size: 18px; text-align: center; }
            button { width: 100%; padding: 16px; margin: 6px 0; border-radius: 14px; font-size: 16px; font-weight: bold; }
        }

        /* --- 3. 横画面レイアウト（フローティング計器スタイル） --- */
        @media (orientation: landscape) {
            #panel {
                top: 15px !important; left: 15px !important; bottom: auto !important; right: auto !important;
                width: 150px !important; border-radius: 12px !important; padding: 10px !important;
            }
            .guide-text { font-size: 13px; font-weight: bold; color: var(--accent); display: block; margin-bottom: 8px; }
            
            /* パネルを突き抜けるフローティング入力欄 */
            .coord-row {
                width: 280px !important; display: flex; gap: 5px; margin-bottom: 8px;
            }
            .coord-row input {
                background: rgba(15, 23, 42, 0.95) !important;
                border: 1px solid var(--accent); color: white; border-radius: 6px;
                padding: 10px 5px; font-size: 16px; text-align: center;
                box-shadow: 6px 6px 20px rgba(0,0,0,0.7);
            }
            .input-deg { width: 65px !important; }
            .input-min { width: 140px !important; }

            button { width: 100%; padding: 10px 0; margin: 4px 0; border-radius: 8px; font-size: 12px; font-weight: bold; }
        }

        /* ボタン共通色 */
        button { border: none; cursor: pointer; transition: opacity 0.2s; }
        button:active { opacity: 0.7; }
        .blue { background: var(--accent); color: white; }
        .red { background: var(--danger); color: white; }
        .gray { background: #475569; color: white; }

        .step { display: none; } .active { display: block; }
    </style>
</head>
<body>

<div id="gps-status">
    🛰️ GPS: ±<span id="acc">-</span>m<br>
    🏔️ ALT: <span id="alt">-</span>m
</div>

<div id="viewport">
    <div id="map-container"><img id="map-img"></div>
</div>

<div id="panel">
    <!-- ステップ0: 初期画面 -->
    <div id="s0" class="step active">
        <button class="blue" onclick="startSetup()">🗺️ 新規マップ作成</button>
        <button class="gray" onclick="alert('保存機能準備中')">📂 保存済みマップ</button>
    </div>

    <!-- ステップ2-1: 地点1登録 -->
    <div id="s2-p1" class="step">
        <span class="guide-text">地点1をタップ</span>
        <div class="coord-row">
            <input type="number" id="lat1_deg" class="input-deg" placeholder="度">
            <input type="number" id="lat1_min" class="input-min" placeholder="分">
        </div>
        <div class="coord-row">
            <input type="number" id="lng1_deg" class="input-deg" placeholder="度">
            <input type="number" id="lng1_min" class="input-min" placeholder="分">
        </div>
        <button class="red" onclick="goToStep('s2-p1', 's2-p2')">P1を確定して次へ</button>
    </div>

    <!-- ステップ2-2: 地点2登録 -->
    <div id="s2-p2" class="step">
        <span class="guide-text">地点2をタップ</span>
        <div class="coord-row">
            <input type="number" id="lat2_deg" class="input-deg" placeholder="度">
            <input type="number" id="lat2_min" class="input-min" placeholder="分">
        </div>
        <div class="coord-row">
            <input type="number" id="lng2_deg" class="input-deg" placeholder="度">
            <input type="number" id="lng2_min" class="input-min" placeholder="分">
        </div>
        <button class="blue" onclick="finishSetup()">P2を確定して完了</button>
        <button class="gray" onclick="goToStep('s2-p2', 's2-p1')" style="font-size:10px; padding:5px;">← P1に戻る</button>
    </div>
</div>

<script>
    // --- 状態管理用変数 ---
    let mapData = { scale: 1, x: 0, y: 0 };
    
    // --- UI操作ロジック ---
    function goToStep(current, next) {
        document.getElementById(current).classList.remove('active');
        document.getElementById(next).classList.add('active');
    }

    function startSetup() {
        goToStep('s0', 's2-p1');
    }

    function finishSetup() {
        alert("設定完了。実行モードに移行します。");
        goToStep('s2-p2', 's0'); // 仮で最初に戻る
    }

    // --- GPS取得ロジック（実戦仕様） ---
    if ("geolocation" in navigator) {
        navigator.geolocation.watchPosition(pos => {
            document.getElementById('acc').innerText = Math.round(pos.coords.accuracy);
            document.getElementById('alt').innerText = pos.coords.altitude ? Math.round(pos.coords.altitude) : '--';
        }, err => console.warn(err), {
            enableHighAccuracy: true,
            maximumAge: 0
        });
    }

    // --- 地図操作（簡易版・本番ロジックをここに統合） ---
    const viewport = document.getElementById('viewport');
    const container = document.getElementById('map-container');

    viewport.addEventListener('touchstart', e => {
        // ピンチズーム、スワイプ移動のロジックがここに入ります
    });

</script>

</body>
</html>
