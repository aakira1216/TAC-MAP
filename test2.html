<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DEBUG LAYOUT v22</title>
    <style>
        /* 読み込まれたか一目でわかるように背景を赤っぽくします */
        body { margin: 0; background: #4a0000; color: white; font-family: sans-serif; }
        
        #debug-ver {
            position: fixed; top: 0; right: 0; background: yellow; color: black;
            padding: 5px; z-index: 9999; font-weight: bold;
        }

        /* 縦画面：パネルは下 */
        #panel {
            position: fixed; bottom: 20px; left: 10px; right: 10px;
            background: rgba(255,255,255,0.9); color: black; padding: 20px;
            border-radius: 15px;
        }

        /* 横画面：パネルは左！ */
        @media (orientation: landscape) {
            body { background: #004a00; } /* 横にすると背景が緑に変わる */
            #panel {
                top: 10px !important; left: 10px !important; bottom: 10px !important;
                right: auto !important; width: 250px !important;
                background: white !important;
            }
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        }

        button { width: 100%; padding: 15px; margin: 5px 0; font-size: 16px; }
        .input-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .input-group input { flex: 1; padding: 10px; font-size: 18px; }
    </style>
</head>
<body>

    <div id="debug-ver">TEST v22</div>

    <div id="panel">
        <h3>レイアウトテスト v22</h3>
        <p>横画面にすると背景が緑になり、パネルが左に寄ります。</p>
        
        <div class="grid">
            <button>ボタン1</button>
            <button>ボタン2</button>
            <button>ボタン3</button>
            <button>ボタン4</button>
        </div>

        <div class="input-group">
            <input type="number" placeholder="度">
            <input type="number" placeholder="分">
        </div>
    </div>

</body>
</html>
