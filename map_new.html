<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Map Tracker Pro v11.5</title>
    <style>
        :root { --bg: #0f172a; --panel-bg: rgba(30, 41, 59, 0.95); --accent: #3b82f6; --success: #10b981; --danger: #ef4444; --text: #f8fafc; }
        body { margin: 0; background: #000; color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100dvh; width: 100%; position: fixed; }
        
        #viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; touch-action: none; }
        #map-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
        #map-img { display: none; pointer-events: none; }
        
        .dot { position: absolute; width: 22px; height: 22px; border-radius: 50%; border: 2.5px solid #fff; transform: translate(-50%, -50%); display: none; z-index: 100; pointer-events: none; }
        #p1-dot { background: var(--danger); }
        #p2-dot { background: var(--success); }
        #temp-target-dot { background: #fff; z-index: 110; border: 2px solid #000; box-shadow: 0 0 10px #fff; }
        
        #user-container { position: absolute; pointer-events: none; display: none; z-index: 110; }
        #user-dot { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 24px solid var(--accent); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -70%); }
        
        #panel { position: fixed; bottom: 20px; left: 15px; right: 15px; padding: 15px; background: var(--panel-bg); backdrop-filter: blur(15px); border-radius: 20px; z-index: 1000; border: 1px solid rgba(255,255,255,0.1); }
        .step { display: none; } .active { display: block; }
        button { width: 100%; padding: 14px; margin: 5px 0; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; touch-action: manipulation; }
        .blue { background: var(--accent); color: white; } .red { background: var(--danger); color: white; } .outline { background: transparent; border: 1px solid #444; color: white; }
        
        #ui-overlay { position: fixed; top: 44px; right: 15px; display: none; flex-direction: column; gap: 12px; z-index: 1002; }
        .ui-btn { width: 50px; height: 50px; background: var(--panel-bg); color: white; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        
        #status-bar { position: absolute; top: 75px; width: 100%; text-align: center; font-size: 12px; font-weight: bold; text-shadow: 0 0 5px #000; pointer-events: none; z-index: 999; }
        
        .coord-row { display: flex; justify-content: center; align-items: center; gap: 4px; margin-bottom: 10px; }
        input[type="number"], input[type="text"] { width: 45%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #1a1a1a; color: white; text-align: center; font-size: 18px; }
        
        #map-list-container { max-height: 300px; overflow-y: auto; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="status-bar"></div>

<div id="ui-overlay">
    <div id="btn-lock" class="ui-btn" onclick="toggleTracking()">🎯</div>
    <div id="btn-rotate" class="ui-btn" onclick="cycleRotateMode()">🧭</div>
</div>

<div id="viewport">
    <div id="map-container">
        <img id="map-img">
        <div id="p1-dot" class="dot"></div>
        <div id="p2-dot" class="dot"></div>
        <div id="temp-target-dot" class="dot"></div>
    </div>
    <div id="user-container"><div id="user-dot"></div></div>
</div>

<div id="panel">
    <div id="s0" class="step active">
        <h3 style="margin:0 0 15px 0; text-align:center; color:var(--accent)">Map Tracker v11.5</h3>
        <button class="blue" onclick="startNewMap()">＋ 新規マップ作成</button>
        <button class="outline" onclick="showMapList()">📂 保存した地図を開く</button>
    </div>

    <div id="s2" class="step">
        <p id="guide" style="margin:0 0 10px 0; text-align:center; font-weight:bold;">地点1をタップして座標を入力</p>
        <div class="coord-row">
            <input type="number" id="lat_int" placeholder="35"> . <input type="number" id="lat_dec" placeholder="00000">
        </div>
        <div class="coord-row">
            <input type="number" id="lng_int" placeholder="139"> . <input type="number" id="lng_dec" placeholder="00000">
        </div>
        <button id="coord-confirm-btn" onclick="confirmPoint()" class="blue">この地点を登録</button>
    </div>

    <div id="s4" class="step">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="gps-status">GPS待機中...</div>
            <button onclick="location.reload()" class="outline" style="width:80px; padding:8px; margin:0; font-size:12px;">終了</button>
        </div>
        <button id="gyro-btn" onclick="askGyro()" class="outline" style="margin-top:10px;">🧭 方位計を有効化</button>
    </div>

    <div id="s-list" class="step">
        <h3 style="margin:0 0 10px 0;">保存済み地図</h3>
        <div id="map-list-container"></div>
        <button class="outline" onclick="showStep(0)">戻る</button>
    </div>
</div>

<script>
    const DB_NAME = "MapTrackerDB", STORE_NAME = "maps";
    let db, pointers = [], lastMid = null, lastDist = 0, ticking = false;
    
    const state = { 
        step: 0, p1: null, p2: null, scale: 1, x: 0, y: 0, 
        isTracking: true, rotateMode: 0, mapNorth: 0, metersPerPixel: 0,
        userPos: {x:0, y:0}, userHeading: 0, tempPoint: null, currentImgBlob: null
    };

    const el = id => document.getElementById(id);

    // IndexedDB 初期化
    const initDB = () => new Promise(r => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
        req.onsuccess = e => { db = e.target.result; r(); };
    });
    window.onload = async () => { await initDB(); };

    function showStep(n){ 
        document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); 
        if(typeof n === 'string') el('s'+n).classList.add('active');
        else el('s'+n).classList.add('active');
    }
    
    function startNewMap() { 
        const input = document.createElement('input'); input.type='file'; input.accept='image/*'; 
        input.onchange=e=>{
            const file=e.target.files[0]; if(!file)return; state.currentImgBlob=file; 
            const img = el('map-img'); img.src = URL.createObjectURL(file); 
            img.onload = () => { img.style.display='block'; fitImage(); showStep(2); };
        }; input.click(); 
    }

    // 地図リストの表示（削除ボタン付き）
    async function showMapList() {
        showStep('-list'); const listEl = el('map-list-container'); listEl.innerHTML = "読込中...";
        const tx = db.transaction(STORE_NAME, "readonly");
        tx.objectStore(STORE_NAME).getAll().onsuccess = e => {
            const maps = e.target.result;
            listEl.innerHTML = maps.length ? "" : "地図がありません";
            maps.forEach(m => {
                const row = document.createElement('div');
                row.style = "display:flex; align-items:center; gap:10px; margin-bottom:10px; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px";
                row.innerHTML = `
                    <span style="flex:1; font-size:14px; font-weight:bold; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${m.name}</span>
                    <button class="blue" style="width:70px; padding:8px; margin:0; font-size:12px;" onclick="loadMap(${m.id})">開く</button>
                    <button class="red" style="width:70px; padding:8px; margin:0; font-size:12px;" onclick="deleteMap(${m.id})">削除</button>
                `;
                listEl.appendChild(row);
            });
        };
    }

    function deleteMap(id) { if(confirm("消去しますか？")) { db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).delete(id).onsuccess = () => showMapList(); } }

    function loadMap(id) {
        db.transaction(STORE_NAME, "readonly").objectStore(STORE_NAME).get(id).onsuccess = e => {
            const d = e.target.result;
            state.p1 = d.p1; state.p2 = d.p2; state.mapNorth = d.mapNorth; state.metersPerPixel = d.metersPerPixel;
            const img = el('map-img'); img.src = URL.createObjectURL(d.image);
            img.onload = () => { img.style.display='block'; fitImage(); saveAndStart(); };
        };
    }

    function fitImage() {
        const img = el('map-img'), vw = el('viewport').clientWidth, vh = el('viewport').clientHeight;
        state.scale = Math.min(vw/img.naturalWidth, vh/img.naturalHeight) * 0.9;
        state.x = vw/2 - (img.naturalWidth/2*state.scale); state.y = vh/2 - (img.naturalHeight/2*state.scale);
        requestRender();
    }

    // タッチ操作（ズーム・移動）
    el('viewport').addEventListener('pointerdown', e => {
        el('viewport').setPointerCapture(e.pointerId); pointers.push(e);
        if(pointers.length === 1) lastMid = { x: e.clientX, y: e.clientY };
        else if(pointers.length === 2) {
            lastDist = Math.hypot(pointers[0].clientX - pointers[1].clientX, pointers[0].clientY - pointers[1].clientY);
            lastMid = { x: (pointers[0].clientX + pointers[1].clientX)/2, y: (pointers[0].clientY + pointers[1].clientY)/2 };
        }
    });

    el('viewport').addEventListener('pointermove', e => {
        const idx = pointers.findIndex(p => p.pointerId === e.pointerId);
        if(idx === -1) return; pointers[idx] = e;
        state.isTracking = false; // 動かしたら追従解除

        if(pointers.length === 1 && lastMid) {
            state.x += (e.clientX - lastMid.x); state.y += (e.clientY - lastMid.y);
            lastMid = { x: e.clientX, y: e.clientY };
        } else if(pointers.length === 2 && lastMid) {
            const dist = Math.hypot(pointers[0].clientX - pointers[1].clientX, pointers[0].clientY - pointers[1].clientY);
            const mid = { x: (pointers[0].clientX + pointers[1].clientX)/2, y: (pointers[0].clientY + pointers[1].clientY)/2 };
            const zoom = dist / lastDist;
            // 指の中心を基準にズーム
            state.x = mid.x - (mid.x - state.x) * zoom;
            state.y = mid.y - (mid.y - state.y) * zoom;
            state.scale *= zoom;
            lastDist = dist; lastMid = mid;
        }
        requestRender();
    });

    const endPointer = e => {
        if(pointers.length === 1 && state.step === 2) handleTap(e);
        pointers = pointers.filter(p => p.pointerId !== e.pointerId);
        lastMid = null; lastDist = 0;
    };
    el('viewport').addEventListener('pointerup', endPointer);
    el('viewport').addEventListener('pointercancel', endPointer);

    function handleTap(e) {
        // 地図上の座標(px)を逆算
        state.tempPoint = { x: (e.clientX - state.x) / state.scale, y: (e.clientY - state.y) / state.scale };
        requestRender();
    }

    function confirmPoint() {
        const lat = parseFloat(el('lat_int').value + "." + (el('lat_dec').value || "0"));
        const lng = parseFloat(el('lng_int').value + "." + (el('lng_dec').value || "0"));
        if(!state.tempPoint || isNaN(lat) || isNaN(lng)) return alert("地点をタップし、数値を入力してください");

        if(!state.p1) {
            state.p1 = { ...state.tempPoint, lat, lng };
            state.tempPoint = null; el('guide').innerText = "地点2をタップして座標を入力";
            el('lat_int').value = ""; el('lat_dec').value = ""; el('lng_int').value = ""; el('lng_dec').value = "";
        } else {
            state.p2 = { ...state.tempPoint, lat, lng };
            const p1 = state.p1, p2 = state.p2, r = Math.PI/180;
            state.metersPerPixel = (6371000 * Math.acos(Math.sin(p1.lat*r)*Math.sin(p2.lat*r)+Math.cos(p1.lat*r)*Math.cos(p2.lat*r)*Math.cos((p2.lng-p1.lng)*r))) / Math.hypot(p2.x-p1.x, p2.y-p1.y);
            state.mapNorth = (Math.atan2(p2.x-p1.x, p1.y-p2.y)*180/Math.PI) - (Math.atan2(p2.lng-p1.lng, p2.lat-p1.lat)*180/Math.PI);
            const name = prompt("地図の名前を入力", "Map_" + Date.now().toString().slice(-4));
            if(name) db.transaction(STORE_NAME, "readwrite").objectStore(STORE_NAME).add({ name, image: state.currentImgBlob, p1, p2, mapNorth: state.mapNorth, metersPerPixel: state.metersPerPixel });
            saveAndStart();
        }
        requestRender();
    }

    function saveAndStart() {
        showStep(4); el('ui-overlay').style.display='flex';
        navigator.geolocation.watchPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            el('gps-status').innerText = `精度: ±${Math.round(p.coords.accuracy)}m`;
            // 2点間座標からの線形補間
            const dx = state.p2.x - state.p1.x, dy = state.p2.y - state.p1.y;
            const dLat = state.p2.lat - state.p1.lat, dLng = state.p2.lng - state.p1.lng;
            state.userPos = {
                x: state.p1.x + (lng - state.p1.lng) / dLng * dx,
                y: state.p1.y + (lat - state.p1.lat) / dLat * dy
            };
            requestRender();
        }, null, { enableHighAccuracy: true });
    }

    function requestRender() { if(!ticking) { window.requestAnimationFrame(() => { render(); ticking = false; }); ticking = true; } }
    
    function render() {
        const vw = el('viewport').clientWidth, vh = el('viewport').clientHeight;
        const rot = (state.rotateMode === 1) ? -state.mapNorth : (state.rotateMode === 2) ? -state.mapNorth - state.userHeading : 0;
        const px = vw / 2, py = (state.rotateMode === 2) ? vh * 0.7 : vh / 2;

        if(state.isTracking && state.userPos.x){
            const rad = rot * Math.PI / 180;
            state.x = px - (state.userPos.x * state.scale * Math.cos(rad) - state.userPos.y * state.scale * Math.sin(rad));
            state.y = py - (state.userPos.x * state.scale * Math.sin(rad) + state.userPos.y * state.scale * Math.cos(rad));
        }

        el('map-container').style.transform = `translate(${state.x}px, ${state.y}px) rotate(${rot}deg) scale(${state.scale})`;
        
        const updP = (id, p) => { const d = el(id); if(p){ d.style.left = p.x+'px'; d.style.top = p.y+'px'; d.style.display='block'; } else d.style.display='none'; };
        updP('p1-dot', state.p1); updP('p2-dot', state.p2); updP('temp-target-dot', state.tempPoint);

        if(state.userPos.x){
            el('user-container').style.display = 'block';
            el('user-container').style.left = px + 'px'; el('user-container').style.top = py + 'px';
            el('user-container').style.transform = `translate(-50%, -50%) rotate(${state.userHeading + state.mapNorth + rot}deg)`;
        }
        el('btn-lock').style.background = state.isTracking ? 'var(--accent)' : 'var(--panel-bg)';
    }

    function toggleTracking() { state.isTracking = !state.isTracking; requestRender(); }
    function cycleRotateMode() { state.rotateMode = (state.rotateMode + 1) % 3; el('btn-rotate').innerText = ['🧭','⬆️N','🏃⬆️'][state.rotateMode]; requestRender(); }
    async function askGyro(){ 
        if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
            const res = await DeviceOrientationEvent.requestPermission();
            if(res !== 'granted') return;
        }
        window.addEventListener('deviceorientation', e => { state.userHeading = e.webkitCompassHeading || (360 - e.alpha); requestRender(); }, true);
        el('gyro-btn').style.display = 'none';
    }
</script>
</body>
</html>
